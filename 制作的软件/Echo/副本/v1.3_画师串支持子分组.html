            }
            
          } catch (err) {
            console.error('Folder selection cancelled or failed:', err);
            alert('链接文件夹失败: ' + err.message);
          }
        };
        
        // 递归扫描文件夹结构
        const scanFolderStructure = async (dirHandle, parentPath = '', level = 0) => {
          const folders = [];
          
          try {
            const entries = [];
            const iterator = dirHandle.values();
            let result = await iterator.next();
            while (!result.done) {
              entries.push(result.value);
              result = await iterator.next();
            }
            
            for (const entry of entries) {
              if (entry.kind === 'directory') {
                let fileCount = 0;
                let children = [];
                
                // 统计当前文件夹中的模型文件
                try {
                  const subIterator = entry.values();
                  let subResult = await subIterator.next();
                  while (!subResult.done) {
                    if (subResult.value.kind === 'file') {
                      const fileName = subResult.value.name.toLowerCase();
                      if (fileName.endsWith('.safetensors') || fileName.endsWith('.ckpt') || fileName.endsWith('.pt') || fileName.endsWith('.pth')) {
                        fileCount++;
                      }
                    }
                    subResult = await subIterator.next();
                  }
                } catch (e) {
                  // 忽略无法读取的文件夹
                }
                
                // 递归扫描子文件夹（最多3级）
                if (level < 2) {
                  children = await scanFolderStructure(entry, `${parentPath}/${entry.name}`, level + 1);
                }
                
                const folderData = {
                  id: `${parentPath}/${entry.name}`.replace(/^\//, ''),
                  name: entry.name,
                  path: `${parentPath}/${entry.name}`.replace(/^\//, ''),
                  fullPath: parentPath ? `${parentPath}/${entry.name}` : entry.name,
                  selected: false,
                  indeterminate: false,
                  expanded: level < 1, // 默认展开第一级
                  count: fileCount,
                  children: children,
                  hasChildren: children.length > 0,
                  level: level,
                  handle: entry
                };
                
                folders.push(folderData);
              }
            }
          } catch (e) {
            console.log('Error scanning folder:', e);
          }
          
          return folders.sort((a, b) => a.name.localeCompare(b.name));
        };
        
        // 选择models文件夹并扫描子文件夹
        const handleSelectModelsFolder = async () => {
          try {
            const dirHandle = await window.showDirectoryPicker();
            
            // 获取模型分组下已有的子分组路径
            const modelsGroup = groups.find(g => g.id === 'models');
            const existingPaths = new Set();
            
            const collectExistingPaths = (items, parentPath = '') => {
              if (!items) return;
              items.forEach(item => {
                const fullPath = parentPath ? `${parentPath}/${item.name}` : item.name;
                existingPaths.add(fullPath);
                if (item.children) {
                  collectExistingPaths(item.children, fullPath);
                }
              });
            };
            
            if (modelsGroup && modelsGroup.children) {
              collectExistingPaths(modelsGroup.children);
            }
            
            // 递归扫描文件夹结构
            const folderStructure = await scanFolderStructure(dirHandle);
            
            // 标记已存在的文件夹
            const markExisting = (folders) => {
              folders.forEach(folder => {
                folder.isExisting = existingPaths.has(folder.path);
                if (folder.children && folder.children.length > 0) {
                  markExisting(folder.children);
                }
              });
            };
            markExisting(folderStructure);
            
            setDetectedModelFolders(folderStructure);
            setModals(p => ({...p, selectModelsFolder: false, selectGroupsToCreate: true}));
            
          } catch (err) {
            console.log('Folder selection cancelled or failed:', err);
          }
        };
        
        // 切换文件夹选择状态（支持多级）
        const toggleModelFolderSelection = (folderId, selected) => {
          setDetectedModelFolders(prev => {
            const newFolders = JSON.parse(JSON.stringify(prev));
            
            // 递归查找并更新文件夹
            const updateFolder = (folders, targetId, newSelected) => {
              for (const folder of folders) {
                if (folder.id === targetId) {
                  folder.selected = newSelected;
                  folder.indeterminate = false;
                  
                  // 更新所有子文件夹
                  const updateChildren = (children, selected) => {
                    if (!children) return;
                    children.forEach(child => {
                      child.selected = selected;
                      child.indeterminate = false;
                      updateChildren(child.children, selected);
                    });
                  };
                  updateChildren(folder.children, newSelected);
                  
                  return true;
                }
                if (folder.children && folder.children.length > 0) {
                  if (updateFolder(folder.children, targetId, newSelected)) {
                    // 更新父文件夹状态
                    updateParentState(folders);
                    return true;
                  }
                }
              }
              return false;
            };
            
            // 更新父文件夹状态（根据子文件夹状态）
            const updateParentState = (folders) => {
              folders.forEach(folder => {
                if (folder.children && folder.children.length > 0) {
                  updateParentState(folder.children);
                  
                  const allSelected = folder.children.every(c => c.selected);
                  const someSelected = folder.children.some(c => c.selected || c.indeterminate);
                  
                  if (allSelected) {
                    folder.selected = true;
                    folder.indeterminate = false;
                  } else if (someSelected) {
                    folder.selected = false;
                    folder.indeterminate = true;
                  } else {
                    folder.selected = false;
                    folder.indeterminate = false;
                  }
                }
              });
            };
            
            updateFolder(newFolders, folderId, selected);
            updateParentState(newFolders);
            
            return newFolders;
          });
        };
        
        // 切换文件夹展开状态
        const toggleFolderExpanded = (folderId) => {
          setDetectedModelFolders(prev => {
            const newFolders = JSON.parse(JSON.stringify(prev));
            
            const toggleExpanded = (folders) => {
              for (const folder of folders) {
                if (folder.id === folderId) {
                  folder.expanded = !folder.expanded;
                  return true;
                }
                if (folder.children && folder.children.length > 0) {
                  if (toggleExpanded(folder.children)) return true;
                }
              }
              return false;
            };
            
            toggleExpanded(newFolders);
            return newFolders;
          });
        };
        
        // 全选/全不选所有文件夹
        const toggleSelectAll = () => {
          setDetectedModelFolders(prev => {
            const allSelected = prev.every(f => f.selected && !f.indeterminate);
            const newSelected = !allSelected;
            
            const updateAll = (folders) => {
              folders.forEach(folder => {
                if (!folder.isExisting) {
                  folder.selected = newSelected;
                  folder.indeterminate = false;
                }
                if (folder.children && folder.children.length > 0) {
                  updateAll(folder.children);
                }
              });
            };
            
            const newFolders = JSON.parse(JSON.stringify(prev));
            updateAll(newFolders);
            return newFolders;
          });
        };
        
        // 递归收集选中的文件夹
        const collectSelectedFolders = (folders, result = []) => {
          folders.forEach(folder => {
            if (folder.selected && !folder.isExisting) {
              result.push(folder);
            }
            if (folder.children && folder.children.length > 0) {
              collectSelectedFolders(folder.children, result);
            }
          });
          return result;
        };
        
        // 递归构建分组树结构
        const buildGroupTree = (folders) => {
          return folders.map(folder => {
            const newId = generateGroupId();
            const group = {
              id: newId,
              name: folder.name,
              icon: 'folder',
              children: folder.children && folder.children.length > 0 
                ? buildGroupTree(folder.children.filter(c => c.selected || c.indeterminate))
                : []
            };
            return group;
          });
        };
        
        // 创建选中的分组（作为模型分组的子分组，支持多级）
        const handleCreateSelectedGroups = async () => {
          // 找到模型分组
          const modelsGroupIndex = groups.findIndex(g => g.id === 'models');
          if (modelsGroupIndex === -1) {
            alert('未找到模型分组');
            return;
          }
          
          // 首先构建分组树结构（不链接文件夹）
          const buildGroupTreeFromFolders = (folders) => {
            const result = [];
            const folderMap = []; // 用于存储文件夹句柄和分组ID的映射
            
            const processFolder = (folderList, parentPath = '') => {
              const localResult = [];
              folderList.forEach(folder => {
                if ((folder.selected || folder.indeterminate) && !folder.isExisting) {
                  const newId = generateGroupId();
                  let children = [];
                  
                  // 处理子文件夹
                  if (folder.children && folder.children.length > 0) {
                    folder.children.forEach(child => {
                      if (child.selected || child.indeterminate) {
                        const childGroups = processFolder([child], `${parentPath}/${folder.name}`);
                        children = children.concat(childGroups);
                      }
                    });
                  }
                  
                  const group = {
                    id: newId,
                    name: folder.name,
                    icon: 'folder',
                    children: children
                  };
                  
                  localResult.push(group);
                  folderMap.push({
                    groupId: newId,
                    folderHandle: folder.handle,
                    folderName: folder.name
                  });
                }
              });
              return localResult;
            };
            
            const groups = processFolder(folders);
            return { groups, folderMap };
          };
          
          const { groups: newSubGroups, folderMap } = buildGroupTreeFromFolders(detectedModelFolders);
          
          console.log('New subgroups structure:', JSON.stringify(newSubGroups, null, 2));
          console.log('Folder map:', folderMap);
          
          if (newSubGroups.length === 0) {
            alert('没有新的分组需要创建');
            return;
          }
          
          // 更新groups，将新分组添加到模型分组的children中
          setGroups(p => {
            const newGroups = [...p];
            const modelsGroup = {...newGroups[modelsGroupIndex]};
            modelsGroup.children = [...(modelsGroup.children || []), ...newSubGroups];
            newGroups[modelsGroupIndex] = modelsGroup;
            console.log('Updated models group children:', modelsGroup.children.map(c => ({ id: c.id, name: c.name, childrenCount: c.children?.length })));
            return newGroups;
          });
          
          // 自动链接文件夹并加载模型
          let linkedCount = 0;
          let totalModelCount = 0;
          
          for (const { groupId, folderHandle, folderName } of folderMap) {
            if (folderHandle) {
              try {
                // 链接文件夹
                setLinkedFolders(prev => ({ ...prev, [groupId]: folderName }));
                
                // 加载模型文件
                const modelCount = await autoLinkFolderToGroup(folderHandle, groupId);
                if (modelCount > 0) {
                  linkedCount++;
                  totalModelCount += modelCount;
                }
              } catch (err) {
                console.error(`Failed to link folder ${folderName}:`, err);
              }
            }
          }
          
          setModals(p => ({...p, selectGroupsToCreate: false}));
          setDetectedModelFolders([]);
          
          // 自动展开模型分组
          setExpandedGroups(prev => new Set([...prev, 'models']));
          
          // 统计创建的分组数量
          const countGroups = (items) => {
            let count = 0;
            items.forEach(item => {
              count++;
              if (item.children) {
                count += countGroups(item.children);
              }
            });
            return count;
          };
          
          const totalCount = countGroups(newSubGroups);
          
          if (linkedCount > 0) {
            alert(`成功创建 ${totalCount} 个分组！\n自动链接 ${linkedCount} 个文件夹，加载 ${totalModelCount} 个模型。`);
          } else {
            alert(`成功创建 ${totalCount} 个分组！\n\n部分文件夹未能自动链接，请点击分组右侧的链接按钮（🔗）手动链接。`);
          }
        };
        
        // 路径归一化辅助函数
        const normalizePath = (path) => {
          if (!path) return '';
          return path.toLowerCase().replace(/\\/g, '/');
        };

        // 自动链接文件夹到分组并加载模型 - 带认亲机制
        const autoLinkFolderToGroup = async (dirHandle, groupId) => {
          try {
            // 获取文件夹内所有文件
            const files = [];
            const entries = [];
            const iterator = dirHandle.values();
            let result = await iterator.next();
            while (!result.done) {
              entries.push(result.value);
              result = await iterator.next();
            }

            for (const entry of entries) {
              if (entry.kind === 'file') {
                const file = await entry.getFile();
                file.handle = entry;
                files.push(file);
              }
            }

            // 扫描模型文件
            const modelFiles = files.filter(f =>
              ['.safetensors', '.ckpt', '.pt', '.pth'].some(ext => f.name.toLowerCase().endsWith(ext))
            );

            if (modelFiles.length === 0) return;

            // 获取当前已有的模型数据（用于认亲）
            const existingModels = groupId === 'lora' ? loras : checkpoints;

            // 读取同名图片和note.json
            const newModels = await Promise.all(modelFiles.map(async (file) => {
              const name = file.name.replace(/\.[^/.]+$/, '');
              const imageFile = files.find(f => {
                const imgName = f.name.replace(/\.[^/.]+$/, '');
                return imgName === name && /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name);
              });
              const noteFile = files.find(f => f.name === `${name}-note.json`);

              let imageSrc = null;
              if (imageFile) {
                imageSrc = await new Promise((resolve) => {
                  const reader = new FileReader();
                  reader.onload = (evt) => resolve(evt.target.result);
                  reader.readAsDataURL(imageFile);
                });
              }

              let noteData = { note: '', triggerWords: '' };
              if (noteFile) {
                try {
                  const noteText = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (evt) => resolve(evt.target.result);
                    reader.readAsText(noteFile);
                  });
                  noteData = JSON.parse(noteText);
                } catch (e) {
                  console.error('Failed to parse note.json:', e);
                }
              }

              // 认亲机制：检查是否已有相同路径或文件名的模型
              const normalizedNewPath = normalizePath(file.name);
              const existingModel = existingModels.find(m => {
                const normalizedExistingPath = normalizePath(m.modelPath);
                const normalizedExistingName = normalizePath(m.clean_name);
                // 匹配条件：路径相同 或 文件名相同
                return normalizedExistingPath === normalizedNewPath ||
                       normalizedExistingName === normalizePath(name);
              });

              // 如果找到已有模型，继承其数据（特别是imageSrc）
              if (existingModel) {
                console.log(`认亲成功：${name} 匹配到已有模型`, existingModel.clean_name);
                return {
                  ...existingModel,
                  groups: [...new Set([...existingModel.groups, groupId])], // 添加新分组
                  modelPath: file.name,
                  folderPath: dirHandle.name,
                  // 如果自动扫描发现了新图片，优先使用新图片；否则保留原有图片
                  imageSrc: imageSrc || existingModel.imageSrc,
                  // 合并note数据，优先使用文件中的新数据
                  clean_name: noteData.name || existingModel.clean_name || name,
                  value: noteData.note || existingModel.value || '',
                  triggerWords: noteData.triggerWords || existingModel.triggerWords || '',
                  defaultStrength: noteData.defaultStrength ?? existingModel.defaultStrength ?? 0.8,
                };
              }

              // 全新模型
              return {
                id: generateId(),
                clean_name: noteData.name || name,
                value: noteData.note || '',
                triggerWords: noteData.triggerWords || '',
                defaultStrength: noteData.defaultStrength ?? 0.8,
                groups: [groupId],
                imageSrc: imageSrc,
                modelPath: file.name,
                folderPath: dirHandle.name,
                createdAt: Date.now()
              };
            }));

            // 添加到checkpoints/loras（过滤重复，优先保留有imageSrc的）
            const updateState = (prev) => {
              const merged = [...prev];

              for (const newModel of newModels) {
                const normalizedNewPath = normalizePath(newModel.modelPath);
                const existingIndex = merged.findIndex(m => {
                  const normalizedExistingPath = normalizePath(m.modelPath);
                  const normalizedExistingName = normalizePath(m.clean_name);
                  return normalizedExistingPath === normalizedNewPath ||
                         normalizedExistingName === normalizePath(newModel.clean_name);
                });

                if (existingIndex >= 0) {
                  // 已存在，合并数据，优先保留有imageSrc的
                  const existing = merged[existingIndex];
                  const shouldReplace = !existing.imageSrc && newModel.imageSrc;

                  if (shouldReplace) {
                    console.log(`替换模型：${newModel.clean_name}（新模型有图片）`);
                    merged[existingIndex] = { ...newModel, id: existing.id };
                  } else {
                    // 合并分组
                    merged[existingIndex] = {
                      ...existing,
                      groups: [...new Set([...existing.groups, ...newModel.groups])]
                    };
                  }
                } else {
                  // 全新模型
                  merged.push(newModel);
                }
              }

              console.log(`Auto linked to group ${groupId}: ${newModels.length} models, total: ${merged.length}`);
              return merged;
            };

            if (groupId === 'lora') {
              setLoras(updateState);
            } else {
              setCheckpoints(updateState);
            }

            return newModels.length;

          } catch (err) {
            console.error('Auto link folder failed:', err);
            return 0;
          }
        };
        
        const handleManageGroups = () => { if(!manageGroupsSelection.length) return; setCharacters(p=>p.map(c=>{ if(selectedIds.has(c.id)) { const gs=manageGroupsMode==='overwrite' ? [...manageGroupsSelection] : [...new Set([...c.groups, ...manageGroupsSelection])]; return {...c, groups:gs}; } return c; })); setModals(p=>({...p, manage:false})); setSelectedIds(new Set()); };
        const handleRandomPick = () => { if(filteredAndSorted.length) { setRandomChar(filteredAndSorted[Math.floor(Math.random()*filteredAndSorted.length)]); setModals(p=>({...p, random:true})); }};

        // 生图处理函数
        const handleGenerateImage = (char, batchMode = false) => {
          return new Promise(async (resolve, reject) => {
            if (generatingCharId) {
              reject(new Error('正在生成中'));
              return;
            }
            
            // 检查模型是否已选择
            if (!imageGenSettings.modelPath) {
              alert('请先在设置中选择大模型！\n\n1. 打开设置面板\n2. 切换到"生图设置"标签\n3. 点击"连接"按钮获取大模型列表\n4. 选择一个大模型');
              reject(new Error('未选择大模型'));
              return;
            }
            
            // 批量模式下，根据设置决定是否跳过已有图片的角色
            if (batchMode && !imageGenSettings.autoUseBatchImage && char.imageSrc && char.imageSrc.startsWith('data:')) {
              console.log('Skipping character with existing image:', char.clean_name);
              resolve(null); // 跳过，返回null表示未生成
              return;
            }
            
            setIsBatchGeneration(batchMode);
            setGeneratingCharId(char.id);
          
          try {
            // 构建工作流
            // 收集所有LoRA用于工作流构建，收集启用的LoRA触发词
            const allLoras = (imageGenSettings.loras || []).filter(l => l.name);
            const enabledLoras = allLoras.filter(l => l.enabled);
            const loraTriggerWords = enabledLoras
              .map(l => typeof l.triggerWords === 'string' ? l.triggerWords : '')
              .filter(t => t && t.trim())
              .join(', ');
            
            // 构建最终提示词（触发词 + 原提示词 + 角色描述）
            const finalPositivePrompt = loraTriggerWords 
              ? `${loraTriggerWords}, ${imageGenSettings.positivePrompt}${char.value}`
              : `${imageGenSettings.positivePrompt}${char.value}`;
            
            // 基础工作流
            const workflow = {
              "17": {
                "inputs": {
                  "text": imageGenSettings.negativePrompt,
                  "parser": "A1111",
                  "mean_normalization": true,
                  "multi_conditioning": true,
                  "use_old_emphasis_implementation": false,
                  "with_SDXL": false,
                  "ascore": 6,
                  "width": imageGenSettings.width,
                  "height": imageGenSettings.height,
                  "crop_w": 0,
                  "crop_h": 0,
                  "target_width": imageGenSettings.width,
                  "target_height": imageGenSettings.height,
                  "text_g": "",
                  "text_l": "",
                  "smZ_steps": 1,
                  "clip": ["37", 0]
                },
                "class_type": "smZ CLIPTextEncode",
                "_meta": { "title": "CLIP Text Encode++" }
              },
              "19": {
                "inputs": {
                  "width": imageGenSettings.width,
                  "height": imageGenSettings.height,
                  "batch_size": imageGenSettings.batchSize
                },
                "class_type": "EmptyLatentImage",
                "_meta": { "title": "空Latent图像" }
              },
              "20": {
                "inputs": {
                  "filename_prefix": `Echo_${char.clean_name}`,
                  "images": ["44", 0]
                },
                "class_type": "SaveImage",
                "_meta": { "title": "保存图像" }
              },
              "24": {
                "inputs": {
                  "text": finalPositivePrompt,
                  "parser": "A1111",
                  "mean_normalization": true,
                  "multi_conditioning": true,
                  "use_old_emphasis_implementation": false,
                  "with_SDXL": false,
                  "ascore": 6,
                  "width": imageGenSettings.width,
                  "height": imageGenSettings.height,
                  "crop_w": 0,
                  "crop_h": 0,
                  "target_width": imageGenSettings.width,
                  "target_height": imageGenSettings.height,
                  "text_g": "",
                  "text_l": "",
                  "smZ_steps": 1,
                  "clip": ["37", 0]
                },
                "class_type": "smZ CLIPTextEncode",
                "_meta": { "title": "CLIP Text Encode++" }
              },
              "28": {
                "inputs": {
                  "seed": imageGenSettings.seed === -1 ? Math.floor(Math.random() * 2147483647) : imageGenSettings.seed,
                  "steps": imageGenSettings.steps,
                  "cfg": imageGenSettings.cfg,
                  "sampler_name": imageGenSettings.sampler,
                  "scheduler": imageGenSettings.scheduler,
                  "denoise": 1,
                  "model": ["47:46", 0],
                  "positive": ["24", 0],
                  "negative": ["17", 0],
                  "latent_image": ["19", 0]
                },
                "class_type": "KSampler",
                "_meta": { "title": "K采样器" }
              },
              "31": {
                "inputs": {
                  "ckpt_name": imageGenSettings.modelPath
                },
                "class_type": "CheckpointLoaderSimple",
                "_meta": { "title": "Checkpoint加载器（简易）" }
              },
              "37": {
                "inputs": {
                  "stop_at_clip_layer": -2,
                  "clip": ["31", 1]
                },
                "class_type": "CLIPSetLastLayer",
                "_meta": { "title": "设置CLIP最后一层" }
              },
              "44": {
                "inputs": {
                  "samples": ["28", 0],
                  "vae": ["31", 2]
                },
                "class_type": "VAEDecode",
                "_meta": { "title": "VAE解码" }
              },
              "47:46": {
                "inputs": {
                  "extra": "{\"show_headings\":true,\"show_descriptions\":false,\"mode\":\"*\"}",
                  "ㅤ": "Stable Diffusion",
                  "info_comma_padding_backtrack": "",
                  "Prompt word wrap length limit": 20,
                  "enable_emphasis": true,
                  "info_RNG": "",
                  "RNG": "gpu",
                  "ㅤㅤ": "Compute Settings",
                  "info_disable_nan_check": "",
                  "disable_nan_check": true,
                  "ㅤㅤㅤ": "Sampler parameters",
                  "info_eta_ancestral": "",
                  "eta": 1,
                  "info_s_churn": "",
                  "s_churn": 0,
                  "info_s_tmin": "",
                  "s_tmin": 0,
                  "info_s_tmax": "",
                  "s_tmax": 0,
                  "info_s_noise": "",
                  "s_noise": 1,
                  "info_eta_noise_seed_delta": "",
                  "ENSD": 31337,
                  "info_skip_early_cond": "",
                  "skip_early_cond": 0,
                  "info_sgm_noise_multiplier": "",
                  "sgm_noise_multiplier": false,
                  "info_upcast_sampling": "",
                  "upcast_sampling": true,
                  "ㅤㅤㅤㅤ": "Optimizations",
                  "info_NGMS": "",
                  "NGMS": 0,
                  "info_NGMS_all_steps": "",
                  "NGMS all steps": false,
                  "info_pad_cond_uncond": "",
                  "pad_cond_uncond": false,
                  "info_batch_cond_uncond": "",
                  "batch_cond_uncond": true,
                  "ㅤㅤㅤㅤㅤ": "Compatibility",
                  "info_use_prev_scheduling": "",
                  "Use previous prompt editing timelines": true,
                  "ㅤㅤㅤㅤㅤㅤ": "Experimental",
                  "info_use_CFGDenoiser": "",
                  "Use CFGDenoiser": false,
                  "info_debug": "",
                  "debug": false,
                  "*": ["31", 0]
                },
                "class_type": "smZ Settings",
                "_meta": { "title": "Settings (smZ)" }
              }
            };
            
            // 添加LoRA节点（链式连接）- 包含所有LoRA（包括禁用的）
            if (allLoras.length > 0) {
              // 跟踪前一个节点的信息
              // 初始来源: smZ Settings 输出 MODEL (索引0), CLIPSetLastLayer 输出 CLIP (索引0)
              let prevModelNode = "47:46";
              let prevModelIndex = 0;
              let prevClipNode = "37";
              let prevClipIndex = 0;

              allLoras.forEach((lora, index) => {
                const loraNodeId = `lora_${index}`;
                
                workflow[loraNodeId] = {
                  "inputs": {
                    "lora_name": lora.name,
                    "strength_model": lora.strength || 1,
                    "strength_clip": lora.strengthClip !== undefined ? lora.strengthClip : (lora.strength || 1),
                    "model": [prevModelNode, prevModelIndex],
                    "clip": [prevClipNode, prevClipIndex]
                  },
                  "class_type": "LoraLoader",
                  "_meta": { "title": `Load LoRA (${lora.name})` }
                };
                
                // 更新前一个节点为当前LoRA节点
                // LoraLoader 输出: 0=MODEL, 1=CLIP
                prevModelNode = loraNodeId;
                prevModelIndex = 0;  // MODEL 输出索引
                prevClipNode = loraNodeId;
                prevClipIndex = 1;   // CLIP 输出索引
              });
              
              // 最后一个LoRA节点的输出连接到KSampler和CLIPTextEncode
              workflow["28"].inputs.model = [prevModelNode, prevModelIndex];  // MODEL
              workflow["17"].inputs.clip = [prevClipNode, prevClipIndex];    // CLIP
              workflow["24"].inputs.clip = [prevClipNode, prevClipIndex];    // CLIP
            }

            // 发送请求到ComfyUI
            const response = await fetch(`${imageGenSettings.serverUrl}/prompt`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ prompt: workflow })
            });

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const result = await response.json();
            const promptId = result.prompt_id;
            console.log('Image generation started:', result);
            
            // 设置初始阶段
            setGenerationStage('提交任务中...');
            
            // 获取生成图片的函数
            const fetchGeneratedImage = async () => {
              try {
                const historyResponse = await fetch(`${imageGenSettings.serverUrl}/history/${promptId}`);
                if (!historyResponse.ok) return null;
                
                const historyData = await historyResponse.json();
                const promptHistory = historyData[promptId];
                
                if (promptHistory && promptHistory.outputs) {
                  const outputs = promptHistory.outputs;
                  for (const nodeId in outputs) {
                    const nodeOutput = outputs[nodeId];
                    if (nodeOutput.images && nodeOutput.images.length > 0) {
                      const imageData = nodeOutput.images[0];
                      const imageUrl = `${imageGenSettings.serverUrl}/view?filename=${encodeURIComponent(imageData.filename)}&subfolder=${encodeURIComponent(imageData.subfolder || '')}&type=${imageData.type || 'output'}`;
                      
                      const imgResponse = await fetch(imageUrl);
                      const blob = await imgResponse.blob();
                      
                      return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = async (e) => {
                          let finalImage = e.target.result;
                          if (imageCompression) {
                            try {
                              finalImage = await compressImage(e.target.result, imageCompressionSize);
                            } catch (err) {
                              console.warn('Image compression failed:', err);
                            }
                          }
                          resolve(finalImage);
                        };
                        reader.readAsDataURL(blob);
                      });
                    }
                  }
                }
                return null;
              } catch (err) {
                console.error('Fetch image error:', err);
                return null;
              }
            };
            
            // 使用WebSocket监听进度
            const wsUrl = imageGenSettings.serverUrl.replace('http://', 'ws://').replace('https://', 'wss://');
            const clientId = `echo_${Date.now()}`;
            let ws = null;
            let completed = false;
            
            try {
              ws = new WebSocket(`${wsUrl}/ws?clientId=${clientId}`);
              
              ws.onmessage = async (event) => {
                try {
                  // 检查是否为二进制数据（预览图等），跳过 JSON 解析
                  if (event.data instanceof Blob) {
                    console.log('收到二进制数据（预览图），跳过解析');
                    return;
                  }
                  const data = JSON.parse(event.data);
                  console.log('WS message:', data.type);
                  
                  // 监听执行开始
                  if (data.type === 'execution_start') {
                    setGenerationStage('加载大模型中...');
                  }
                  
                  // 监听进度消息
                  if (data.type === 'progress') {
                    const progressValue = Math.round((data.data.value / data.data.max) * 100);
                    setGenerationProgress(progressValue);
                    setGenerationStage(`采样进度`);
                  }
                  
                  // 监听执行完成消息
                  if (data.type === 'executed') {
                    console.log('Executed received');
                    completed = true;
                    setGenerationProgress(100);
                    setGenerationStage('VAE解码中...');
                    
                    const image = await fetchGeneratedImage();
                    if (image) {
                      setGenerationStage('生成完成！');
                      setTimeout(() => {
                        // 批量模式：直接添加图片
                        // 单图模式：无图自动使用，有图根据设置决定
                        const hasExistingImage = char.imageSrc && char.imageSrc.startsWith('data:');
                        
                        if (batchMode || !hasExistingImage || imageGenSettings.autoUseSingleImage) {
                          // 批量模式 / 无图 / 开启了默认覆盖：直接使用新图片
                          setCharacters(prev => prev.map(c => 
                            c.id === char.id ? { ...c, imageSrc: image } : c
                          ));
                          setGeneratingCharId(null);
                          setGenerationProgress(0);
                          setGenerationStage('');
                          setIsBatchGeneration(false);
                          resolve(image);
                        } else {
                          // 单图模式且有原图且未开启默认覆盖：显示预览选择界面
                          setGeneratedImagePreview(image);
                          setGeneratingCharInfo(char);
                          setGeneratingCharId(null);
                          setGenerationProgress(0);
                          setGenerationStage('');
                          resolve(image);
                        }
                      }, 500);
                    } else {
                      alert('获取生成的图片失败');
                      setGeneratingCharId(null);
                      setGenerationProgress(0);
                      setGenerationStage('');
                      setIsBatchGeneration(false);
                      reject(new Error('获取图片失败'));
                    }
                    if (ws) ws.close();
                  }
                  
                } catch (err) {
                  console.error('WebSocket message parse error:', err);
                }
              };
              
              ws.onerror = (err) => {
                console.error('WebSocket error:', err);
              };
              
            } catch (wsErr) {
              console.error('WebSocket connection failed:', wsErr);
            }
            
            // 轮询作为备用方案
            const pollInterval = setInterval(async () => {
              if (completed) {
                clearInterval(pollInterval);
                return;
              }
              
              try {
                const historyResponse = await fetch(`${imageGenSettings.serverUrl}/history/${promptId}`);
                if (!historyResponse.ok) return;
                
                const historyData = await historyResponse.json();
                const promptHistory = historyData[promptId];
                
                // 检查是否有进度信息
                if (promptHistory && promptHistory.status) {
                  if (promptHistory.status.status_str === 'running') {
                    // 尝试获取进度
                    if (promptHistory.status.messages) {
                      for (const msg of promptHistory.status.messages) {
                        if (msg[0] === 'progress') {
                          const progressValue = Math.round((msg[1].value / msg[1].max) * 100);
                          setGenerationProgress(progressValue);
                          setGenerationStage(`采样进度`);
                        }
                      }
                    }
                  }
                }
                
                if (promptHistory && promptHistory.outputs) {
                  completed = true;
                  clearInterval(pollInterval);
                  setGenerationProgress(100);
                  setGenerationStage('VAE解码中...');
                  
                  const image = await fetchGeneratedImage();
                  if (image) {
                    setGenerationStage('生成完成！');
                    setTimeout(() => {
                      // 批量模式：直接添加图片
                      // 单图模式：无图自动使用，有图根据设置决定
                      const hasExistingImage = char.imageSrc && char.imageSrc.startsWith('data:');
                      
                      if (batchMode || !hasExistingImage || imageGenSettings.autoUseSingleImage) {
                        // 批量模式 / 无图 / 开启了默认覆盖：直接使用新图片
                        setCharacters(prev => prev.map(c => 
                          c.id === char.id ? { ...c, imageSrc: image } : c
                        ));
                        setGeneratingCharId(null);
                        setGenerationProgress(0);
                        setGenerationStage('');
                        setIsBatchGeneration(false);
                        resolve(image);
                      } else {
                        // 单图模式且有原图且未开启默认覆盖：显示预览选择界面
                        setGeneratedImagePreview(image);
                        setGeneratingCharInfo(char);
                        setGeneratingCharId(null);
                        setGenerationProgress(0);
                        setGenerationStage('');
                        resolve(image);
                      }
                    }, 500);
                  } else {
                    alert('获取生成的图片失败');
                    setGeneratingCharId(null);
                    setGenerationProgress(0);
                    setGenerationStage('');
                    setIsBatchGeneration(false);
                    reject(new Error('获取图片失败'));
                  }
                  if (ws) ws.close();
                }
              } catch (err) {
                console.error('Poll error:', err);
              }
            }, 1000);
            
            // 设置超时（5分钟）
            setTimeout(() => {
              clearInterval(pollInterval);
              if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
              }
              if (!completed && generatingCharId === char.id) {
                completed = true;
                setGeneratingCharId(null);
                setGenerationProgress(0);
                setGenerationStage('');
                setIsBatchGeneration(false);
                alert('生成超时，请检查ComfyUI');
                reject(new Error('生成超时'));
              }
            }, 5 * 60 * 1000);
            
          } catch (error) {
            console.error('Image generation error:', error);
            alert(`生图失败：${error.message}\n\n请检查：\n1. ComfyUI是否正在运行\n2. 服务器地址是否正确\n3. 大模型路径是否正确`);
            setGeneratingCharId(null);
            setGenerationProgress(0);
            setGenerationStage('');
            setIsBatchGeneration(false);
            reject(error);
          }
        });
      };

        // 处理按钮点击位置 - 用于展开动画
        const handleButtonClick = (e, modalName) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const x = ((rect.left + rect.width / 2) / window.innerWidth) * 100;
          const y = ((rect.top + rect.height / 2) / window.innerHeight) * 100;
          setClickPosition({ x, y });
          setModals(p => ({ ...p, [modalName]: true }));
        };
        
        const toggleMenu = (menu) => setActiveMenu(activeMenu === menu ? null : menu);
        useEffect(() => { const h = () => setActiveMenu(null); document.addEventListener('click', h); return () => document.removeEventListener('click', h); }, []);

        const startEdit = (char) => {
            setEditingChar(char);
            setEditFormGroups(char.groups || []);
            setModals({...modals, edit: true});
        };

        const startCreate = () => {
            setEditingChar({ id: generateId(), clean_name: '', value: '', isFavorite: false, groups: [] });
            setEditFormGroups([]);
            setModals({...modals, edit: true});
        };

        const toggleFeature = (key) => setFeatureFlags(prev => ({...prev, [key]: !prev[key]}));

        return (
            <div className={`main-container flex h-full w-full text-sm bg-[var(--bg-primary)] transition-all duration-500 ${Object.values(modals).some(Boolean) || previewChar ? 'pushed-back' : ''}`} onDragEnter={handleDragEnter} onDragLeave={handleDragLeave} onDragOver={handleDragOver} onDrop={handleDrop}>
                <Sidebar
                    groups={groups}
                    selectedGroup={selectedGroup}
                    onSelectGroup={(id) => { setSelectedGroup(id); setSubGroupPath([]); }}
                    onCreateGroup={()=>{setEditingGroup(null); setIsCreatingModelSubgroup(false); setModals(p=>({...p, group:true}));}}
                    onEditGroup={editGroup}
                    onDeleteGroup={deleteGroup}
                    onCreateSubgroup={createSubgroup}
                    isCollapsed={isSidebarCollapsed}
                    toggleCollapse={()=>setIsSidebarCollapsed(!isSidebarCollapsed)}
                    recycleCount={characters.filter(c=>c.deletedAt).length}
                    onEmptyTrash={handleEmptyTrash}
                    onExportArtists={handleExportArtists}
                    expandedGroups={expandedGroups}
                    onToggleExpand={toggleExpandGroup}
                    linkedFolders={linkedFolders}
                    onLinkFolder={handleLinkFolder}
                />
                <main className="flex-1 flex flex-col min-w-0 relative bg-[var(--bg-primary)] transition-colors">
                    <header className={`h-16 border-b border-gray-200 dark:border-white/5 bg-[var(--bg-primary)]/80 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-30 transition-colors`}>
                        <div className="flex items-center gap-4 flex-1 mr-4">
                            <div className="relative w-full max-w-md">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-neutral-500 pointer-events-none">
                                    <SearchIcon className="w-full h-full"/>
                                </div>
                                <input 
                                    value={search} 
                                    onChange={e=>setSearch(e.target.value)} 
                                    className="w-full neumorph-input py-2.5 pl-10 pr-4 text-sm text-gray-800 dark:text-neutral-300 outline-none transition-all placeholder-gray-400 dark:placeholder-neutral-600 focus:ring-2 focus:ring-blue-500/30" 
                                    placeholder="搜索角色..." 
                                />
                            </div>
                            
                            {featureFlags.showViewToggle && (
                                <div className="flex neumorph-pressed p-1 gap-1">
                                    <button onClick={()=>setViewMode('grid')} className={`icon-btn p-2 rounded-lg transition-all duration-200 ${viewMode==='grid' ? 'neumorph-raised btn-physics bg-white dark:bg-white/10 text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-neutral-500 hover:text-gray-700 dark:hover:text-neutral-300'}`}><GridIcon className="w-4 h-4"/></button>
                                    <button onClick={()=>setViewMode('list')} className={`icon-btn p-2 rounded-lg transition-all duration-200 ${viewMode==='list' ? 'neumorph-raised btn-physics bg-white dark:bg-white/10 text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-neutral-500 hover:text-gray-700 dark:hover:text-neutral-300'}`}><ListIcon className="w-4 h-4"/></button>
                                </div>
                            )}

                            {/* 快捷生图按钮 */}
                            {featureFlags.showQuickGenerate && (
                                <button 
                                    onClick={() => setModals({...modals, quickGenerate: true})}
                                    className="neumorph-raised btn-physics px-3 py-2 text-xs font-medium text-gray-600 dark:text-neutral-300 flex items-center gap-2 transition-all active:scale-95 hover:text-blue-600 dark:hover:text-blue-400"
                                >
                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    生图
                                </button>
                            )}

                            {featureFlags.showSort && (
                                <div className="relative" onClick={e=>e.stopPropagation()}>
                                    <button onClick={()=>toggleMenu('sort')} className="neumorph-raised btn-physics px-3 py-2 text-xs font-medium text-gray-600 dark:text-neutral-300 flex items-center gap-2 transition-all active:scale-95 hover:text-blue-600 dark:hover:text-blue-400">
                                        <SortIcon className="w-3.5 h-3.5"/> 排序
                                    </button>
                                    {activeMenu==='sort' && <div className="absolute top-full left-0 mt-2 w-32 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-white/10 rounded-lg shadow-xl py-1 z-50">{[['newest','最新'],['oldest','最早'],['az','名称'],['usage','常用']].map(([k,v])=><button key={k} onClick={()=>{setSortOption(k);setActiveMenu(null)}} className={`w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-white/5 text-gray-700 dark:text-gray-200 ${sortOption===k?'text-blue-600 dark:text-blue-400':''}`}>{v}</button>)}</div>}

                                        try {
                                            // 使用 File System Access API 写入文件
                                            const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });

      // 图片预览模态框组件 - 点击直接选择

      // 百度翻译API函数（使用JSONP方式，避免CORS问题）
      const translateWithBaidu = (text, from = 'zh', to = 'en') => {
        return new Promise((resolve) => {
          const appid = localStorage.getItem('baidu_translate_appid') || '';
          const key = localStorage.getItem('baidu_translate_key') || '';

          // 如果没配置 Key，直接返回原样
          if (!appid || !key) {
            return resolve({ src: text, dst: text, isMock: true });
          }

          const salt = Date.now();
          // 签名原文：appid + q + salt + key
          const sign = md5(appid + text + salt + key);
          
          // 生成随机回调函数名，防止并发请求冲突
          const callbackName = `baidu_cb_${Date.now()}_${Math.floor(Math.random() * 1000)}`;

          // 构建 JSONP 请求
          const script = document.createElement('script');
          script.src = `https://fanyi-api.baidu.com/api/trans/vip/translate?q=${encodeURIComponent(text)}&from=${from}&to=${to}&appid=${appid}&salt=${salt}&sign=${sign}&callback=${callbackName}`;

          // 设置超时处理
          const timeout = setTimeout(() => {
            cleanup();
            console.error('翻译超时');
            resolve({ src: text, dst: text, error: 'Timeout' });
          }, 5000);

          const cleanup = () => {
            clearTimeout(timeout);
            if (script.parentNode) script.parentNode.removeChild(script);
            delete window[callbackName];
          };

          // 定义全局回调
          window[callbackName] = (data) => {
            cleanup();
            if (data.trans_result && data.trans_result.length > 0) {
              resolve(data.trans_result[0]);
            } else {
              console.error('百度翻译错误:', data.error_code, data.error_msg);
              resolve({ src: text, dst: text, error: data.error_msg });
            }
          };

          script.onerror = () => {
            cleanup();
            resolve({ src: text, dst: text, error: 'Network Error' });
          };

          document.body.appendChild(script);
        });
      };

      // MD5实现（用于百度翻译签名）- 使用更可靠的实现
      const md5 = (string) => {
        // --- 新增：强制转换为 UTF-8 编码，解决中文 charCodeAt 导致的签名错误 ---
        string = unescape(encodeURIComponent(string));
        // ------------------------------------------------------------------

        const rotateLeft = (lValue, iShiftBits) => (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
        const addUnsigned = (lX, lY) => {
          const lX8 = lX & 0x80000000, lY8 = lY & 0x80000000, lX4 = lX & 0x40000000, lY4 = lY & 0x40000000;
          let lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
          if (lX4 & lY4) return lResult ^ 0x80000000 ^ lX8 ^ lY8;
          if (lX4 | lY4) return (lResult & 0x40000000 ? lResult ^ 0xC0000000 : lResult ^ 0x40000000) ^ lX8 ^ lY8;
          return lResult ^ lX8 ^ lY8;
        };
        const f = (x, y, z) => (x & y) | ((~x) & z);
        const g = (x, y, z) => (x & z) | (y & (~z));
        const h = (x, y, z) => x ^ y ^ z;
        const i = (x, y, z) => y ^ (x | (~z));
        const ff = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, f(b, c, d)), addUnsigned(x, ac)), s), b);
        const gg = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, g(b, c, d)), addUnsigned(x, ac)), s), b);
        const hh = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, h(b, c, d)), addUnsigned(x, ac)), s), b);
        const ii = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, i(b, c, d)), addUnsigned(x, ac)), s), b);
        
        const convertToWordArray = (str) => {
          let lWordCount, lMessageLength = str.length;
          const lNumberOfWordsTemp1 = lMessageLength + 8;
          const lNumberOfWordsTemp2 = (lNumberOfWordsTemp1 - (lNumberOfWordsTemp1 % 64)) / 64;
          const lNumberOfWords = (lNumberOfWordsTemp2 + 1) * 16;
          const lWordArray = new Array(lNumberOfWords - 1);
          let lBytePosition = 0, lByteCount = 0;
          while (lByteCount < lMessageLength) {
            lWordCount = (lByteCount - (lByteCount % 4)) / 4;
            lBytePosition = (lByteCount % 4) * 8;
            lWordArray[lWordCount] = (lWordArray[lWordCount] || 0) | (str.charCodeAt(lByteCount) << lBytePosition);
            lByteCount++;
          }
          lWordCount = (lByteCount - (lByteCount % 4)) / 4;
          lBytePosition = (lByteCount % 4) * 8;
          lWordArray[lWordCount] = (lWordArray[lWordCount] || 0) | (0x80 << lBytePosition);
          lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
          lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
          return lWordArray;
        };
        
        const wordToHex = (lValue) => {
          let wordToHexValue = '', wordToHexValueTemp = '';
          for (let lCount = 0; lCount <= 3; lCount++) {
            const lByte = (lValue >>> (lCount * 8)) & 255;
            wordToHexValueTemp = '0' + lByte.toString(16);
            wordToHexValue = wordToHexValue + wordToHexValueTemp.substr(wordToHexValueTemp.length - 2, 2);
          }
          return wordToHexValue;
        };
        
        const x = convertToWordArray(string);
        let a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
        
        for (let k = 0; k < x.length; k += 16) {
          const AA = a, BB = b, CC = c, DD = d;
          a = ff(a, b, c, d, x[k + 0], 7, 0xD76AA478);
          d = ff(d, a, b, c, x[k + 1], 12, 0xE8C7B756);
          c = ff(c, d, a, b, x[k + 2], 17, 0x242070DB);
          b = ff(b, c, d, a, x[k + 3], 22, 0xC1BDCEEE);
          a = ff(a, b, c, d, x[k + 4], 7, 0xF57C0FAF);
          d = ff(d, a, b, c, x[k + 5], 12, 0x4787C62A);
          c = ff(c, d, a, b, x[k + 6], 17, 0xA8304613);
          b = ff(b, c, d, a, x[k + 7], 22, 0xFD469501);
          a = ff(a, b, c, d, x[k + 8], 7, 0x698098D8);
          d = ff(d, a, b, c, x[k + 9], 12, 0x8B44F7AF);
          c = ff(c, d, a, b, x[k + 10], 17, 0xFFFF5BB1);
          b = ff(b, c, d, a, x[k + 11], 22, 0x895CD7BE);
          a = ff(a, b, c, d, x[k + 12], 7, 0x6B901122);
          d = ff(d, a, b, c, x[k + 13], 12, 0xFD987193);
          c = ff(c, d, a, b, x[k + 14], 17, 0xA679438E);
          b = ff(b, c, d, a, x[k + 15], 22, 0x49B40821);
          a = gg(a, b, c, d, x[k + 1], 5, 0xF61E2562);
          d = gg(d, a, b, c, x[k + 6], 9, 0xC040B340);
          c = gg(c, d, a, b, x[k + 11], 14, 0x265E5A51);
          b = gg(b, c, d, a, x[k + 0], 20, 0xE9B6C7AA);
          a = gg(a, b, c, d, x[k + 5], 5, 0xD62F105D);
          d = gg(d, a, b, c, x[k + 10], 9, 0x2441453);
          c = gg(c, d, a, b, x[k + 15], 14, 0xD8A1E681);
          b = gg(b, c, d, a, x[k + 4], 20, 0xE7D3FBC8);
          a = gg(a, b, c, d, x[k + 9], 5, 0x21E1CDE6);
          d = gg(d, a, b, c, x[k + 14], 9, 0xC33707D6);
          c = gg(c, d, a, b, x[k + 3], 14, 0xF4D50D87);
          b = gg(b, c, d, a, x[k + 8], 20, 0x455A14ED);
          a = gg(a, b, c, d, x[k + 13], 5, 0xA9E3E905);
          d = gg(d, a, b, c, x[k + 2], 9, 0xFCEFA3F8);
          c = gg(c, d, a, b, x[k + 7], 14, 0x676F02D9);
          b = gg(b, c, d, a, x[k + 12], 20, 0x8D2A4C8A);
          a = hh(a, b, c, d, x[k + 5], 4, 0xFFFA3942);
          d = hh(d, a, b, c, x[k + 8], 11, 0x8771F681);
          c = hh(c, d, a, b, x[k + 11], 16, 0x6D9D6122);
          b = hh(b, c, d, a, x[k + 14], 23, 0xFDE5380C);
          a = hh(a, b, c, d, x[k + 1], 4, 0xA4BEEA44);
          d = hh(d, a, b, c, x[k + 4], 11, 0x4BDECFA9);
          c = hh(c, d, a, b, x[k + 7], 16, 0xF6BB4B60);
          b = hh(b, c, d, a, x[k + 10], 23, 0xBEBFBC70);
          a = hh(a, b, c, d, x[k + 13], 4, 0x289B7EC6);
          d = hh(d, a, b, c, x[k + 0], 11, 0xEAA127FA);
          c = hh(c, d, a, b, x[k + 3], 16, 0xD4EF3085);
          b = hh(b, c, d, a, x[k + 6], 23, 0x4881D05);
          a = hh(a, b, c, d, x[k + 9], 4, 0xD9D4D039);
          d = hh(d, a, b, c, x[k + 12], 11, 0xE6DB99E5);
          c = hh(c, d, a, b, x[k + 15], 16, 0x1FA27CF8);
          b = hh(b, c, d, a, x[k + 2], 23, 0xC4AC5665);
          a = ii(a, b, c, d, x[k + 0], 6, 0xF4292244);
          d = ii(d, a, b, c, x[k + 7], 10, 0x432AFF97);
          c = ii(c, d, a, b, x[k + 14], 15, 0xAB9423A7);
          b = ii(b, c, d, a, x[k + 5], 21, 0xFC93A039);
          a = ii(a, b, c, d, x[k + 12], 6, 0x655B59C3);
          d = ii(d, a, b, c, x[k + 3], 10, 0x8F0CCC92);
          c = ii(c, d, a, b, x[k + 10], 15, 0xFFEFF47D);
          b = ii(b, c, d, a, x[k + 1], 21, 0x85845DD1);
          a = ii(a, b, c, d, x[k + 8], 6, 0x6FA87E4F);
          d = ii(d, a, b, c, x[k + 15], 10, 0xFE2CE6E0);
          c = ii(c, d, a, b, x[k + 6], 15, 0xA3014314);
          b = ii(b, c, d, a, x[k + 13], 21, 0x4E0811A1);
          a = ii(a, b, c, d, x[k + 4], 6, 0xF7537E82);
          d = ii(d, a, b, c, x[k + 11], 10, 0xBD3AF235);
          c = ii(c, d, a, b, x[k + 2], 15, 0x2AD7D2BB);
          b = ii(b, c, d, a, x[k + 9], 21, 0xEB86D391);
          a = addUnsigned(a, AA);
          b = addUnsigned(b, BB);
          c = addUnsigned(c, CC);
          d = addUnsigned(d, DD);
        }
        
        return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
      };

      // 提示词标签组件 - sd-webui-prompt-all-in-one风格（带翻译功能）
      const PromptTagManager = ({ value, onChange, type = 'positive', availableTags = [], externalIgnoredTags, externalSetIgnoredTags, booruTags = [], externalTranslations = {}, onTranslationUpdate, availableModels = [], onParseWebUIParams = null, tagBrowserCategory = 'all', onCloneImage = null }) => {
        const [inputValue, setInputValue] = useState('');

        const [activeTab, setActiveTab] = useState('tags');
        const [translations, setTranslations] = useState(externalTranslations);
        const [isTranslating, setIsTranslating] = useState(false);

        // 同步外部 translations 更新 - 只在外部有内容时合并，不覆盖内部积累的翻译
        useEffect(() => {
          if (externalTranslations && Object.keys(externalTranslations).length > 0) {
            setTranslations(prev => ({ ...prev, ...externalTranslations }));
          }
        }, [externalTranslations]);
        const [hoveredTag, setHoveredTag] = useState(null);
        const [internalIgnoredTags, setInternalIgnoredTags] = useState(new Set());
        const [selectedTags, setSelectedTags] = useState(new Set());
        const [isSelecting, setIsSelecting] = useState(false);
        const [selectionStart, setSelectionStart] = useState(null);
        const [selectionEnd, setSelectionEnd] = useState(null);
        const [dragOverIndex, setDragOverIndex] = useState(null);
        const [isDragging, setIsDragging] = useState(false);
        const [searchSuggestions, setSearchSuggestions] = useState([]);
        const [showSuggestions, setShowSuggestions] = useState(false);
        const [isInputFocused, setIsInputFocused] = useState(false);
        const [showCloneConfirm, setShowCloneConfirm] = useState(false);
        const [droppedImage, setDroppedImage] = useState(null);
        const [isImageDragging, setIsImageDragging] = useState(false);
        const tagContainerRef = useRef(null);
        const selectionStartRef = useRef(null);
        const selectionEndRef = useRef(null);
        const inputRef = useRef(null);
        const suggestionsRef = useRef(null);
        const textareaRef = useRef(null);

        // 使用外部传入的 ignoredTags 或内部的
        const ignoredTags = externalIgnoredTags !== undefined ? externalIgnoredTags : internalIgnoredTags;
        const setIgnoredTags = externalSetIgnoredTags !== undefined ? externalSetIgnoredTags : setInternalIgnoredTags;

        useEffect(() => {
          selectionStartRef.current = selectionStart;
        }, [selectionStart]);

        useEffect(() => {
          selectionEndRef.current = selectionEnd;
        }, [selectionEnd]);

        useEffect(() => {
          if (!isSelecting) return;
          
          const handleGlobalMouseMove = (e) => {
            setSelectionEnd({ x: e.clientX, y: e.clientY });
          };
          
          const handleGlobalMouseUp = (e) => {
            setIsSelecting(false);
            
            const start = selectionStartRef.current;
            const end = selectionEndRef.current;
            
            if (start && end) {
              const left = Math.min(start.x, end.x);
              const right = Math.max(start.x, end.x);
              const top = Math.min(start.y, end.y);
              const bottom = Math.max(start.y, end.y);
              
              const tagElements = tagContainerRef.current?.querySelectorAll('.tag-item');
              if (tagElements && tagElements.length > 0) {
                const newSelected = new Set();
                tagElements.forEach((el, i) => {
                  const rect = el.getBoundingClientRect();
                  if (rect.right >= left && rect.left <= right && 
                      rect.bottom >= top && rect.top <= bottom) {
                    newSelected.add(i);
                  }
                });
                
                if (newSelected.size > 0) {
                  setSelectedTags(newSelected);
                }
              }
            }
            
            setSelectionStart(null);
            setSelectionEnd(null);
          };
          
          window.addEventListener('mousemove', handleGlobalMouseMove);
          window.addEventListener('mouseup', handleGlobalMouseUp);
          
          return () => {
            window.removeEventListener('mousemove', handleGlobalMouseMove);
            window.removeEventListener('mouseup', handleGlobalMouseUp);
          };
        }, [isSelecting]);

        // 点击标签容器空白区域取消选中
        useEffect(() => {
          if (selectedTags.size === 0) return;
          
          const handleClickInContainer = (e) => {
            // 如果点击的是标签元素本身，不取消选中（让标签点击事件处理）

        const parseTags = (text) => {

          while ((match = regex.exec(text + ',')) !== null) {
            if (match[1] && match[1].trim()) {
              tags.push({
                text: match[1].trim(),
                weight: match[2] ? parseFloat(match[2]) : 1.0
              });
            }
          }
          return tags;
        };
