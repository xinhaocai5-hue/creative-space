        const compressImage = async (dataUrl, targetSizeKB) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = async () => {
                    const targetBytes = targetSizeKB * 1024;
                    const maxDimension = 2048;

                    let { width, height } = img;
                    if (width > maxDimension || height > maxDimension) {
                        if (width > height) {
                            height = (height / width) * maxDimension;
                            width = maxDimension;
                        } else {
                            width = (width / height) * maxDimension;
                            height = maxDimension;
                        }
                    }

                    const tryQuality = (canvas, quality) => {
                        return new Promise((res) => {
                            canvas.toBlob(
                                async (blob) => {
                                    const reader = new FileReader();
                                    reader.onloadend = () => res({ base64: reader.result, size: blob.size });
                                    reader.readAsDataURL(blob);
                                },
                                'image/webp',
                                quality
                            );
                        });
                    };

                    const findBestForSize = async (canvas, w, h) => {
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);

                        let lowQ = 0.1,
                            highQ = 0.9;
                        let best = { base64: null, size: Infinity };

                        let result = await tryQuality(canvas, highQ);
                        if (result.size <= targetBytes) {
                            return result;
                        }

                        for (let i = 0; i < 10; i++) {
                            const midQ = (lowQ + highQ) / 2;
                            result = await tryQuality(canvas, midQ);
                            if (result.size <= targetBytes) {
                                best = result;
                                lowQ = midQ;
                            } else {
                                highQ = midQ;
                            }
                        }

                        if (best.size === Infinity) {
                            best = await tryQuality(canvas, 0.1);
                        }
                        return best;
                    };

                    let canvas = document.createElement('canvas');
                    let scale = 1.0;
                    let bestOverall = { base64: null, size: Infinity };

                    while (scale >= 0.1) {
                        const w = Math.max(1, Math.floor(width * scale));
                        const h = Math.max(1, Math.floor(height * scale));

                        const result = await findBestForSize(canvas, w, h);
                        if (result.size <= targetBytes) {
                            resolve(result.base64);
                            return;
                        } else {
                            if (result.size < bestOverall.size) {
                                bestOverall = result;
                            }
                        }

                        scale *= 0.7;
                    }

                    resolve(bestOverall.base64);
                };
                img.src = dataUrl;
            });
        };

        const handleImageUploadForChar = async (char, file) => {
            if(!file) return;
            
            // 检查是否是模型
            const isCheckpoint = checkpoints.some(c => c.id === char.id);
            const isLora = loras.some(c => c.id === char.id);
            const isModel = isCheckpoint || isLora;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                // 模型直接使用原始图片，不压缩
                const originalImageSrc = e.target.result;
                let displayImageSrc = originalImageSrc;
                
                // 只有非模型角色才压缩图片
                if (imageCompression && !isModel) {
                    try {
                        displayImageSrc = await compressImage(e.target.result, imageCompressionSize);
                    } catch (err) {
                        console.error('Image compression failed:', err);
                    }
                }
                
                // 更新状态
                if (isCheckpoint) {
                    setCheckpoints(prev => prev.map(c => c.id === char.id ? { ...c, imageSrc: displayImageSrc } : c));
                } else if (isLora) {
                    setLoras(prev => prev.map(c => c.id === char.id ? { ...c, imageSrc: displayImageSrc } : c));
                } else {
                    setCharacters(prev => prev.map(c => c.id === char.id ? { ...c, imageSrc: displayImageSrc } : c));
                }
                
                // 如果是模型，尝试保存图片到文件夹（使用原始未压缩的图片）
                if (isModel) {
                    const modelGroupId = char?.groups?.[0];
                    const dirHandle = modelGroupId ? groupDirHandles[modelGroupId] : null;
                    
                    if (dirHandle) {
                        try {
                            // 获取模型文件名（去掉扩展名）
                            const modelName = char.modelPath?.replace(/\.[^/.]+$/, '') || char.clean_name;
                            // 获取原文件扩展名
                            const ext = file.name.match(/\.[^.]+$/)?.[0] || '.png';
                            const imageFileName = `${modelName}${ext}`;
                            
                            // 将 base64 转换为 blob（使用原始未压缩图片）
                            const base64Data = originalImageSrc.split(',')[1];
                            const byteCharacters = atob(base64Data);
                            const byteNumbers = new Array(byteCharacters.length);
                            for (let i = 0; i < byteCharacters.length; i++) {
                                byteNumbers[i] = byteCharacters.charCodeAt(i);
                            }
                            const byteArray = new Uint8Array(byteNumbers);
                            const blob = new Blob([byteArray], { type: file.type || 'image/png' });
                            
                            // 保存到文件夹
                            const fileHandle = await dirHandle.getFileHandle(imageFileName, { create: true });
                            const writable = await fileHandle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                            
                            console.log(`Saved image ${imageFileName} to folder`);
                            alert(`图片已保存到文件夹: ${imageFileName}`);
                        } catch (err) {
                            console.error('Failed to save image to folder:', err);
                            alert('保存图片到文件夹失败: ' + err.message);
                        }
                    } else {
                        // 没有文件夹句柄，提示用户重新链接
                        const shouldRelink = confirm('未找到文件夹访问权限（可能是页面刷新后）\n\n是否重新链接文件夹？');
                        if (shouldRelink) {
                            handleLinkFolder(modelGroupId);
                        }
                    }
                }
            };
            reader.readAsDataURL(file);
        };

            }

        const handleCopy = useCallback((id, text) => { navigator.clipboard.writeText(text); setCharacters(prev => prev.map(c => c.id === id ? { ...c, copyCount: (c.copyCount || 0) + 1 } : c)); }, []);

        const fetchLocalImage = async (char) => {
            const names = [char.clean_name, char.value].filter(Boolean);
            const extensions = ['png', 'jpg', 'jpeg', 'webp'];

            for (const name of names) {
                for (const ext of extensions) {
                    try {
                        const response = await fetch(`output/${name}.${ext}`);
                        if (response.ok) {
                            return { blob: await response.blob(), ext };
                        }
                    } catch (e) {}
                }
            }
            return null;
        };

        const handleZipExport = async () => {
            setIsZipExporting(true);
            try {
                const zip = new JSZip();
                const imgFolder = zip.folder("images");
                const exportData = {
                  version: '2.0',
                  groups: groups,
                  characters: {}
                };
                const validChars = characters.filter(c => !c.deletedAt);

                validChars.forEach(c => {
                    const gs = c.groups.length > 0 ? c.groups : ["未分组"];
                    gs.forEach(g => {
                        if (!exportData.characters[g]) exportData.characters[g] = [];
                        exportData.characters[g].push({
                            id: c.id,
                            clean_name: c.clean_name,
                            value: c.value,
                            groups: c.groups,
                            isFavorite: c.isFavorite,
                            createdAt: c.createdAt,
                            copyCount: c.copyCount,
                            imagePath: `images/${c.id}.png`
                        });
                    });
                });

                const imagePromises = validChars.map(async (c) => {
                    if (c.imageSrc && c.imageSrc.startsWith('data:')) {
                        try {
                            const res = await fetch(c.imageSrc);
                            const blob = await res.blob();
                            imgFolder.file(`${c.id}.png`, blob);
                        } catch (e) {
                            console.warn(`Failed to export image for ${c.clean_name}:`, e);
                        }
                    } else {
                        const localImage = await fetchLocalImage(c);
                        if (localImage) {
                            imgFolder.file(`${c.id}.png`, localImage.blob);
                        }
                    }
                });

                await Promise.all(imagePromises);
                zip.file("data.json", JSON.stringify(exportData, null, 2));
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, "Echo_Backup.zip");
            } catch(e) { alert("Export Failed: "+e); }
            setIsZipExporting(false);
        };

        const handleExportJson = () => {
             const exportData = {
               version: '2.0',
               groups: groups,
               characters: {}
             };
             characters.filter(c => !c.deletedAt).forEach(c => {
                 const g = c.groups[0] || "未分组";
                 if(!exportData.characters[g]) exportData.characters[g] = [];
                 exportData.characters[g].push(c);
             });
             saveAs(new Blob([JSON.stringify(exportData, null, 2)], {type : 'application/json'}), "characters.json");
        };

        const handleExportArtists = () => {
            const artists = characters.filter(c => !c.deletedAt && c.groups && c.groups.includes('画师串'));
            const exportData = { '画师串': artists };
            saveAs(new Blob([JSON.stringify(exportData, null, 2)], {type : 'application/json'}), "画师串_export.json");
        };

        const handleDragEnter = (e) => { e.preventDefault(); e.stopPropagation(); };
        const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); };
        const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };
        const handleDrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file) return;
            if (file.type.startsWith('image/')) {
                return;
            }
            e.stopPropagation();
            handleFileImport(file);
        };

        const filteredAndSorted = useMemo(() => {
            // 实际生效的分组：子路径钻取的最深一层，若无钻取则用侧边栏选中的分组
            const effectiveGroupId = subGroupPath.length > 0 ? subGroupPath[subGroupPath.length - 1] : selectedGroup;
            let res = characters;

            // 统一先剔除已删除的卡片，回收站分支除外（它需要展示 deleted 项）
            if (effectiveGroupId !== '__recycle__') {
                res = res.filter(c => !c.deletedAt);
            }

            // 处理特殊分组
            if (effectiveGroupId === '__recycle__') res = res.filter(c => c.deletedAt);
            else if (effectiveGroupId === 'lora') {
                // 显示LoRA
                res = loras.filter(c => !c.deletedAt);
            }
            else if (effectiveGroupId) {
                // 获取当前分组及其所有子分组
                const selectedGroupObj = findGroupById(groups, effectiveGroupId);
                if (selectedGroupObj) {
                    const allGroupIds = getGroupAndChildrenIds(selectedGroupObj);

                    // 检查是否是模型分组（在"模型"分组下）
                    const modelsGroup = groups.find(g => g.id === 'models');
                    let allModelGroupIds = new Set();
                    if (modelsGroup) {
                        allModelGroupIds.add('models');
                        const collectIds = (items) => {
                            items.forEach(item => {
                                allModelGroupIds.add(item.id);
                                if (item.children) collectIds(item.children);
                            });
                        };
                        if (modelsGroup.children) collectIds(modelsGroup.children);
                    }

                    const isModelGroup = allModelGroupIds.has(effectiveGroupId);

                    // 如果是模型分组，从checkpoints中过滤
                    if (isModelGroup) {
                        res = checkpoints.filter(c => {
                            const match = c.groups && c.groups.some(g => allGroupIds.includes(g));
                            return match;
                        });
                    } else {
                        // 普通分组，从characters中过滤
                        res = res.filter(c => !c.deletedAt && c.groups && c.groups.some(g => allGroupIds.includes(g) || allGroupIds.some(id => {
                            const groupObj = findGroupById(groups, id);
                            return groupObj && groupObj.name === g;
                        })));
                    }
                } else if (effectiveGroupId === '__favorites__') {
                    res = res.filter(c => !c.deletedAt && c.isFavorite);
                } else if (effectiveGroupId === '__artists__') {
                    res = res.filter(c => !c.deletedAt && c.groups && c.groups.includes('画师串'));
                }
            }
            if (search) {
                const l = search.toLowerCase();
                res = res.filter(c =>
                    !c.deletedAt && (
                        c.clean_name.toLowerCase().includes(l) ||
                        c.value.toLowerCase().includes(l) ||
                        (c.groups && c.groups.some(g => g.toLowerCase().includes(l)))
                    )
                );
            }
            if (filterOption === 'uncategorized') {
                res = res.filter(c => !c.groups || c.groups.length === 0 || c.groups.includes("未分组"));
            }

            return res.sort((a, b) => {
                if (sortOption === 'oldest') return (a.createdAt||0) - (b.createdAt||0);
                if (sortOption === 'az') return a.clean_name.localeCompare(b.clean_name);
                if (sortOption === 'usage') return (b.copyCount||0) - (a.copyCount||0);
                if (sortOption === 'prompt-len') return b.value.length - a.value.length;
                return (b.createdAt||0) - (a.createdAt||0);
            });
        }, [characters, loras, checkpoints, selectedGroup, subGroupPath, search, sortOption, filterOption, findGroupById, getGroupAndChildrenIds]);

        const visibleChars = useMemo(() => filteredAndSorted.slice(0, displayCount), [filteredAndSorted, displayCount]);
        useEffect(() => { resetScroll(); if(mainScrollRef.current) mainScrollRef.current.scrollTop = 0; }, [selectedGroup, search, sortOption, filterOption]);

        // 多级分组路径导航：在选中一个主分组时，按层级展示其子分组按钮
        // 行 1：selectedGroup 的子分组
        // 行 2：subGroupPath[0] 的子分组（若该子分组有 children）
        // 行 3：subGroupPath[1] 的子分组（若该子分组有 children）...
        const renderSubGroupNav = () => {
            if (!selectedGroup) return null;
            if (['__favorites__', '__artists__', '__recycle__', 'lora'].includes(selectedGroup)) return null;
            const root = findGroupById(groups, selectedGroup);
            if (!root) return null;

            const rows = [];
            // 行 1：根分组的子分组
            const lvl1 = root.children || [];
            if (lvl1.length === 0) return null;
            rows.push({ parent: root, children: lvl1 });

            // 后续行：subGroupPath 各级对应的子分组
            for (let i = 0; i < subGroupPath.length; i++) {
                const parent = findGroupById(groups, subGroupPath[i]);
                if (!parent) break;
                const children = parent.children || [];
                if (children.length === 0) break;
                rows.push({ parent, children });
            }

            return (
                <div className="space-y-2 mb-4 sticky top-0 z-20 bg-[var(--bg-primary)]/90 backdrop-blur-md -mx-6 px-6 py-3 border-b border-gray-200/60 dark:border-white/5">
                    {rows.map((row, rowIdx) => {
                        const activeChildId = subGroupPath[rowIdx] || null; // null 表示"全部"高亮
                        return (
                            <div key={row.parent.id} className="flex flex-wrap items-center gap-2">
                                <span className="text-[11px] font-semibold text-gray-400 dark:text-neutral-500 mr-1 select-none whitespace-nowrap">
                                    {row.parent.name}
                                </span>
                                <button
                                    onClick={() => setSubGroupPath(subGroupPath.slice(0, rowIdx))}
                                    className={`px-3 py-1.5 text-xs font-medium rounded-lg transition-all duration-200 ${
                                        activeChildId === null
                                            ? 'bg-white dark:bg-white/10 text-gray-900 dark:text-white shadow-sm border border-gray-200 dark:border-white/15'
                                            : 'text-gray-500 dark:text-neutral-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 border border-transparent'
                                    }`}
                                >
                                    全部
                                </button>
                                {row.children.map(child => (
                                    <button
                                        key={child.id}
                                        onClick={() => setSubGroupPath([...subGroupPath.slice(0, rowIdx), child.id])}
                                        className={`px-3 py-1.5 text-xs font-medium rounded-lg transition-all duration-200 ${
                                            activeChildId === child.id
                                                ? 'bg-white dark:bg-white/10 text-gray-900 dark:text-white shadow-sm border border-gray-200 dark:border-white/15'
                                                : 'text-gray-500 dark:text-neutral-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 border border-transparent'
                                        }`}
                                    >
                                        {child.name}
                                    </button>
                                ))}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // 递归更新分组计数
        const updateGroupCounts = (groups, counts) => {
          return groups.map(group => {
            const newGroup = { ...group };
            // 更新当前分组的计数
            if (counts[group.name] !== undefined) {
              newGroup.count = counts[group.name];
            }
            // 递归更新子分组
            if (group.children && group.children.length > 0) {
              newGroup.children = updateGroupCounts(group.children, counts);
            }
            return newGroup;
          });
        };
        
        // 计算所有分组（包括树形结构中的）的计数
        useEffect(() => {
          const counts = {};
          const treeGroupNames = new Set();
          
          // 收集所有分组名称
          const collectGroupNames = (groups) => {
            groups.forEach(group => {
              counts[group.name] = 0;
              treeGroupNames.add(group.name);
              if (group.children) collectGroupNames(group.children);
            });
          };
          
          // 从现有groups收集名称
          collectGroupNames(groups);
          
          // 添加画师串
          counts['画师串'] = 0;
          treeGroupNames.add('画师串');
          
          // 从角色数据中收集所有分组名称（排除已在上方按钮中的分组）
          const missingGroups = [];
          const excludedGroups = ['画师串', 'LoRA模型']; // 已在上方有专门按钮的分组
          characters.filter(c => !c.deletedAt).forEach(c => {
            c.groups.forEach(g => {
              counts[g] = (counts[g] || 0) + 1;
              // 如果分组不在树形结构中且不在排除列表中，添加到缺失列表
              if (!treeGroupNames.has(g) && !excludedGroups.includes(g)) {
                missingGroups.push(g);
              }
            });
          });
          
          // 如果有缺失的分组，添加到树形结构中
          if (missingGroups.length > 0) {
            const uniqueMissing = [...new Set(missingGroups)];
            setGroups(prevGroups => {
              const newGroups = [...prevGroups];
              uniqueMissing.forEach(groupName => {
                // 检查是否已存在
                const exists = newGroups.some(g => g.name === groupName);
                if (!exists) {
                  newGroups.push({
                    id: 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    name: groupName,
                    icon: 'folder',
                    children: []
                  });
                }
              });
              return newGroups;
            });
          }
          
          // 更新groups的计数
          setGroups(prevGroups => updateGroupCounts(prevGroups, counts));
        }, [characters]);

        const handleUpdateChar = (uc) => { setCharacters(p => p.map(c => c.id === uc.id ? uc : c)); setModals({...modals, edit:false}); };
        const handleAddChar = (nc) => { setCharacters(p => [nc, ...p]); setModals({...modals, edit:false}); };
        const toggleFav = (id) => setCharacters(p => p.map(c => c.id === id ? {...c, isFavorite: !c.isFavorite} : c));
        const handleDelete = (ids) => {
             if(!confirm("确认删除?")) return;
             if(selectedGroup==='__recycle__') setCharacters(p=>p.filter(c=>!ids.has(c.id)));
             else { const now=Date.now(); setCharacters(p=>p.map(c=>ids.has(c.id)?{...c, deletedAt:now}:c)); }
             setSelectedIds(new Set());
        };
        const handleRestore = (ids) => { setCharacters(p=>p.map(c=>ids.has(c.id)?{...c, deletedAt:null}:c)); setSelectedIds(new Set()); };
        
        // 递归更新分组
        const updateGroupInTree = (groups, id, updater) => {
          return groups.map(group => {
            if (group.id === id) {
              return updater(group);
            }
            if (group.children) {
              return { ...group, children: updateGroupInTree(group.children, id, updater) };
            }
            return group;
          });
        };
        
        // 递归删除分组
        const deleteGroupFromTree = (groups, id) => {
          return groups.filter(group => group.id !== id).map(group => {
            if (group.children) {
              return { ...group, children: deleteGroupFromTree(group.children, id) };
            }
            return group;
          });
        };
        
        // 递归添加子分组
        const addSubgroupToTree = (groups, parentId, newGroup) => {
          return groups.map(group => {
            if (group.id === parentId) {
              return { ...group, children: [...(group.children || []), newGroup] };
            }
            if (group.children) {
              return { ...group, children: addSubgroupToTree(group.children, parentId, newGroup) };
            }
            return group;
          });
        };
        
        // 获取所有分组ID的列表（用于检查重名）
        const getAllGroupIds = (groups) => {
          const ids = [];
          const traverse = (groups) => {
            groups.forEach(group => {
              ids.push(group.id);
              if (group.children) traverse(group.children);
            });
          };
          traverse(groups);
          return ids;
        };
        
        // 生成唯一ID
        const generateGroupId = () => 'group_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        // 创建顶级分组
        const createGroup = (name) => {
          if (!name) return;
          const newId = generateGroupId();
          const newGroup = { id: newId, name, icon: 'folder', children: [] };
          
          // 直接添加到 groups 数组
          setGroups(p => [...p, newGroup]);
        };
        
        // 创建模型分组的子分组（从模型分组+按钮创建）
        const createModelSubgroup = (name) => {
          if (!name) return;
          const newId = generateGroupId();
          const newGroup = { id: newId, name, icon: 'folder', children: [] };
          
          // 添加到模型分组的 children 中
          setGroups(p => {
            const newGroups = [...p];
            const modelsGroupIndex = newGroups.findIndex(g => g.id === 'models');
            if (modelsGroupIndex !== -1) {
              const modelsGroup = { ...newGroups[modelsGroupIndex] };
              modelsGroup.children = [...(modelsGroup.children || []), newGroup];
              newGroups[modelsGroupIndex] = modelsGroup;
            }
            return newGroups;
          });
          
          // 自动展开模型分组
          setExpandedGroups(prev => new Set([...prev, 'models']));
        };
        
        // 创建子分组
        const createSubgroup = (parentId) => {
          // 特殊处理模型分组 - 打开添加分组方式选择界面
          if (parentId === 'models') {
            setModals(p => ({...p, addGroupChoice: true}));
            return;
          }
          
          // 特殊处理画师串和LoRA
          if (parentId === '__artists__' || parentId === 'lora') {
            const parentName = parentId === '__artists__' ? '画师串' : 'LoRA模型';
            const name = prompt(`在 "${parentName}" 下创建子分组:`, '新分组');
            if (!name) return;
            
            const newId = generateGroupId();
            const newGroup = { id: newId, name, icon: 'folder', children: [] };
            
            // 检查是否已存在对应的树形分组
            const existingGroup = groups.find(g => g.id === parentId);
            if (existingGroup) {
              // 添加到现有分组
              setGroups(p => addSubgroupToTree(p, parentId, newGroup));
            } else {
              // 创建新的树形分组
              const treeGroup = {
                id: parentId,
                name: parentName,
                icon: parentId === '__artists__' ? 'palette' : 'tag',
                isSystem: true,
                children: [newGroup]
              };
              setGroups(p => [...p, treeGroup]);
            }
            
            // 自动展开父分组
            setExpandedGroups(prev => new Set([...prev, parentId]));
            return;
          }
          
          const parent = findGroupById(groups, parentId);
          if (!parent) return;
          
          const name = prompt(`在 "${parent.name}" 下创建子分组:`, '新分组');
          if (!name) return;
          
          const newId = generateGroupId();
          const newGroup = { id: newId, name, icon: 'folder', children: [] };
          setGroups(p => addSubgroupToTree(p, parentId, newGroup));
          
          // 自动展开父分组
          setExpandedGroups(prev => new Set([...prev, parentId]));
        };
        
        // 编辑分组
        const editGroup = (groupId, newName) => {
          const group = findGroupById(groups, groupId);
          if (!group) return;
          
          if (group.isSystem) {
            alert('系统分组不能编辑');
            return;
          }
          
          if (newName && newName !== group.name) {
            setGroups(p => updateGroupInTree(p, groupId, g => ({ ...g, name: newName })));
            // 更新角色的分组引用
            setCharacters(p => p.map(c => ({
              ...c,
              groups: c.groups.map(g => g === group.name ? newName : g)
            })));
          }
        };
        
        // 删除分组
        const deleteGroup = (groupId, isExport) => {
          const group = findGroupById(groups, groupId);
          if (!group) return;
          
          if (isExport) {
            const exportData = {};
            // 获取当前分组及其所有子分组的名称
            const allGroupIds = getGroupAndChildrenIds(group);
            const allGroupNames = new Set();
            allGroupIds.forEach(id => {
              const g = findGroupById(groups, id);
              if (g) allGroupNames.add(g.name);
            });
            
            characters.filter(c => !c.deletedAt && c.groups && c.groups.some(g => allGroupNames.has(g))).forEach(c => {
              c.groups.forEach(g => {
                if (allGroupNames.has(g)) {
                  if (!exportData[g]) exportData[g] = [];
                  exportData[g].push(c);
                }
              });
            });
            saveAs(new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' }), `${group.name}_export.json`);
            return;
          }
          
          if (group.isSystem) {
            alert('系统分组不能删除');
            return;
          }
          
          if (!confirm(`确认删除分组 "${group.name}"?`)) return;
          
          // 获取当前分组及其所有子分组的名称
          const allGroupIds = getGroupAndChildrenIds(group);
          const allGroupNames = new Set();
          allGroupIds.forEach(id => {
            const g = findGroupById(groups, id);
            if (g) allGroupNames.add(g.name);
          });
          
          const charsInGroup = characters.filter(c => !c.deletedAt && c.groups && c.groups.some(g => allGroupNames.has(g)));
          let deleteChars = false;
          if (charsInGroup.length > 0) {
            deleteChars = confirm(`分组及其子分组内共包含 ${charsInGroup.length} 个角色，是否同时将这些角色移入回收站？\n点击【取消】仅删除分组标签（角色将保留）`);
          }

          setCharacters(p => p.map(c => {
            if (c.groups && c.groups.some(g => allGroupNames.has(g))) {
              if (deleteChars && !c.deletedAt) {
                return { ...c, groups: c.groups.filter(g => !allGroupNames.has(g)), deletedAt: Date.now() };
              }
              return { ...c, groups: c.groups.filter(g => !allGroupNames.has(g)) };
            }
            return c;
          }));
          
          // 删除分组的链接信息
          if (linkedFolders[groupId]) {
            setLinkedFolders(prev => {
              const newLinkedFolders = { ...prev };
              delete newLinkedFolders[groupId];
              return newLinkedFolders;
            });
            // 删除文件夹句柄
            setGroupDirHandles(prev => {
              const newHandles = { ...prev };
              delete newHandles[groupId];
              return newHandles;
            });
            // 删除该分组的模型
            setCheckpoints(prev => prev.filter(c => !c.groups?.includes(groupId)));
            setLoras(prev => prev.filter(c => !c.groups?.includes(groupId)));
          }
          
          setGroups(p => {
            const newGroups = deleteGroupFromTree(p, groupId);
            
            // 清理展开状态：如果父分组没有子分组了，则折叠它
            setExpandedGroups(prev => {
              const newExpanded = new Set(prev);
              // 检查所有展开的分组
              newExpanded.forEach(expandedId => {
                const groupStillExists = findGroupById(newGroups, expandedId);
                if (groupStillExists) {
                  const hasChildren = groupStillExists.children && groupStillExists.children.length > 0;
                  const isLinked = linkedFolders[expandedId];
                  // 如果没有子分组且没有链接，则折叠
                  if (!hasChildren && !isLinked) {
                    newExpanded.delete(expandedId);
                  }
                } else {
                  // 分组已不存在，从展开状态中移除
                  newExpanded.delete(expandedId);
                }
              });
              return newExpanded;
            });
            
            return newGroups;
          });
        };
        
        // 展开/折叠分组
        const toggleExpandGroup = (groupId) => {
          setExpandedGroups(prev => {
            const newSet = new Set(prev);
            if (newSet.has(groupId)) {
              newSet.delete(groupId);
            } else {
              newSet.add(groupId);
            }
            return newSet;
          });
        };
        
        // 链接文件夹到分组
        const handleLinkFolder = async (groupId) => {
          if (!('showDirectoryPicker' in window)) {
            alert('您的浏览器不支持文件夹选择功能');
            return;
          }
          
          // 检查是否已链接
          if (linkedFolders[groupId]) {
            const shouldUnlink = confirm(`分组已链接到文件夹 "${linkedFolders[groupId]}"\n\n是否取消链接？`);

            // 获取文件夹内所有文件

                id: generateId(),

                defaultStrength: noteData.defaultStrength ?? 0.8,

                imageSrc: imageSrc,
                modelPath: file.name,
                folderPath: dirHandle.name,

              };
            }));

            // 根据分组ID决定添加到哪个状态（带认亲机制，优先保留有imageSrc的）
            console.log('Linking models to group:', groupId, 'Count:', newModels.length);
            console.log('New models:', newModels.map(m => ({ name: m.clean_name, groups: m.groups, hasImage: !!m.imageSrc })));

            const updateState = (prev) => {
              const merged = [...prev];

              for (const newModel of newModels) {
                const normalizedNewPath = normalizePath(newModel.modelPath);
                const existingIndex = merged.findIndex(m => {
                  const normalizedExistingPath = normalizePath(m.modelPath);
                  const normalizedExistingName = normalizePath(m.clean_name);
                  return normalizedExistingPath === normalizedNewPath ||
                         normalizedExistingName === normalizePath(newModel.clean_name);
                });

                if (existingIndex >= 0) {
                  const existing = merged[existingIndex];
                  const shouldReplace = !existing.imageSrc && newModel.imageSrc;

                  if (shouldReplace) {
                    console.log(`手动连接替换模型：${newModel.clean_name}（新模型有图片）`);
                    merged[existingIndex] = { ...newModel, id: existing.id };
                  } else {
                    merged[existingIndex] = {
                      ...existing,
                      groups: [...new Set([...existing.groups, ...newModel.groups])]
                    };

                } else {
                  merged.push(newModel);

            if (groupId === 'lora') {
              setLoras(updateState);
              alert(`成功链接 ${newModels.length} 个LoRA模型`);
            } else {
