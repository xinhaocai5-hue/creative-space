    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              neutral: { 850: '#1f1f1f', 900: '#171717', 925: '#121212', 950: '#0a0a0a' },
              accent: { DEFAULT: '#3b82f6', glow: 'rgba(59, 130, 246, 0.5)' }
            },
            fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'] },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up-bar': 'slideUpBar 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pop': 'pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)',
              'spin-slow': 'spin 2s linear infinite',
              'text-reveal': 'textReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
              slideUpBar: { '0%': { opacity: '0', transform: 'translate(-50%, 20px)' }, '100%': { opacity: '1', transform: 'translate(-50%, 0)' } },
              pop: { '0%': { transform: 'scale(0.8)' }, '50%': { transform: 'scale(1.1)' }, '100%': { transform: 'scale(1)' } },
              textReveal: { '0%': { transform: 'translateY(40px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
            }
          }
        }
      }
      
      // 全局标签数据存储（避免localStorage超出配额）
      window.GLOBAL_TAG_DATA = [];
      
      // 从 Framer Motion 获取动画组件
      const { motion, AnimatePresence } = window.Motion || {};

    <style>
      /* ----- 物理新拟态核心变量 (适配亮/暗模式) ----- */
      :root {
        --bg-primary: #e0e5ec;
        --bg-secondary: #f0f5fa;
        --text-primary: #2d3e50;
        --text-secondary: #6b7a8d;
        --shadow-dark: #b8bcc2;
        --shadow-light: #ffffff;
        --card-bg: #e0e5ec;
        --inset-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        --raised-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
        --floating-shadow: 20px 20px 40px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
      }
      .dark {
        --bg-primary: #1a1e24;
        --bg-secondary: #0f1217;
        --text-primary: #e2e8f0;
        --text-secondary: #a0aec0;
        --shadow-dark: #0a0c10;
        --shadow-light: #2a2f38;
        --card-bg: #1a1e24;
        --inset-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        --raised-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
        --floating-shadow: 15px 15px 30px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s, color 0.3s;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
      }

      /* 通用新拟态类 */
      .neumorph-pressed {
        background: var(--bg-primary);
        box-shadow: var(--inset-shadow);
        border-radius: 1.25rem;
        transition: all 0.2s;
      }
      .neumorph-raised {
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 0.75rem;
        transition: all 0.2s;
      }
      .neumorph-raised:active {
        box-shadow: var(--inset-shadow);
        transform: scale(0.98);
      }
      .neumorph-input {
        background: var(--bg-primary);
        box-shadow: var(--inset-shadow);
        border: none;
        border-radius: 0.75rem;
        transition: all 0.2s;
      }
      .neumorph-input:focus {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }

      /* ===== 3D 悬浮卡片系统 (来自优秀UI动画) ===== */
      .perspective-box {
        perspective: 1500px;
      }

      .card-3d {
        position: relative;
        background: var(--card-bg);
        /* 增强阴影：下方阴影更明显，营造悬浮感 */
        box-shadow: 
          0 10px 30px var(--shadow-dark),      /* 下方主要阴影 */
          0 20px 40px -10px var(--shadow-dark), /* 下方扩散阴影 */
          -8px -8px 16px var(--shadow-light);   /* 上方高光 */
        border-radius: 1rem;
        transition: transform 0.1s ease-out, box-shadow 0.3s ease;
        transform-style: preserve-3d;
        will-change: transform;
        overflow: hidden;
      }

      /* 悬停时的阴影变化：更明显的悬浮效果 */
      .card-3d.floating {
        box-shadow: 
          0 20px 50px var(--shadow-dark),      /* 增强下方阴影 */
          0 30px 60px -15px var(--shadow-dark), /* 更强的扩散阴影 */
          -10px -10px 20px var(--shadow-light); /* 增强上方高光 */
        transform: translateY(-5px); /* 轻微上浮 */
      }

      /* 光泽层 - 跟随鼠标 */
      .glare {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.9) 0%, transparent 60%);
        opacity: 0;
        transition: opacity 0.3s;
        mix-blend-mode: overlay;
        border-radius: inherit;
        z-index: 10;
      }
      .card-3d:hover .glare {
        opacity: 0.5;
      }

      /* ===== 景深后退系统 ===== */
      .stage-back {
        transition: transform 0.6s var(--ease-smooth), opacity 0.6s;
      }
      .stage-back.pushed {
        transform: scale(0.9);
        opacity: 0.4;
        pointer-events: none;
      }

      /* ===== 浮动详情页 (弹性动画) ===== */
      .detail-floating {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0;
        pointer-events: none;
        z-index: 100;
        transition: transform 0.6s var(--ease-spring), opacity 0.4s ease;
      }
      .detail-floating.active {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      .detail-content {
        width: 85vw;
        max-width: 1100px;
        height: 80vh;
        background: var(--bg-primary);
        /* 超级阴影 */
        box-shadow: 30px 30px 60px var(--shadow-dark), -30px -30px 60px var(--shadow-light);
        border-radius: 2rem;
        overflow: hidden;
        display: flex;
        position: relative;
      }

      /* 关闭按钮 - 新拟态 */
      .close-btn {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        width: 2.5rem;
        height: 2.5rem;
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: all 0.2s;
      }
      .close-btn:active {
        box-shadow: var(--inset-shadow);
        transform: scale(0.95);
      }

      /* ===== 文字逐字动画 ===== */
      @keyframes textReveal {
        0% { transform: translateY(40px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .char-reveal {
        display: inline-block;
        opacity: 0;
        animation: textReveal 0.6s var(--ease-smooth) forwards;
      }

      /* 自定义滚动条 */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(100, 100, 100, 0.3); border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 100, 100, 0.5); }
      
      /* 黑夜模式下的滚动条 */
      @media (prefers-color-scheme: dark) {
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(80, 80, 80, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 100, 100, 0.7); }
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(80, 80, 80, 0.5); }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 100, 100, 0.7); }

      /* Modal 样式优化 - 弹性动画 */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        transition: opacity 0.3s;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        transition: opacity 0.3s;
      }

      .modal-content {
        position: relative;
        width: 100%;
        max-width: 32rem;
        background: var(--bg-primary);
        box-shadow: var(--floating-shadow);
        border-radius: 1.5rem;
        transform: scale(0.9) translateY(20px);
        opacity: 0;
        transition: transform 0.4s var(--ease-spring), opacity 0.3s;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
      }

      .modal-overlay.active .modal-content {
        transform: scale(1) translateY(0);
        opacity: 1;
      }

      /* 底部操作栏 - 弹性动画 */
      .action-bar {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--bg-primary);
        box-shadow: var(--floating-shadow);
        border-radius: 1rem;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: transform 0.5s var(--ease-spring), opacity 0.3s;
        z-index: 40;
      }

      .action-bar.active {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      input[type=range] { -webkit-appearance: none; background: transparent; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -4px; }
      input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(128,128,128,0.3); border-radius: 2px; }

      #loading-screen { position: fixed; inset: 0; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999; font-family: sans-serif; transition: opacity 0.5s; flex-direction: column; gap: 20px;}
      #error-log { color: #ef4444; font-family: monospace; font-size: 12px; max-width: 80%; word-break: break-all; text-align: center; display: none; }
/* Modal 从按钮位置展开动画 */
      .modal-expand-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .modal-expand-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .modal-expand-overlay.active .modal-expand-backdrop {
        opacity: 1;
      }

      .modal-expand-content {
        position: relative;
        width: 100%;
        max-width: 32rem;
        background: var(--bg-primary);
        border-radius: 1.5rem;
        box-shadow: var(--floating-shadow);
        /* 从按钮位置展开的动画 */
        transform: scale(0) translate(var(--origin-x, 0), var(--origin-y, 0));
        transform-origin: var(--click-x, 50%) var(--click-y, 50%);
        opacity: 0;
        transition: transform 0.5s var(--ease-spring), opacity 0.3s ease;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .modal-expand-overlay.active .modal-expand-content {
        transform: scale(1) translate(0, 0);
        opacity: 1;
      }

      /* 全局景深后退 - 应用于整个主容器 */
      .main-container {
        transition: transform 0.6s var(--ease-smooth), opacity 0.6s, filter 0.6s;
        transform-origin: center center;
      }

      .main-container.pushed-back {
        transform: scale(0.85) translateY(-20px);
        opacity: 0.5;
        filter: blur(2px);
        pointer-events: none;
      }

      /* ===== 从按钮位置展开的动画系统（修复版） ===== */

      /* 展开动画容器 - 独立于主容器，不受缩放影响 */
      .expand-overlay,
      .detail-expand-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        /* 关键：确保不受父容器transform/filter影响 */
        transform: none !important;
        filter: none !important;
      }

      .expand-overlay.active,
      .detail-expand-overlay.active {
        pointer-events: auto;
        opacity: 1;
      }

      /* 展开内容 - 放大渐显效果 */
      .expand-content {
        position: relative;
        width: 90vw;
        max-width: 500px;
        max-height: 85vh;
        background: var(--bg-primary);
        border-radius: 1.5rem;
        box-shadow: var(--floating-shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;

        /* 初始状态：缩小并透明 */
        transform: scale(0.5);
        opacity: 0;

        /* 放大渐显动画 - 弹性缓动 */
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .expand-overlay.active .expand-content {
        transform: scale(1);
        opacity: 1;
      }

      /* 详情页展开内容 */
      .detail-expand-content {
        position: relative;
        width: 85vw;
        max-width: 1100px;
        height: 80vh;
        background: var(--bg-primary);
        border-radius: 2rem;
        box-shadow: 30px 30px 60px var(--shadow-dark), -30px -30px 60px var(--shadow-light);
        overflow: hidden;
        display: flex;

        /* 初始状态：缩小并透明 */
        transform: scale(0.7);
        opacity: 0;

        /* 放大渐显动画 */
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .detail-expand-overlay.active .detail-expand-content {
        transform: scale(1);
        opacity: 1;
      }

/* 关闭按钮 */
      .expand-close-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.5rem;
        height: 2.5rem;
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: all 0.2s;
        border: none;
      }

      .expand-close-btn:active {
        box-shadow: var(--inset-shadow);
        transform: scale(0.95);
      }

      /* 确保内容在clip-path动画期间可交互 */
      .expand-content > *,
      .detail-expand-content > * {
        opacity: 0;
        transition: opacity 0.3s ease 0.3s;
      }

      .expand-overlay.active .expand-content > *,
      .detail-expand-overlay.active .detail-expand-content > * {
        opacity: 1;
      }

      /* ===== 全屏模态框样式（快捷生图） ===== */
      .fullscreen-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        transform: none !important;
        filter: none !important;
      }

      .fullscreen-modal-overlay.active {
        pointer-events: auto;
        opacity: 1;
      }

      .fullscreen-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .fullscreen-modal-overlay.active .fullscreen-modal-backdrop {
        opacity: 1;
      }

      .fullscreen-modal-content {
        position: relative;
        width: 95vw;
        height: 95vh;
        max-width: 1600px;
        background: var(--bg-primary);
        border-radius: 1.5rem;
        box-shadow: 30px 30px 60px var(--shadow-dark), -30px -30px 60px var(--shadow-light);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transform: scale(0.8);
        opacity: 0;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .fullscreen-modal-overlay.active .fullscreen-modal-content {
        transform: scale(1);
        opacity: 1;
      }

      .fullscreen-modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.5rem;
        height: 2.5rem;
        background: var(--bg-primary);
        box-shadow: var(--raised-shadow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 200;
        transition: all 0.2s;
        border: none;
      }

      .fullscreen-modal-close:hover {
        transform: rotate(90deg) scale(1.1);
        box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      }

      .fullscreen-modal-close:active {
        box-shadow: var(--inset-shadow);
        transform: rotate(90deg) scale(0.9);
      }

      /* 快捷生图界面布局 */
      .quick-gen-container {
        display: flex;
        height: 100%;
        overflow: hidden;
      }

      .quick-gen-sidebar {
        width: 380px;
        min-width: 200px;
        max-width: 800px;
        flex-shrink: 0;
        border-right: 1px solid rgba(128, 128, 128, 0.2);
        overflow-y: auto;
        padding: 1.5rem;
      }

      .quick-gen-resizer {
        width: 6px;
        background: transparent;
        cursor: col-resize;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      .quick-gen-resizer:hover {
        background: rgba(59, 130, 246, 0.3);
      }

      .quick-gen-resizer.dragging {
        background: rgba(59, 130, 246, 0.5);
      }

      .quick-gen-preview {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        overflow-y: auto;
        min-width: 300px;
      }

      /* 可折叠区域样式 */
      .collapsible-section {
        border-radius: 0.75rem;
        overflow: visible;
        margin-bottom: 1rem;
      }

      .collapsible-section.neumorph-input {
        border: none;
        background: var(--bg-primary);
        box-shadow: var(--inset-shadow);
      }

      .collapsible-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        background: transparent;
        cursor: pointer;
        transition: background 0.2s;
        border-radius: 0.75rem 0.75rem 0 0;
      }

      .collapsible-header:hover {
        background: rgba(128, 128, 128, 0.05);
      }

      .collapsible-content {
        padding: 1rem;
        border-top: 1px solid rgba(128, 128, 128, 0.2);
        overflow: visible;
      }

      .collapsible-section.neumorph-input .collapsible-content {
        border-top: none;
      }

      /* 进度条样式 */
      .gen-progress-container {
        width: 100%;
        height: 8px;
        background: rgba(128, 128, 128, 0.2);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 0.5rem;
      }

      .gen-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 4px;
        transition: width 0.3s ease;
      }

      /* 错误提示样式 */
      .error-toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #6b7280;
        color: white;
        padding: 1rem 2rem;
        border-radius: 0.75rem;
        box-shadow: 0 10px 30px rgba(107, 114, 128, 0.3);
        z-index: 3000;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .error-toast.success {
        background: #10b981;
        box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
      }

      .error-toast.show {
        transform: translateX(-50%) translateY(0);

    <div id="loading-screen">

    <script>
        window.onerror = function(msg, url, line, col, error) {
            const loader = document.getElementById('loading-screen');
            const log = document.getElementById('error-log');
            if(loader && log) {
                loader.style.zIndex = 10000;
                log.style.display = 'block';
                log.innerHTML += `<div>Error: ${msg} <br/> Line: ${line}</div>`;
            }
            return false;
        };
        
        window.onload = function() {
            setTimeout(() => {
                if (document.getElementById('root').children.length > 0) {
                    const loader = document.getElementById('loading-screen');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 500);
                    }
                }
            }, 800);
            
            // 初始化物理反馈系统
            initPhysicsFeedback();
        }
        
        // ===== 物理反馈系统 =====
        function initPhysicsFeedback() {
            // 波纹效果 - 为所有按钮添加点击波纹
            document.addEventListener('click', function(e) {
                const btn = e.target.closest('button, .sidebar-btn, .icon-btn, .card-action-btn, .tab-btn, [role="button"]');
                if (!btn) return;
                
                createRipple(e, btn);
            });
            
            // 磁吸悬停效果 - 按钮轻微跟随鼠标
            document.addEventListener('mousemove', function(e) {
                const magneticBtns = document.querySelectorAll('.magnetic-btn, .neumorph-raised.btn-physics');
                magneticBtns.forEach(btn => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    
                    if (Math.abs(x) < rect.width * 0.7 && Math.abs(y) < rect.height * 0.7) {
                        const strength = 0.12;
                        if (!btn.dataset.magneticActive) {
                            btn.dataset.magneticActive = 'true';
                        }
                        btn.style.setProperty('--magnetic-x', `${x * strength}px`);
                        btn.style.setProperty('--magnetic-y', `${y * strength}px`);
                    }
                });
            });
            
            document.addEventListener('mouseleave', function(e) {
                if (e.target.matches && e.target.matches('.magnetic-btn, .neumorph-raised.btn-physics')) {
                    delete e.target.dataset.magneticActive;
                    e.target.style.removeProperty('--magnetic-x');
                    e.target.style.removeProperty('--magnetic-y');
                }
            }, true);
            
            document.addEventListener('mouseup', function(e) {
                const btn = e.target.closest('button.btn-physics');
                if (btn) {
                    btn.classList.add('btn-released');
                    setTimeout(() => btn.classList.remove('btn-released'), 300);
                }
            });
        }
        
        function createRipple(event, element) {
            const computedStyle = getComputedStyle(element);
            const originalOverflow = computedStyle.overflow;
            const originalPosition = computedStyle.position;
            
            if (originalPosition === 'static') {
                element.style.position = 'relative';
            }
            if (originalOverflow !== 'hidden' && originalOverflow !== 'clip') {
                element.style.overflow = 'hidden';
            }
            
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 2.5;
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;
            
            const ripple = document.createElement('span');
            ripple.className = 'ripple-wave';
            ripple.style.cssText = `width: ${size}px; height: ${size}px; left: ${x}px; top: ${y}px;`;
            
            element.appendChild(ripple);
            
            ripple.addEventListener('animationend', () => {
                ripple.remove();
                if (originalOverflow !== 'hidden' && originalOverflow !== 'clip') {
                    element.style.overflow = originalOverflow;
                }
            });
        }
        
        function triggerGlow(element) {
            element.classList.add('btn-glowing');
            setTimeout(() => element.classList.remove('btn-glowing'), 400);
        }
    </script>

      const parseWebUIParams = (text, availableModels, handleChange) => {
        if (!text) return false;

        let positive = "";
        let negative = "";
        let params = {};

        // 定位提示词和参数部分
        const negIndex = text.indexOf("Negative prompt:");
        const stepsIndex = text.indexOf("Steps:");

        if (negIndex !== -1 && stepsIndex !== -1) {
            positive = text.substring(0, negIndex).trim();
            negative = text.substring(negIndex + 16, stepsIndex).trim();
        } else if (negIndex !== -1) {
            positive = text.substring(0, negIndex).trim();
            negative = text.substring(negIndex + 16).trim();
        } else if (stepsIndex !== -1) {
            positive = text.substring(0, stepsIndex).trim();
        } else {
            positive = text.trim();
        }

        // 解析键值对 (如 Steps: 30, CFG scale: 7)
        if (stepsIndex !== -1) {
            const paramStr = text.substring(stepsIndex);
            // 通过正则巧妙拆分 A1111 的逗号分隔格式
            const parts = paramStr.split(/(?:, |^)([A-Za-z0-9 \-]+):\s/g).filter(Boolean);
            for (let i = 0; i < parts.length; i += 2) {
                if (parts[i] && parts[i+1]) {
                    params[parts[i].trim().toLowerCase()] = parts[i+1].trim();
                }
            }
        }

        // 移除开头结尾多余的逗号
        positive = positive.replace(/^,+|,+$/g, '').trim();
        negative = negative.replace(/^,+|,+$/g, '').trim();

        // 填入数值
        if (positive) handleChange('positivePrompt', positive);
        if (negative) handleChange('negativePrompt', negative);
        if (params.width) handleChange('width', parseInt(params.width));
        if (params.height) handleChange('height', parseInt(params.height));
        if (params.size) { // 处理 Size: 832x1216 格式
            const dims = params.size.split('x');
            if (dims.length === 2) {
                handleChange('width', parseInt(dims[0]));
                handleChange('height', parseInt(dims[1]));
            }
        }
        if (params.steps) handleChange('steps', parseInt(params.steps));
        if (params.seed) handleChange('seed', parseInt(params.seed));
        if (params['cfg scale']) handleChange('cfg', parseFloat(params['cfg scale']));

        // Sampler 和 Scheduler 映射
        if (params.sampler) {
            const s = params.sampler.toLowerCase();

          const request = indexedDB.open(DB_NAME, 5);

            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME);
            }
          };
          request.onsuccess = (event) => resolve(event.target.result);
          request.onerror = (event) => reject(event.target.error);
      });
      const dbSave = async (key, val) => {
          try {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(val, key);
          } catch (e) { console.error("DB Save Error", e); }
      };
      const dbLoad = async (key) => {
          try {
            const db = await initDB();
            return new Promise(resolve => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });
          } catch (e) { console.error("DB Load Error", e); return null; }
      };
      const dbClear = async () => {
          try {
            const db = await initDB();

          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) { setIsVisible(true); observer.disconnect(); }
          }, options);
          if (containerRef.current) observer.observe(containerRef.current);
          return () => { if (containerRef.current) observer.unobserve(containerRef.current); };
        }, [options]);
        return [containerRef, isVisible];

        const [searchQuery, setSearchQuery] = useState('');
        const [displayValue, setDisplayValue] = useState('');
        const [hoveredModel, setHoveredModel] = useState(null);
        const [previewPosition, setPreviewPosition] = useState({ x: 0, y: 0 });
        const containerRef = useRef(null);
        const dropdownRef = useRef(null);

        // 确保 options 是数组
        const safeOptions = Array.isArray(options) ? options : [];

        // 提取文件名（去掉路径）
        const getFileName = (path) => {
          if (!path) return '';
          return path.replace(/\\/g, '/').split('/').pop();
        };

        // 提取clean_name（去掉扩展名）
        const getCleanName = (path) => {
          const fileName = getFileName(path);
          return fileName.replace(/\.(safetensors|ckpt|pt|pth)$/i, '');
        };

        // 按文件名去重：同名模型只保留第一个，优先保留有图片的
        const uniqueOptions = useMemo(() => {
          const seenNames = new Map(); // name -> { index, hasImage }

          return safeOptions.filter((opt, index) => {
            const cleanName = getCleanName(opt).toLowerCase();
            const modelData = modelsData?.find(m => {
              const mFileName = getFileName(m.modelPath || '');
              const mCleanName = (m.clean_name || '').toLowerCase();
              return mFileName === getFileName(opt) || mCleanName === cleanName;
            });
            const hasImage = !!modelData?.imageSrc;

            if (!seenNames.has(cleanName)) {
              seenNames.set(cleanName, { index, hasImage, option: opt });
              return true;
            }

            // 已存在同名模型，如果当前有图片而之前的没有，则替换
            const existing = seenNames.get(cleanName);
            if (hasImage && !existing.hasImage) {
              // 标记之前的为删除，保留当前的
              existing.shouldRemove = true;
              seenNames.set(cleanName, { index, hasImage, option: opt });
              return true;
            }

            return false;
          });
        }, [safeOptions, modelsData]);

        // 过滤选项（基于去重后的列表）
        const filteredOptions = searchQuery.trim()
          ? uniqueOptions.filter(opt => opt.toLowerCase().includes(searchQuery.toLowerCase()))
          : uniqueOptions;

        // 根据文件名查找模型数据 - 增强匹配逻辑
        const findModelData = (path) => {
          if (!path || !modelsData || !Array.isArray(modelsData)) return null;
          const fileName = getFileName(path);
          const cleanName = fileName.replace(/\.(safetensors|ckpt|pt|pth)$/i, '');
          
          // 首先尝试完整路径匹配
          let match = modelsData.find(m => m.modelPath === path);
          if (match) return match;
          
          // 然后尝试文件名匹配
          match = modelsData.find(m => {
            const mFileName = getFileName(m.modelPath || '');
            return mFileName === fileName;
          });
          if (match) return match;
          
          // 最后尝试clean_name匹配（不区分大小写）
          match = modelsData.find(m => {
            const mCleanName = (m.clean_name || '').toLowerCase();
            return mCleanName === cleanName.toLowerCase();
          });
          
          return match;
        };

        // 点击外部关闭下拉框
        useEffect(() => {
          const handleClickOutside = (e) => {
            if (containerRef.current && !containerRef.current.contains(e.target)) {

              setSearchQuery('');
              setDisplayValue(getFileName(value));

          };
          document.addEventListener('mousedown', handleClickOutside);
          return () => document.removeEventListener('mousedown', handleClickOutside);
        }, [value]);

        // 当 value 改变时更新显示值
        useEffect(() => {
          setDisplayValue(getFileName(value));

        const handleInputChange = (e) => {
          const val = e.target.value;
          setDisplayValue(val);
          setSearchQuery(val);
          setIsOpen(true);
        };

          setDisplayValue(getFileName(opt));
          setSearchQuery('');
          setIsOpen(false);
          setHoveredModel(null);
        };

        const handleInputFocus = (e) => {
          setIsOpen(true);
          setSearchQuery('');

        const handleMouseEnter = (opt, e) => {
          const modelData = findModelData(opt);
          console.log('MouseEnter:', opt, 'modelData:', modelData, 'modelsData length:', modelsData?.length);
          if (modelData?.imageSrc) {
            setHoveredModel(modelData);
            const rect = e.currentTarget.getBoundingClientRect();
            const previewWidth = 200;
            const previewHeight = 267;
            const padding = 10;

            // 计算默认位置（右侧）
            let x = rect.right + padding;
            let y = rect.top;

            // 检测是否超出屏幕右侧
            if (x + previewWidth > window.innerWidth) {
              // 显示在左侧
              x = rect.left - previewWidth - padding;
            }

            // 检测是否超出屏幕底部
            if (y + previewHeight > window.innerHeight) {
              // 向上偏移，使预览图底部不超出屏幕，但以鼠标位置为基准向上展开
              y = Math.max(padding, rect.bottom - previewHeight);
            }

            // 确保不超出屏幕顶部
            if (y < padding) {
              y = padding;
            }

            setPreviewPosition({ x, y });
          }

                  <div className="px-3 py-2 text-sm text-gray-400">无匹配结果</div>

          if (!modelsGroup) return false;
          
          const isInModelsGroup = (targetId, items) => {
            for (const item of items) {
              if (item.id === targetId) return true;
              if (item.children && isInModelsGroup(targetId, item.children)) return true;

            return false;

          return isInModelsGroup(group.id, modelsGroup.children || []);

                  type="text"
                  value={editName}
                  onChange={(e) => setEditName(e.target.value)}

                  onClick={(e) => e.stopPropagation()}

                <span className="ml-2 truncate flex-1">{group.name}</span>

                <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">

                    <PlusIcon className="w-3.5 h-3.5" />

                  {isModelGroup && (
                    <button
                      onClick={(e) => { e.stopPropagation(); onLinkFolder(group.id); }}

      const Sidebar = memo(({ groups, selectedGroup, onSelectGroup, onEditGroup, onDeleteGroup, onCreateGroup, onCreateSubgroup, isCollapsed, toggleCollapse, recycleCount, onEmptyTrash, onExportArtists, expandedGroups, onToggleExpand, linkedFolders, onLinkFolder }) => {
        const [searchTerm, setSearchTerm] = useState("");

        // 递归搜索分组
        const filterGroups = (groups, term) => {
          if (!term) return groups;
          const lower = term.toLowerCase();
          const result = [];
          
          const searchInGroup = (group) => {
            const matches = group.name.toLowerCase().includes(lower);
            const matchingChildren = group.children
              ? group.children.map(searchInGroup).filter(Boolean)
              : [];
            
            if (matches || matchingChildren.length > 0) {
              return { ...group, children: matchingChildren };
            }
            return null;
          };
          
          groups.forEach(group => {
            const matched = searchInGroup(group);
            if (matched) result.push(matched);
          });
          
          return result;

                      <span className="ml-3 truncate flex-1 text-left">LoRA模型</span>
                      <div className="flex items-center ml-2 opacity-0 group-hover:opacity-100 transition-opacity gap-1">
                          <button onClick={(e) => { e.stopPropagation(); onCreateSubgroup('lora'); }} className="p-1 hover:text-blue-500 dark:hover:text-blue-400" title="添加子分组"><PlusIcon className="w-3.5 h-3.5" /></button>
                          <button onClick={(e) => { e.stopPropagation(); onLinkFolder('lora'); }} className={`p-1 hover:text-orange-500 dark:hover:text-orange-400 ${linkedFolders['lora'] ? 'text-orange-500' : ''}`} title={linkedFolders['lora'] ? `已链接: ${linkedFolders['lora']}` : '链接文件夹'}>

      // --- CharacterImage 组件 (原封不动，保留) ---
      const CharacterImage = memo(({ char, onUpload, draggable = false, disablePathFallback = false, isPicker = false, clickable = true }) => {
        const [imgSrc, setImgSrc] = useState(null);
        const [error, setError] = useState(false);
        const [candidateIndex, setCandidateIndex] = useState(0);
        const [containerRef, isVisible] = useIntersectionObserver({ threshold: 0.1 });
        const fileInputRef = useRef(null);

        useEffect(() => {
          // 优先使用Base64 imageSrc数据
          if (char.imageSrc) {
             setImgSrc(char.imageSrc);
             setError(false);
             return;
          }

          // 如果禁用了路径回退，直接显示占位符
          if (disablePathFallback) {
            setImgSrc(null);
            setError(true);
            return;
          }

          if (!isVisible) return;

          setError(false);
          setCandidateIndex(0);

          const names = [char.clean_name, char.value].filter(Boolean);
          if (names.length > 0) {
            setImgSrc(`output/${names[0]}.png`);
          } else if (char.id) {
            setImgSrc(`images/${char.id}.png`);
          } else {
            setError(true);
          }
        }, [char, isVisible, disablePathFallback]);

        const handleError = () => {
            const current = imgSrc;
            // Base64图片加载失败，直接显示错误
            if (current && current.startsWith('data:')) {
                setError(true);
                return;
            }

            // 如果禁用了路径回退，直接显示错误
            if (disablePathFallback) {
              setError(true);
              return;
            }

            const names = [char.clean_name, char.value].filter(Boolean);
            const extensions = ['png', 'jpg', 'jpeg', 'webp'];

            if (current && current.startsWith('output/')) {
                // 尝试所有名字和扩展名组合
                const next = candidateIndex + 1;
                const total = names.length * extensions.length;

                if (next < total) {
                    setCandidateIndex(next);
                    const nameIdx = Math.floor(next / extensions.length);
                    const extIdx = next % extensions.length;
                    setImgSrc(`output/${names[nameIdx]}.${extensions[extIdx]}`);
                    return;
                }
            }

            if (current && current.startsWith('images/')) {
                if (names.length > 0) {
                    setCandidateIndex(0);
                    setImgSrc(`output/${names[0]}.png`);
                    return;
                }
            }

            setError(true);
        };

        const handleDrop = (e) => {
            if(!draggable) return;
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if(file && file.type.startsWith('image/')) {
                e.stopPropagation();
                onUpload(file);
            }
        };

        const handleClick = (e) => {
            // Picker模式下禁用点击上传，让上层组件处理点击事件
            if (isPicker) {
                return;
            }
            // clickable=false 时不处理点击，保留上层（如卡片预览）处理
            if (!clickable) return;
            // 有 onUpload 时点击即触发文件选择（阻止冒泡，避免上层预览误触发）
            if (onUpload && fileInputRef.current) {
                e.stopPropagation();
                fileInputRef.current.click();
            }
        };

        const handleFileChange = (e) => {
            if(e.target.files && e.target.files[0] && onUpload) {
                onUpload(e.target.files[0]);
            }
        };

        return (
          <div ref={containerRef} className={`aspect-[3/4] w-full relative bg-gray-100 dark:bg-neutral-900 overflow-hidden group-hover:shadow-inner transform-gpu ${onUpload && clickable ? 'cursor-pointer' : ''}`} onDragOver={(e)=>draggable && e.preventDefault()} onDrop={handleDrop} onClick={onUpload && clickable ? handleClick : undefined}>
            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
            {!error && imgSrc ? (
              <img src={imgSrc} alt={char.clean_name || 'Character'} onError={handleError} className="block w-full h-full object-cover transition-transform duration-500 ease-out group-hover:scale-110" loading="lazy" />
            ) : (
              <div className="w-full h-full flex flex-col items-center justify-center text-gray-300 dark:text-neutral-800 bg-gray-100 dark:bg-neutral-900">
                {isVisible && !error && !imgSrc && <div className="absolute inset-0 bg-gray-200 dark:bg-neutral-800 animate-pulse" />}
                <ImageIcon className="w-12 h-12 opacity-50" />
                {draggable && <span className="text-xs mt-2 opacity-50">拖拽上传图片</span>}
              </div>
            )}
            <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none" />
          </div>
        );
      });

          navigator.clipboard.writeText(textToCopy);

        // 3D悬浮效果 - 来自优秀UI动画
        const handleMouseMove = (e) => {
          if (!cardRef.current) return;
          const rect = cardRef.current.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          // 计算旋转 - 更明显的倾斜效果
          const rotateX = (y - rect.height / 2) / 8;
          const rotateY = (x - rect.width / 2) / -8;

          cardRef.current.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
          cardRef.current.classList.add('floating');

          // 更新光泽位置
          const glare = cardRef.current.querySelector('.glare');
          if (glare) {

            glare.style.setProperty('--mouse-y', `${(y / rect.height) * 100}%`);

        const handleMouseLeave = () => {

          if (isPicker) {
            if (onSelect) {
              onSelect();
            }
            return;
          }
          // 非Picker模式，打开预览
          if (onPreview && cardRef.current) {
            const rect = cardRef.current.getBoundingClientRect();
            const x = ((rect.left + rect.width / 2) / window.innerWidth) * 100;
            const y = ((rect.top + rect.height / 2) / window.innerHeight) * 100;
            onPreview(x, y);
          }
        };

        // 点击下半部分模糊区域触发多选（非Picker模式）
        const handleBottomAreaClick = (e) => {
          // 如果点击的是按钮，不触发多选
          if (e.target.closest('button')) return;
          e.stopPropagation();
          if (onSelect) {
            onSelect();
          }
        };

        // 生图按钮点击
        const handleGenerateClick = (e) => {
          e.stopPropagation();
          if (onGenerateImage) {
            onGenerateImage(char);
          }
        };

        return (
          <div className="perspective-box w-full h-full">
            <input ref={uploadInputRef} type="file" accept="image/*" onChange={handleUploadFile} className="hidden" />
            <div
              ref={cardRef}
              className={`card-3d group w-full h-full cursor-pointer ${isSelected ? 'ring-2 ring-blue-500' : ''}`}
              onMouseMove={handleMouseMove}
              onMouseLeave={handleMouseLeave}
            >
              {/* 光泽层 */}
              <div className="glare"></div>

              {/* 图片区域 - Picker模式点击触发选中，非Picker模式打开预览 */}
              <div onClick={handleCardClick} className="w-full h-full">
                <CharacterImage char={char} onUpload={onImageUpload} draggable={!isPicker} disablePathFallback={isPicker} isPicker={isPicker} clickable={false} />
              </div>

              {/* 收藏按钮 - Picker模式下隐藏 */}
              {!isPicker && (
                <button 
                  onClick={(e) => { e.stopPropagation(); onToggleFavorite(char.id); }} 
                  className={`card-action-btn absolute top-3 right-3 p-2.5 rounded-full z-20 transition-all duration-300 backdrop-blur-md active:scale-75 ${char.isFavorite ? 'bg-yellow-500 text-white rotate-0 opacity-100 shadow-lg' : 'bg-black/30 text-white/50 hover:bg-white hover:text-yellow-500 opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0'}`}
                >
                  <div className="w-4 h-4">{char.isFavorite ? <StarIcon className="w-full h-full" filled={true} /> : <StarIcon className="w-full h-full" filled={false} />}</div>
                </button>
              )}

              {/* 生图按钮 - Picker模式下隐藏 */}
              {!isPicker && (
                <button 
                  onClick={handleGenerateClick}
                  className={`card-action-btn absolute top-14 right-3 p-2.5 rounded-full z-20 transition-all duration-300 backdrop-blur-md active:scale-75 ${
                    isGenerating 
                      ? 'bg-blue-500 text-white shadow-lg opacity-100 translate-y-0' 
                      : 'bg-black/30 text-white/50 hover:bg-white hover:text-blue-500 opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0'
                  }`}
                  title="生成图片"
                >
                  <div className="w-4 h-4">
                    <SparklesIcon className="w-full h-full" />
                  </div>
                </button>
              )}

              {/* 生成进度条 - Picker模式下隐藏 */}
              {!isPicker && isGenerating && (
                <>
                  <svg className="absolute inset-0 w-full h-full pointer-events-none z-10" style={{ overflow: 'visible' }}>
                    {/* 背景轨道 */}
                    <rect 
                      x="2" 
                      y="2" 
                      width="calc(100% - 4px)" 
                      height="calc(100% - 4px)"
                      rx="16"
                      ry="16"
                      fill="none"
                      stroke="rgba(59, 130, 246, 0.2)"
                      strokeWidth="3"
                    />
                    {/* 进度条 */}
                    <rect 
                      x="2" 
                      y="2" 
                      width="calc(100% - 4px)" 
                      height="calc(100% - 4px)"
                      rx="16"
                      ry="16"
                      fill="none"
                      stroke="#3b82f6"
                      strokeWidth="3"
                      strokeLinecap="round"
                      style={{
                        strokeDasharray: '1000',
                        strokeDashoffset: 1000 - (progress / 100) * 1000,
                        transition: 'stroke-dashoffset 0.3s ease-out',
                      }}
                    />
                    {/* 发光效果 */}
                    <rect 
                      x="2" 
                      y="2" 
                      width="calc(100% - 4px)" 
                      height="calc(100% - 4px)"
                      rx="16"
                      ry="16"
                      fill="none"
                      stroke="#60a5fa"
                      strokeWidth="3"
                      strokeLinecap="round"
                      style={{
                        strokeDasharray: '1000',
                        strokeDashoffset: 1000 - (progress / 100) * 1000,
                        transition: 'stroke-dashoffset 0.3s ease-out',
                        filter: 'blur(4px)',
                        opacity: 0.6,
                      }}
                    />
                  </svg>
                  {/* 阶段文字显示 */}
                  <div className="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
                    <div className="bg-black/70 backdrop-blur-sm rounded-xl px-4 py-3 text-center">
                      <div className="text-white text-sm font-medium animate-pulse">
                        {stage}
                      </div>
                      {progress > 0 && progress < 100 && (
                        <div className="text-blue-400 text-2xl font-bold mt-1">
                          {progress}%
                        </div>
                      )}
                    </div>
                  </div>
                </>
              )}

              {/* 内容区域 - 玻璃态效果，Picker模式点击触发选中 */}
              <div onClick={(e) => {
                // Picker模式下，阻止事件冒泡，直接处理选中
                if (isPicker) {
                  e.stopPropagation();
                  if (onSelect) {
                    onSelect();
                  }
                  return;
                }
                // 非Picker模式，使用原来的逻辑
                handleBottomAreaClick(e);
              }} className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-white/80 dark:from-black/60 to-transparent backdrop-blur-sm cursor-pointer">
                {/* Picker模式显示完整模型名字（不截断），非Picker模式显示clean_name */}
                <h3 className={`font-bold text-gray-800 dark:text-neutral-100 transition-colors group-hover:text-blue-500 dark:group-hover:text-blue-400 mb-2 ${isPicker ? 'text-xs leading-tight break-all' : 'text-sm truncate'}`}>
                  {isPicker ? (char.modelPath || char.clean_name) : char.clean_name}
                </h3>

                {/* 分组标签和编辑按钮 - Picker模式下显示所有分组，非Picker模式下隐藏编辑按钮 */}
                <div className="flex items-center justify-between gap-2 mb-3">
                  <div className="flex flex-wrap gap-1 flex-1 min-w-0">
                    {/* Picker模式显示所有分组，非Picker模式最多显示3个 */}
                    {(char.groups || []).slice(0, isPicker ? 999 : 3).map(g => (
                      <span key={g} className="text-[10px] bg-white/60 dark:bg-white/10 px-2 py-0.5 rounded-full text-gray-600 dark:text-neutral-200 border border-gray-200/50 dark:border-white/10">
                        {g}
                      </span>
                    ))}
                  </div>
                  {/* 编辑按钮 - Picker模式下隐藏 */}
                  {!isPicker && (
                    <>
                      {onImageUpload && (
                        <button
                          onClick={triggerUpload}
                          className="card-action-btn icon-btn text-gray-400 dark:text-neutral-400 hover:text-blue-500 dark:hover:text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300 p-1.5 hover:bg-white/50 dark:hover:bg-white/10 rounded-lg shrink-0"
                          title="上传图片"
                        >
                          <ImageIcon className="w-3.5 h-3.5" />
                        </button>
                      )}
                      <button
                        onClick={(e) => { e.stopPropagation(); onEdit(e); }}
                        className="card-action-btn icon-btn text-gray-400 dark:text-neutral-400 hover:text-gray-900 dark:hover:text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300 p-1.5 hover:bg-white/50 dark:hover:bg-white/10 rounded-lg shrink-0"
                      >
                        <EditIcon className="w-3.5 h-3.5" />
                      </button>
                      {onDelete && (
                        <button
                          onClick={(e) => { e.stopPropagation(); onDelete(); }}
                          className="card-action-btn icon-btn text-gray-400 dark:text-neutral-400 hover:text-red-500 dark:hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300 p-1.5 hover:bg-white/50 dark:hover:bg-white/10 rounded-lg shrink-0"
                          title="删除卡片"
                        >
                          <TrashIcon className="w-3.5 h-3.5" />
                        </button>
                      )}
                    </>
                  )}
                </div>

                {/* 复制按钮 - Picker模式下隐藏 */}
                {!isPicker && (
                  <button 
                    onClick={handleCopy} 
                    className={`card-action-btn w-full flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold transition-all duration-300 active:scale-95 ${copied ? 'bg-green-500 text-white shadow-lg' : 'bg-white/70 dark:bg-white/10 text-gray-700 dark:text-neutral-300 hover:bg-blue-500 hover:text-white hover:shadow-lg hover:shadow-blue-500/30'}`}
                    title={char.groups?.includes('lora') ? '复制触发词' : '复制提示词'}
                  >
                    <div className="w-3.5 h-3.5">{copied ? <CheckIcon className="w-full h-full" /> : <CopyIcon className="w-full h-full" />}</div>
                    {copied ? '已复制' : (char.groups?.includes('lora') ? '复制触发词' : '复制')}
                  </button>
                )}
              </div>

              {/* 选中标记 */}
              {isSelected && (

      // ========== 设置面板组件 - 优化左侧按钮位置 ==========
      const SettingsPanel = memo(({ featureFlags, toggleFeature, sortOption, setSortOption, viewMode, setViewMode, cardSize, setCardSize,

                                    apiConfigs, handleAddApi, handleEditApi, handleDeleteApi, editingApiId, setEditingApiId,
                                    newApiConfig, setNewApiConfig, handleCancelEdit, handleRandomPick, handleExportJson,
                                    handleZipExport, isZipExporting, handleClearData, setModals, modals,

                                    showAddApiForm, setShowAddApiForm }) => {
        const [activeTab, setActiveTab] = useState('interface'); // interface, compression, api, imagegen, tagsettings
        const [availableModels, setAvailableModels] = useState([]);
        const [availableLoras, setAvailableLoras] = useState([]);
        const [isLoadingModels, setIsLoadingModels] = useState(false);

        // 当前选中的比例（用于比例按钮的选中/取消）
        const [selectedRatio, setSelectedRatio] = useState(null);

        // 标签设置状态
        const TAG_SETTINGS_KEY = 'tag_settings';
        const DEFAULT_TAG_URL = 'https://raw.githubusercontent.com/xhoxye/BooruTagCart/refs/heads/main/assets/danbooru_all.csv';
        
        const [tagSettings, setTagSettings] = useState(() => {
          const saved = localStorage.getItem(TAG_SETTINGS_KEY);
          const savedConfig = saved ? JSON.parse(saved) : {};
          return {
            useUrl: savedConfig.useUrl !== undefined ? savedConfig.useUrl : true,
            dataUrl: savedConfig.dataUrl || DEFAULT_TAG_URL,
            localFilePath: savedConfig.localFilePath || '',
            loadedTags: [], // 不从localStorage读取，避免超出配额
            isLoading: false,
            loadProgress: 0
          };
        });

        // 全局标签数据存储（不存入localStorage，避免超出配额）
        const [globalTagData, setGlobalTagData] = useState(() => {
          // 尝试从内存恢复，不从localStorage读取loadedTags
          return [];
        });

        // 标签设置处理函数
        const handleTagSettingsChange = (key, value) => {
          setTagSettings(prev => ({
            ...prev,
            [key]: value
          }));
        };

        // 尝试通过CORS代理获取数据
        const fetchWithCorsProxy = async (url, controller) => {
          // 首先尝试直接获取
          try {
            const response = await fetch(url, {
              signal: controller.signal,
              headers: {
                'Accept': 'text/plain, text/csv, */*',
              },
              mode: 'cors',
              cache: 'no-cache',
            });
            if (response.ok) {
              return await response.text();
            }
          } catch (error) {
            console.log('直接获取失败，尝试使用CORS代理...');
          }

          // 如果直接获取失败，尝试使用CORS代理
          const corsProxies = [
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://thingproxy.freeboard.io/fetch/',
          ];

          for (const proxy of corsProxies) {
            try {
              const proxyUrl = proxy + encodeURIComponent(url);
              const response = await fetch(proxyUrl, {
                signal: controller.signal,
                headers: {
                  'Accept': 'text/plain, text/csv, */*',
                },
                cache: 'no-cache',
              });
              if (response.ok) {
                console.log(`通过CORS代理成功: ${proxy}`);
                return await response.text();
              }
            } catch (error) {
              console.log(`CORS代理失败: ${proxy}`, error.message);
            }
          }

          throw new Error('所有CORS代理都失败，请使用本地文件');
        };

        // 加载标签数据
        const handleLoadTagData = async () => {
          handleTagSettingsChange('isLoading', true);
          handleTagSettingsChange('loadProgress', 0);

          try {
            let data;
            if (tagSettings.useUrl) {
              // 从URL加载 - 使用CORS代理
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), 60000); // 60秒超时（代理可能较慢）

              try {
                data = await fetchWithCorsProxy(tagSettings.dataUrl, controller);

                if (!data || data.trim().length === 0) {
                  throw new Error('获取的数据为空');
                }
              } catch (fetchError) {
                clearTimeout(timeoutId);
                if (fetchError.name === 'AbortError') {
                  throw new Error('请求超时，请检查网络连接');
                }
                throw fetchError;
              }
            } else {
              // 从本地文件加载
              const fileInput = document.querySelector('input[type="file"][accept=".csv"]');
              if (fileInput && fileInput.files[0]) {
                data = await fileInput.files[0].text();
              } else {
                throw new Error('请选择本地文件');
              }
            }

            // 使用PapaParse解析CSV数据（更健壮）
            const parseResult = Papa.parse(data, {
              header: false,
              skipEmptyLines: true,
              quoteChar: '"',
              escapeChar: '"',
              error: function(error) {
                console.error('CSV解析错误:', error);
              }
            });

            if (parseResult.errors && parseResult.errors.length > 0) {
              console.warn('CSV解析警告:', parseResult.errors);
            }

            const tags = parseResult.data.filter(row => row.length >= 2);

            if (tags.length === 0) {
              throw new Error('解析后的标签数据为空');
            }

            // 按热度排序
            tags.sort((a, b) => (parseInt(b[2], 10) || 0) - (parseInt(a[2], 10) || 0));

            // 存储到全局变量（不存入localStorage，避免超出配额）
            window.GLOBAL_TAG_DATA = tags;
            handleTagSettingsChange('loadedTags', tags);
            handleTagSettingsChange('loadProgress', 100);

              useUrl: tagSettings.useUrl,
              dataUrl: tagSettings.dataUrl,
              localFilePath: tagSettings.localFilePath,
              // 不保存loadedTags，避免超出配额
            }));
            
            alert(`标签数据加载完成！共 ${tags.length} 个标签`);

      // 从按钮位置展开的Modal组件 - 使用createPortal避免父容器transform影响 (添加contentClassName支持)
      const ExpandModal = memo(({ isOpen, onClose, title, children, clickPosition, contentClassName = '' }) => {
        const [visible, setVisible] = useState(false);
        const [animationPhase, setAnimationPhase] = useState('hidden'); // hidden, entering, entered, exiting
        const portalRef = useRef(null);
        const contentRef = useRef(null);

        // 动态创建portal容器
        useEffect(() => {
          if (!portalRef.current) {
            portalRef.current = document.createElement('div');
            portalRef.current.id = 'expand-modal-root';
            document.body.appendChild(portalRef.current);
          }
          return () => {
            if (portalRef.current && portalRef.current.parentNode) {
              portalRef.current.parentNode.removeChild(portalRef.current);
            }
          };
        }, []);

        useEffect(() => { 
          if(isOpen) {
            setVisible(true);
            // 延迟启动进入动画，确保DOM已渲染
            requestAnimationFrame(() => {
              setAnimationPhase('entering');
              setTimeout(() => setAnimationPhase('entered'), 500);
            });
          } else {
            setAnimationPhase('exiting');
            setTimeout(() => {
              setVisible(false);
              setAnimationPhase('hidden');
            }, 400);
          }
        }, [isOpen]);

        // 防止拖拽选择文字时误关闭 - 使用mousedown/mouseup而不是click
        const handleMouseDown = (e) => {
          // 检查是否点击在内容区域外（backdrop或overlay本身）
          const isOutsideContent = !e.target.closest('.expand-content');
          e.currentTarget.dataset.mousedownOutside = isOutsideContent ? 'true' : 'false';
        };

        const handleMouseUp = (e) => {
          const mousedownOutside = e.currentTarget.dataset.mousedownOutside === 'true';
          const mouseupOutside = !e.target.closest('.expand-content');
          // 只有当按下和松开都在内容区域外时才关闭
          if (mousedownOutside && mouseupOutside) {
            onClose();
          }
        };

        // ESC键关闭
        useEffect(() => {
          const handleKeyDown = (e) => {
            if (e.key === 'Escape' && isOpen) {
              onClose();
            }
          };
          if (isOpen) {
            document.addEventListener('keydown', handleKeyDown);
            return () => document.removeEventListener('keydown', handleKeyDown);
          }
        }, [isOpen, onClose]);

        if (!visible && !isOpen) return null;
        if (!portalRef.current) return null;

        // 根据动画阶段计算样式
        const getAnimationStyles = () => {
          switch (animationPhase) {
            case 'hidden':
              return { transform: 'scale(0.3)', opacity: 0 };
            case 'entering':
              return { transform: 'scale(1)', opacity: 1 };
            case 'entered':
              return { transform: 'scale(1)', opacity: 1 };
            case 'exiting':
              return { transform: 'scale(0.9)', opacity: 0 };
            default:
              return { transform: 'scale(0.3)', opacity: 0 };
          }
        };

        const animStyles = getAnimationStyles();

        // 使用createPortal渲染到body，避免父容器transform影响
        return ReactDOM.createPortal(
          <div 
            className={`expand-overlay ${animationPhase !== 'hidden' ? 'active' : ''}`}
            onMouseDown={handleMouseDown}
            onMouseUp={handleMouseUp}
            style={{
              '--click-x': `${clickPosition.x}%`,
              '--click-y': `${clickPosition.y}%`,
              transition: 'opacity 0.3s ease'
            }}
          >
            {/* Backdrop - 半透明背景 */}
            <div
              className="expand-backdrop"
              style={{
                position: 'absolute',
                inset: 0,
                background: 'rgba(0, 0, 0, 0.5)',
                backdropFilter: 'blur(4px)',
                opacity: animationPhase === 'hidden' ? 0 : (animationPhase === 'exiting' ? 0 : 1),
                transition: 'opacity 0.4s ease'
              }}
            />

            {/* 内容容器 - 带放大渐显动画 */}
            <div 
              ref={contentRef}
              className={`expand-content ${contentClassName}`}
              style={{
                ...animStyles,
                transition: 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease'
              }}
            >
              {/* 头部 */}
              <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-white/10 shrink-0">
                <h3 className="text-lg font-semibold text-gray-800 dark:text-white tracking-wide">{title}</h3>
                <button onClick={onClose} className="expand-close-btn">
                  <XIcon className="w-4 h-4 text-gray-500 dark:text-neutral-400" />
                </button>
              </div>
              {/* 内容 */}
              <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                {children}
              </div>
            </div>
          </div>,
          portalRef.current
        );
      });

      // 浮动详情页Portal组件 - 使用createPortal避免父容器transform影响
      const DetailPortal = memo(({ previewChar, clickPosition, onClose, onCopy, onEdit }) => {
        const [visible, setVisible] = useState(false);
        const portalRef = useRef(null);

        useEffect(() => {
          if (!portalRef.current) {
            portalRef.current = document.createElement('div');
            portalRef.current.id = 'detail-portal-root';
            document.body.appendChild(portalRef.current);
          }
          return () => {
            if (portalRef.current && portalRef.current.parentNode) {
              portalRef.current.parentNode.removeChild(portalRef.current);
            }
          };
        }, []);

        useEffect(() => {
          if (previewChar) {
            setVisible(true);
          } else {
            setTimeout(() => {
              setVisible(false);
            }, 300);
          }
        }, [previewChar]);

        // 防止拖拽选择文字时误关闭 - 使用mousedown/mouseup而不是click
        const handleMouseDown = (e) => {
          // 检查是否点击在内容区域外
          const isOutsideContent = !e.target.closest('.detail-content');
          e.currentTarget.dataset.mousedownOutside = isOutsideContent ? 'true' : 'false';
        };

        const handleMouseUp = (e) => {
          const mousedownOutside = e.currentTarget.dataset.mousedownOutside === 'true';

      const MultiGroupSelector = memo(({ groups, selectedGroups, onChange }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [search, setSearch] = useState("");
        const wrapperRef = useRef(null);

        useEffect(() => {
            const handleClickOutside = (event) => {
                if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                    setIsOpen(false);
                }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
        }, [wrapperRef]);

        // 递归收集所有分组名称
        const collectAllGroupNames = (groups) => {
          const names = [];
          const traverse = (groups) => {
            groups.forEach(group => {
              names.push({ name: group.name, count: group.count || 0 });
              if (group.children) traverse(group.children);
            });
          };
          traverse(groups);
          return names;
        };

        const allGroups = useMemo(() => collectAllGroupNames(groups), [groups]);

        const filtered = useMemo(() => {
            const lower = search.toLowerCase();
            let filtered = allGroups.filter(g => !selectedGroups.includes(g.name) && g.name.toLowerCase().includes(lower));
            return filtered.sort((a, b) => {
                if (a.name === '画师串') return -1;
                if (b.name === '画师串') return 1;
                return a.name.localeCompare(b.name);
            });
        }, [allGroups, search, selectedGroups]);

        const addGroup = (name) => {
            if(!selectedGroups.includes(name)) {
                onChange([...selectedGroups, name]);
            }
            setSearch("");
        };

        const removeGroup = (name) => {
            onChange(selectedGroups.filter(g => g !== name));
        };

        return (
            <div className="relative" ref={wrapperRef}>
                <div
                    className="w-full min-h-[46px] neumorph-input p-1.5 flex flex-wrap items-center gap-1.5 focus-within:border-blue-500 dark:focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all cursor-text"
                    onClick={() => {
                        if(!isOpen) setIsOpen(true);
                        wrapperRef.current.querySelector('input')?.focus();
                    }}
                >
                    {selectedGroups.map(g => (
                        <span key={g} className="flex items-center gap-1 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-white/10 px-2.5 py-1 rounded-md text-xs font-medium text-neutral-700 dark:text-neutral-200 shadow-sm animate-pop">
                            {g}
                            <button
                                type="button"
                                onClick={(e) => { e.stopPropagation(); removeGroup(g); }}
                                className="danger-btn hover:text-red-500 transition-colors"
                            >
                                <XIcon className="w-3 h-3" />
                            </button>
                        </span>
                    ))}
                    <input
                        type="text"
                        className="flex-1 bg-transparent min-w-[100px] outline-none text-sm text-neutral-900 dark:text-white p-1 placeholder:text-neutral-400"
                        value={search}
                        onChange={(e) => {
                            setSearch(e.target.value);
                            if (!isOpen) setIsOpen(true);
                        }}
                        onFocus={() => setIsOpen(true)}
                        onKeyDown={(e) => {
                            if(e.key === 'Enter' && search) {
                                e.preventDefault();
                                addGroup(search);
                            }
                            if(e.key === 'Backspace' && !search && selectedGroups.length > 0) {
                                removeGroup(selectedGroups[selectedGroups.length - 1]);
                            }
                        }}
                        placeholder={selectedGroups.length === 0 ? "选择或输入分组..." : ""}
                    />
                </div>

                {isOpen && (search || filtered.length > 0) && (
                    <div className="absolute z-50 w-full mt-1 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-white/10 rounded-lg shadow-2xl max-h-80 overflow-y-auto custom-scrollbar animate-fade-in p-1 grid grid-cols-3 gap-1">
                        {filtered.length > 0 ? (
                            filtered.map(g => (
                                <div
                                    key={g.name}
                                    className="px-3 py-2 text-sm text-neutral-700 dark:text-neutral-300 hover:bg-gray-100 dark:hover:bg-white/10 rounded cursor-pointer flex justify-between items-center transition-colors"
                                    onClick={() => {
                                        addGroup(g.name);
                                    }}
                                >
                                    <span className="truncate max-w-[80%]">{g.name}</span>
                                    <span className="text-[10px] text-neutral-400 bg-gray-100 dark:bg-white/5 px-1 py-0.5 rounded">{g.count}</span>
                                </div>
                            ))
                        ) : (
                            <div
                                className="col-span-3 px-4 py-3 text-sm text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer transition-colors font-medium text-center"
                                onClick={() => addGroup(search)}
                            >
                                + 创建新分组 "{search}"
                            </div>
                        )}
                    </div>
                )}
            </div>
        );
      });

        const processData = async (data, targetGroups, zip) => {
            // 检测新版本格式 (version 2.0)
            let charData = data;
            let importedGroups = null;
            
            if (data && data.version === '2.0') {
              charData = data.characters || {};
              importedGroups = data.groups;
            }
            
            if (!targetGroups || targetGroups.length === 0) {
                const confirmAuto = confirm("您未指定导入分组。\n\n是否使用数据中自带的分组（如“原神”、“Fate”等）？\n\n• 点击【确定】：自动归类（仅取第一个分组）。\n• 点击【取消】：中止导入，请在下方手动选择或创建分组。");
                if (!confirmAuto) {
                    if (typeof data === 'object' && data !== null) {
                        setImportText(JSON.stringify(data, null, 2));
                        setImportMode('json');
                        if (zip) setPendingZip(zip);
                    }
                    return;
                }
            }

            const newChars = [];
            const now = Date.now();
            const processedIds = new Set(); 

            const add = async (item, grp) => {
                if (typeof item !== 'object' || item === null) return;
                
                const genericKeys = ["characters", "character", "chars", "char", "roles", "role", "data", "items", "list", "角色", "列表", "未分组"];
                let effectiveGrp = grp;
                if (grp && genericKeys.includes(grp.toLowerCase())) {
                    effectiveGrp = null;
                }

                let initialGroups = item.groups || (item.groupName ? [item.groupName] : (effectiveGrp ? [effectiveGrp] : []));
                if (!Array.isArray(initialGroups)) initialGroups = [initialGroups].filter(x => x);

                let gs = [...initialGroups, ...(targetGroups || [])];
                if (gs.length === 0) gs = ["未分组"];
                
                gs = [...new Set(gs)];
                if (gs.length > 1 && gs.includes("未分组")) gs = gs.filter(g => g !== "未分组");

                let finalName = item.clean_name || "Unknown";
                if (effectiveGrp || (gs.length > 0 && gs[0] !== "未分组")) {
                    const groupToClean = effectiveGrp || gs[0];
                    try {
                        const escapedGrp = groupToClean.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        const re1 = new RegExp(`\\s*[\\(\\[]${escapedGrp}[\\)\\]]`, 'gi');
                        const re2 = new RegExp(`\\s*-\\s*${escapedGrp}`, 'gi');
                        finalName = finalName.replace(re1, "").replace(re2, "").trim();
                        finalName = finalName.replace(/[, \-]$/, "").trim();
                    } catch (e) {}
                }

                let imgSrc = item.imageSrc;
                let id = generateId();

                if (zip) {
                   let file = null;
                   if (item.imagePath) file = zip.file(item.imagePath);
                   if (!file) {
                       const extensions = ['png', 'jpg', 'jpeg', 'webp'];
                       for (const ext of extensions) {
                           file = zip.file(`images/${item.id}.${ext}`);
                           if (file) break;
                       }
                   }
                   if (file) {
                       const blob = await file.async("blob");
                       imgSrc = await new Promise(r => { const fr=new FileReader(); fr.onload=e=>r(e.target.result); fr.readAsDataURL(blob); });
                   }
                }

                if (item.isArtist && !gs.includes('画师串')) {
                    gs.push('画师串');
                }

                newChars.push({
                    id: id,
                    clean_name: finalName,
                    value: item.value || "",
                    groups: gs,
                    isFavorite: !!item.isFavorite,
                    imageSrc: imgSrc, 
                    createdAt: item.createdAt || now,
                    copyCount: item.copyCount || 0,
                    deletedAt: null
                });
            };
            
            if (typeof charData === 'object' && charData !== null && !Array.isArray(charData) && (charData.clean_name || charData.value)) {
                await add(charData, null);
            }
            else if (Array.isArray(charData)) {
                for(const i of charData) await add(i, null);
            }
            else if (typeof charData === 'object' && charData !== null) {
                for(const [k,v] of Object.entries(charData)) {
                    if(Array.isArray(v)) {
                        for(const i of v) await add(i, k);
                    }
                    else if(typeof v==='object' && v !== null) {
                        for(const [g,items] of Object.entries(v)) {
                            if(Array.isArray(items)) {
                                for(const i of items) await add(i, g);
                            }
                        }
                    }
                }
            }

            if (!targetGroups || targetGroups.length === 0) {
                newChars.forEach(char => {
                    if (char.groups.length > 1) {
                        // 保留第一个分组，但如果包含画师串则保留
                        const firstGroup = char.groups[0];
                        const hasArtistGroup = char.groups.includes('画师串');
                        if (hasArtistGroup && firstGroup !== '画师串') {
                            char.groups = [firstGroup, '画师串'];
                        } else {
                            char.groups = [firstGroup];
                        }
                    }
                });
            }

            if (newChars.length > 0) {
                setCharacters(p => [...p, ...newChars]);
                
                // 如果导入的数据包含分组结构，合并到现有分组
                if (importedGroups && Array.isArray(importedGroups)) {
                  setGroups(prevGroups => {
                    // 合并导入的分组，避免重复
                    const existingIds = getAllGroupIds(prevGroups);
                    const newGroups = [...prevGroups];
                    
                    importedGroups.forEach(importedGroup => {
                      if (!existingIds.includes(importedGroup.id)) {
                        newGroups.push(importedGroup);
                      }
                    });
                    
                    return newGroups;
                  });

                setModals(p => ({...p, import: false}));
                setImportTargetGroups([]); setImportText(""); setAiImportText(""); setPendingZip(null);
                alert(`成功导入 ${newChars.length} 个角色`);

            }
        };
