                      // 从lorasData中查找触发词
                      let triggerWords = '';
                      if (lorasData && lorasData.length > 0) {
                        const matchedLora = lorasData.find(ld => {
                          const modelPath = ld.modelPath || ld.path || '';
                          const name = ld.name || '';
                          const cleanName = ld.clean_name || '';
                          const modelPathFileName = modelPath ? modelPath.split(/[\\/]/).pop() : '';
                          const pathFileName = path ? path.split(/[\\/]/).pop() : '';
                          
                          return modelPath === path || 
                                 name === path || 
                                 cleanName === path ||
                                 modelPathFileName === pathFileName ||
                                 modelPathFileName === path;
                        });
                        triggerWords = matchedLora?.triggerWords || matchedLora?.trigger_word || '';
                      }
                      
                      const newLora = {
                        id: generateId(),
                        name: path,
                        strength: 0.8,
                        strengthClip: 1.0,
                        enabled: true,
                        triggerWords: triggerWords
                      };
                      setLocalSettings(prev => ({
                        ...prev,
                        loras: [...(prev.loras || []), newLora]
                      }));
                    });
                  }
                }
                setEditingLoraId(null);
              }}
              serverUrl={localSettings.serverUrl}
              checkpointsData={checkpointsData}
              lorasData={lorasData}
            />
          </>,
          portalRef.current
        );
      };

      // 图片缩放查看组件 - 支持 layoutId 共享元素动画、鼠标滚轮缩放、双击缩放和左右切换
      const ImageZoomModal = ({ imageSrc, images = [], currentIndex = 0, selectedImageIndex = 0, onClose, onIndexChange }) => {
        const [scale, setScale] = useState(1);
        const [position, setPosition] = useState({ x: 0, y: 0 });
        const [isDragging, setIsDragging] = useState(false);
        const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
        const [mouseDownTime, setMouseDownTime] = useState(0);
        const [mouseDownPos, setMouseDownPos] = useState({ x: 0, y: 0 });
        const [lastClickTime, setLastClickTime] = useState(0);
        const [index, setIndex] = useState(currentIndex);
        const [isAnimating, setIsAnimating] = useState(true);
        const containerRef = useRef(null);

        // 获取当前显示的图片
        const currentImage = images.length > 0 ? images[index] : imageSrc;
        const hasMultipleImages = images.length > 1;

        // 切换到上一张
        const goToPrev = () => {
          if (hasMultipleImages) {
            const newIndex = index > 0 ? index - 1 : images.length - 1;
            setIndex(newIndex);
            if (onIndexChange) onIndexChange(newIndex);
            // 重置缩放
            setScale(1);
            setPosition({ x: 0, y: 0 });
          }
        };

        // 切换到下一张
        const goToNext = () => {
          if (hasMultipleImages) {
            const newIndex = index < images.length - 1 ? index + 1 : 0;
            setIndex(newIndex);
            if (onIndexChange) onIndexChange(newIndex);
            // 重置缩放
            setScale(1);
            setPosition({ x: 0, y: 0 });
          }
        };

        // 处理鼠标滚轮缩放
        const handleWheel = (e) => {
          e.preventDefault();
          const delta = e.deltaY > 0 ? 0.9 : 1.1;
          setScale(prev => {
            const newScale = Math.max(0.5, Math.min(5, prev * delta));
            return newScale;
          });
        };

        // 处理鼠标按下 - 记录时间和位置
        const handleMouseDown = (e) => {
          // 如果点击的是按钮区域，不处理
          if (e.target.closest('button')) return;
          
          setMouseDownTime(Date.now());
          setMouseDownPos({ x: e.clientX, y: e.clientY });
          if (scale > 1) {
            setIsDragging(true);
            setDragStart({ x: e.clientX - position.x, y: e.clientY - position.y });
          }
        };

        // 处理鼠标移动
        const handleMouseMove = (e) => {
          if (isDragging && scale > 1) {
            setPosition({
              x: e.clientX - dragStart.x,
              y: e.clientY - dragStart.y
            });
          }
        };

        // 处理鼠标抬起 - 判断是单击还是拖拽
        const handleMouseUp = (e) => {
          setIsDragging(false);
          
          // 如果点击的是按钮区域，不处理关闭
          if (e.target.closest('button')) return;
          
          // 如果点击的是图片，不处理关闭（由图片的点击事件处理）
          if (e.target.tagName === 'IMG' || e.target.closest('[data-image-container]')) return;
          
          const clickDuration = Date.now() - mouseDownTime;
          const moveDistance = Math.sqrt(
            Math.pow(e.clientX - mouseDownPos.x, 2) +
            Math.pow(e.clientY - mouseDownPos.y, 2)
          );
          
          // 只有短按且移动距离小才认为是单击关闭
          if (clickDuration < 200 && moveDistance < 5) {
            onClose();
          }
        };

        const handleMouseLeave = () => {
          setIsDragging(false);
        };

        // 处理单击图片 - 记录点击时间用于双击检测
        const handleImageClick = (e) => {
          const now = Date.now();
          const timeSinceLastClick = now - lastClickTime;
          
          if (timeSinceLastClick < 300) {
            // 这是双击，执行放大/缩小
            e.stopPropagation();
            
            if (scale > 1.5) {
              // 如果已经放大很多，双击缩小回正常
              setScale(1);
              setPosition({ x: 0, y: 0 });
            } else {
              // 双击放大到2倍
              setScale(2);
              // 计算鼠标相对于图片中心的位置，用于调整位置
              const rect = e.currentTarget.getBoundingClientRect();
              const centerX = rect.left + rect.width / 2;
              const centerY = rect.top + rect.height / 2;
              const mouseX = e.clientX - centerX;
              const mouseY = e.clientY - centerY;
              setPosition({
                x: -mouseX,
                y: -mouseY
              });
            }
          }
          
          setLastClickTime(now);
        };

        // 重置缩放和位置
        const handleReset = () => {
          setScale(1);
          setPosition({ x: 0, y: 0 });
        };

        // 键盘事件 - ESC关闭，R重置，左右箭头切换，A/D键切换
        useEffect(() => {
          const handleKeyDown = (e) => {
            if (e.key === 'Escape') {
              e.stopPropagation();
              e.preventDefault();
              // 先重置缩放状态，延迟关闭以确保动画正确
              setScale(1);
              setPosition({ x: 0, y: 0 });
              setTimeout(() => onClose(), 50);
            } else if (e.key === 'r' || e.key === 'R') {
              e.stopPropagation();
              handleReset();
            } else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
              e.stopPropagation();
              goToPrev();
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
              e.stopPropagation();
              goToNext();
            }
          };
          window.addEventListener('keydown', handleKeyDown, true);
          return () => window.removeEventListener('keydown', handleKeyDown, true);
        }, [onClose, index, images.length]);

        // 处理右键退出
        const handleContextMenu = (e) => {
          e.preventDefault();
          // 先重置缩放状态，延迟关闭以确保动画正确
          setScale(1);
          setPosition({ x: 0, y: 0 });
          setTimeout(() => onClose(), 50);
        };

        // 动画完成后的回调
        const handleAnimationComplete = () => {
          setIsAnimating(false);
        };

        // 计算当前图片的 layoutId
        const currentLayoutId = `generated-image-${index}`;

        return (
          <motion.div
            initial={{ opacity: 1 }}
            animate={{ opacity: 1 }}
            exit={{ opacity: 0 }}
            transition={{ duration: 0.2 }}
            className="fixed inset-0 z-[10000] flex items-center justify-center bg-black"
            onMouseDown={handleMouseDown}
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}
            onMouseLeave={handleMouseLeave}
            onContextMenu={handleContextMenu}
            onClick={(e) => {
              // 点击背景关闭
              if (e.target === e.currentTarget) {
                // 先重置缩放状态，延迟关闭以确保动画正确
                setScale(1);
                setPosition({ x: 0, y: 0 });
                setTimeout(() => onClose(), 50);
              }
            }}
          >
            {/* 左切换按钮 */}
            {hasMultipleImages && (
              <motion.button
                initial={{ opacity: 0, x: -20 }}
                animate={{ opacity: 1, x: 0 }}
                transition={{ delay: 0.2, duration: 0.3 }}
                onClick={(e) => { e.stopPropagation(); goToPrev(); }}
                className="absolute left-4 top-1/2 -translate-y-1/2 p-3 bg-black/50 hover:bg-black/70 text-white rounded-full transition-colors z-10"
                title="上一张 (←)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
              </motion.button>
            )}

            <div
              ref={containerRef}
              className="relative w-full h-full overflow-hidden cursor-grab active:cursor-grabbing flex items-center justify-center scrollbar-hide"
              onWheel={handleWheel}
              data-image-container="true"
              style={{
                scrollbarWidth: 'none',
                msOverflowStyle: 'none'
              }}
            >
              <style>{`
                .scrollbar-hide::-webkit-scrollbar {
                  display: none !important;
                }
              `}</style>
              <motion.div
                layoutId={`generated-image-${index}`}
                className="flex items-center justify-center"
                initial={{ opacity: 0, scale: 0.8 }}
                animate={{ opacity: 1, scale: 1 }}
                exit={{ opacity: 0, scale: 0.8 }}
                transition={{
                  layout: { 
                    type: "spring",
                    stiffness: 200,
                    damping: 20,
                    mass: 1.5
                  },
                  opacity: { duration: 0.2 },
                  scale: {
                    type: "spring",
                    stiffness: 200,
                    damping: 15,
                    mass: 1.5
                  }
                }}
              >
                <motion.img
                  src={currentImage}
                  alt="Zoomed"
                  className="max-w-[90vw] max-h-[90vh] object-contain select-none cursor-pointer"
                  animate={{
                    scale: scale,
                    x: position.x,
                    y: position.y,
                  }}
                  transition={{
                    type: "tween",
                    duration: 0,
                    ease: "linear"
                  }}
                  onClick={handleImageClick}
                  draggable={false}
                />
              </motion.div>
            </div>

            {/* 右切换按钮 */}
            {hasMultipleImages && (
              <motion.button
                initial={{ opacity: 0, x: 20 }}
                animate={{ opacity: 1, x: 0 }}
                transition={{ delay: 0.2, duration: 0.3 }}
                onClick={(e) => { e.stopPropagation(); goToNext(); }}
                className="absolute right-4 top-1/2 -translate-y-1/2 p-3 bg-black/50 hover:bg-black/70 text-white rounded-full transition-colors z-10"
                title="下一张 (→)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M9 18l6-6-6-6"/>
                </svg>
              </motion.button>
            )}

            {/* 控制按钮 */}
            <motion.div 
              initial={{ opacity: 0, y: -20 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ delay: 0.2, duration: 0.3 }}
              className="absolute top-4 right-4 flex gap-2"
            >
              {hasMultipleImages && (
                <span className="px-3 py-2 bg-black/50 text-white rounded-full text-sm">
                  {index + 1} / {images.length}
                </span>
              )}
              <button
                onClick={(e) => { e.stopPropagation(); handleReset(); }}
                className="p-2 bg-black/50 hover:bg-black/70 text-white rounded-full transition-colors"
                title="重置 (R)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/>
                  <path d="M3 3v9h9"/>
                </svg>
              </button>
              <button
                onClick={(e) => { 
                  e.stopPropagation(); 
                  // 先重置缩放状态，延迟关闭以确保动画正确
                  setScale(1);
                  setPosition({ x: 0, y: 0 });
                  setTimeout(() => onClose(), 50);
                }}
                className="p-2 bg-black/50 hover:bg-black/70 text-white rounded-full transition-colors"
                title="关闭 (ESC)"
              >
                <XIcon className="w-5 h-5" />
              </button>
            </motion.div>

            {/* 底部提示 */}
            {hasMultipleImages && (
              <motion.div
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ delay: 0.3, duration: 0.3 }}
                className="absolute bottom-4 left-0 right-0 flex justify-center"
              >
                <span className="text-white/60 text-xs bg-black/30 px-4 py-2 rounded-full whitespace-nowrap">
                  ← → 或 A D 切换图片 | 滚轮缩放 | 右键关闭 | R重置 | ESC关闭
                </span>
              </motion.div>
            )}
          </motion.div>
        );
      };

      const ImagePreviewModal = ({ generatedImagePreview, generatingCharInfo, onClose, onUseNewImage, onKeepOriginal }) => {
        const hasOriginal = generatingCharInfo.imageSrc && generatingCharInfo.imageSrc.startsWith('data:');
        const [enlargedImage, setEnlargedImage] = useState(null);

        // 防止拖拽选择文字时误关闭
        const handleMouseDown = (e) => {
          e.currentTarget.dataset.mousedownTarget = e.target === e.currentTarget ? 'backdrop' : 'content';
        };

        const handleMouseUp = (e) => {
          const mousedownTarget = e.currentTarget.dataset.mousedownTarget;
          const mouseupTarget = e.target === e.currentTarget ? 'backdrop' : 'content';
          if (mousedownTarget === 'backdrop' && mouseupTarget === 'backdrop') {
            onClose();
          }
        };

        // 双击放大图片
        const handleDoubleClick = (imageSrc) => {
          setEnlargedImage(imageSrc);
        };

        // 关闭放大图片
        const closeEnlarged = () => {
          setEnlargedImage(null);
        };

        return (
          <div className="fixed inset-0 z-[9999] flex items-center justify-center" onMouseDown={handleMouseDown} onMouseUp={handleMouseUp}>
            <div className="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
            <div className="relative z-10 max-w-4xl w-full mx-4 animate-pop" onClick={e => e.stopPropagation()}>
              <div className="neumorph-raised rounded-2xl overflow-hidden bg-white dark:bg-neutral-900">
                {/* 标题 */}
                <div className="px-6 py-4 border-b border-gray-200 dark:border-white/10 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-gray-800 dark:text-white flex items-center gap-2">
                    <SparklesIcon className="w-5 h-5 text-blue-500" />
                    图片生成完成 - 点击选择
                  </h3>
                  <button 
                    onClick={onClose}
                    className="p-2 hover:bg-gray-100 dark:hover:bg-white/10 rounded-lg transition-colors"
                  >
                    <XIcon className="w-5 h-5 text-gray-500 dark:text-neutral-400" />
                  </button>
                </div>
                
                {/* 图片预览 */}
                <div className="p-6">
                  {hasOriginal ? (
                    /* 有原图，显示对比 - 点击直接选择，双击放大 */
                    <div className="grid grid-cols-2 gap-6">
                      {/* 原图 */}
                      <div
                        className="text-center cursor-pointer transition-all hover:scale-105"
                        onClick={onKeepOriginal}
                        onDoubleClick={(e) => {
                          e.stopPropagation();
                          handleDoubleClick(generatingCharInfo.imageSrc);
                        }}
                        title="单击保留原图，双击放大"
                      >
                        <div className="relative aspect-[3/4] max-h-[50vh] mx-auto rounded-xl overflow-hidden shadow-xl bg-gray-100 dark:bg-neutral-800 ring-2 ring-blue-400 hover:ring-blue-500 transition-all">
                          <img
                            src={generatingCharInfo.imageSrc}
                            alt="Original"
                            className="w-full h-full object-contain pointer-events-none"
                          />
                          <div className="absolute inset-0 bg-blue-500/0 hover:bg-blue-500/10 transition-colors flex items-center justify-center">
                            <div className="bg-blue-500/80 text-white rounded-full px-4 py-2 opacity-0 hover:opacity-100 transition-opacity">
                              保留原图
                            </div>
                          </div>
                        </div>
                        <p className="text-sm text-blue-500 dark:text-blue-400 mt-3 font-medium">原图（双击放大）</p>
                      </div>

                      {/* 新图 */}
                      <div
                        className="text-center cursor-pointer transition-all hover:scale-105"
                        onClick={onUseNewImage}
                        onDoubleClick={(e) => {
                          e.stopPropagation();
                          handleDoubleClick(generatedImagePreview);
                        }}
                        title="单击使用新图，双击放大"
                      >
                        <div className="relative aspect-[3/4] max-h-[50vh] mx-auto rounded-xl overflow-hidden shadow-xl bg-gray-100 dark:bg-neutral-800 ring-2 ring-blue-400 hover:ring-blue-500 transition-all">
                          <img
                            src={generatedImagePreview}
                            alt="Generated"
                            className="w-full h-full object-contain pointer-events-none"
                          />
                          <div className="absolute inset-0 bg-blue-500/0 hover:bg-blue-500/10 transition-colors flex items-center justify-center">
                            <div className="bg-blue-500/80 text-white rounded-full px-4 py-2 opacity-0 hover:opacity-100 transition-opacity">
                              使用新图
                            </div>
                          </div>
                        </div>
                        <p className="text-sm text-blue-500 dark:text-blue-400 mt-3 font-medium">新生成（双击放大）</p>
                      </div>
                    </div>
                  ) : (
                    /* 无原图，只显示新图 */
                    <div
                      className="relative aspect-[3/4] max-h-[60vh] mx-auto rounded-xl overflow-hidden shadow-xl bg-gray-100 dark:bg-neutral-800 ring-2 ring-blue-400 cursor-pointer"
                      onDoubleClick={() => handleDoubleClick(generatedImagePreview)}
                      title="双击放大"
                    >
                      <img
                        src={generatedImagePreview}
                        alt="Generated"
                        className="w-full h-full object-contain pointer-events-none"
                      />
                    </div>
                  )}

                  {/* 放大图片的模态框 */}
                  {enlargedImage && (
                    <div
                      className="fixed inset-0 z-[10000] flex items-center justify-center bg-black/90"
                      onClick={closeEnlarged}
                    >
                      <div className="relative max-w-[95vw] max-h-[95vh]">
                        <img
                          src={enlargedImage}
                          alt="Enlarged"
                          className="max-w-full max-h-[95vh] object-contain"
                          onClick={e => e.stopPropagation()}
                        />
                        <button
                          onClick={closeEnlarged}
                          className="absolute top-4 right-4 p-2 bg-black/50 hover:bg-black/70 text-white rounded-full transition-colors"
                        >
                          <XIcon className="w-6 h-6" />
                        </button>
                        <p className="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/80 text-sm bg-black/50 px-4 py-2 rounded-full">
                          点击任意位置关闭
                        </p>
                      </div>
                    </div>
                  )}
                  
                  <p className="text-center text-sm text-gray-500 dark:text-neutral-400 mt-4">
                    角色：{generatingCharInfo.clean_name}
                  </p>
                </div>
                
                {/* 操作按钮 */}
                <div className="px-6 py-4 border-t border-gray-200 dark:border-white/10 flex justify-center">
                  <button 
                    onClick={onClose}
                    className="neumorph-raised btn-physics px-6 py-2.5 rounded-xl text-sm font-bold text-gray-600 dark:text-neutral-300 flex items-center gap-2 transition-all active:scale-95"
                  >
                    <XIcon className="w-4 h-4" />
                    放弃
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
