              console.warn('未配置百度翻译API，中文将保持原样');
              // 未配置API时，中文保持原样
            } else {
              // 显示加载状态
              setInputValue('翻译中...');
              try {
                const result = await translateWithBaidu(trimmedText, 'zh', 'en');
                console.log('翻译结果:', result);
                if (result.dst && result.dst !== result.src) {
                  finalText = result.dst;
                  // 保存中文原文到translations，用于显示
                  setTranslations(prev => ({ ...prev, [finalText.toLowerCase()]: trimmedText }));
                } else {
                  console.warn('翻译返回原文，保持原样');
                }
              } catch (error) {
                console.error('翻译出错:', error);
              }
            }
          }
          
          const newTags = [...tags, { text: finalText, weight: 1.0 }];
          updatePromptFromTags(newTags);
          setInputValue('');
          setShowTagList(false);
          setShowSuggestions(false);
        };

        // 从booruTags中搜索标签建议
        useEffect(() => {
          if (!inputValue.trim() || booruTags.length === 0) {
            setSearchSuggestions([]);
            setShowSuggestions(false);
            return;
          }

          const searchLower = String(inputValue || '').toLowerCase().trim();
          const suggestions = booruTags.filter(tag => {
            const [enTag, catId, pop, alias, cnTag, l1, l2, notes] = tag;
            // 如果选中了特定分组，只搜索该分组内的标签
            if (tagBrowserCategory !== 'all' && catId !== tagBrowserCategory) {
              return false;
            }
            // 确保所有字段都是字符串类型
            const enTagStr = String(enTag || '');
            const cnTagStr = String(cnTag || '');
            const aliasStr = String(alias || '');
            const searchText = `${enTagStr} ${cnTagStr} ${aliasStr}`.toLowerCase();
            return searchText.includes(searchLower);
          }).slice(0, 100);

          setSearchSuggestions(suggestions);
          // 只有在input获得焦点时才显示下拉
          setShowSuggestions(suggestions.length > 0 && isInputFocused);
        }, [inputValue, booruTags, tagBrowserCategory, isInputFocused]);

        // 从搜索建议中添加标签
        const handleAddTagFromSuggestion = (tag) => {
          const [enTag, catId, pop, alias, cnTag] = tag;
          const tagText = enTag;
          
          // 如果有中文标签，保存翻译映射
          if (cnTag) {
            setTranslations(prev => ({ ...prev, [enTag.toLowerCase()]: cnTag }));
          }
          
          const newTags = [...tags, { text: tagText, weight: 1.0 }];
          updatePromptFromTags(newTags);
          setInputValue('');
          setShowSuggestions(false);
        };

        // 点击外部关闭搜索建议
        useEffect(() => {
          if (!showSuggestions) return;
          
          const handleClickOutside = (e) => {
            if (
              suggestionsRef.current && 
              !suggestionsRef.current.contains(e.target) &&
              inputRef.current &&
              !inputRef.current.contains(e.target)
            ) {
              setShowSuggestions(false);
            }
          };
          
          document.addEventListener('mousedown', handleClickOutside);
          return () => document.removeEventListener('mousedown', handleClickOutside);
        }, [showSuggestions]);

        const handleRemoveTag = (index) => {
          // 将 tags 映射为包含状态的对象数组
          const mapped = tags.map((t, i) => ({
            tag: t,
            isSelected: selectedTags.has(i),
            isIgnored: ignoredTags.has(i)
          }));

          // 在 mapped 上执行删除
          mapped.splice(index, 1);

          // 重新提取出 newTags
          const newTags = mapped.map(m => m.tag);
          updatePromptFromTags(newTags);

          // 重新遍历修改后的 mapped，将新的索引重新存入 newSelected 和 newIgnored
          const newSelected = new Set();
          const newIgnored = new Set();
          mapped.forEach((m, i) => {
            if (m.isSelected) newSelected.add(i);
            if (m.isIgnored) newIgnored.add(i);
          });
          setSelectedTags(newSelected);
          setIgnoredTags(newIgnored);
        };

        const handleWeightChange = (index, newWeight) => {
          const newTags = [...tags];
          newTags[index].weight = newWeight;
          updatePromptFromTags(newTags);
        };

        const handleBatchWeightChange = (delta) => {
          if (selectedTags.size === 0) return;
          const newTags = tags.map((tag, i) => {
            if (selectedTags.has(i)) {
              return { ...tag, weight: Math.max(0.1, Math.round((tag.weight + delta) * 100) / 100) };
            }
            return tag;
          });
          updatePromptFromTags(newTags);
        };

        const getBatchWeightDisplay = () => {
          if (selectedTags.size === 0) return '';
          const weights = Array.from(selectedTags).map(i => tags[i]?.weight || 1.0);
          const min = Math.min(...weights);
          const max = Math.max(...weights);
          if (min === max) return min.toFixed(1);
          return `${min.toFixed(1)}~${max.toFixed(1)}`;
        };

        const toggleIgnoreTag = (index, e) => {
          e.preventDefault();
          e.stopPropagation();
          const newIgnored = new Set(ignoredTags);
          if (newIgnored.has(index)) {
            newIgnored.delete(index);
          } else {
            newIgnored.add(index);
          }
          setIgnoredTags(newIgnored);
          // 忽略只是视觉上的禁用，不删除数据
        };

        const handleDragStart = (e, index) => {
          // 如果有选中的标签，拖动时移动所有选中的标签
          if (selectedTags.size > 1 && selectedTags.has(index)) {
            const selectedIndices = Array.from(selectedTags).sort((a, b) => a - b);
            e.dataTransfer.setData('text/plain', JSON.stringify({ multi: true, indices: selectedIndices, sourceIndex: index }));
          } else {
            e.dataTransfer.setData('text/plain', JSON.stringify({ multi: false, index }));
          }
          e.dataTransfer.effectAllowed = 'move';
          // 设置拖动图像为透明，隐藏默认的区域截图
          const img = new Image();
          img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
          e.dataTransfer.setDragImage(img, 0, 0);
          setIsDragging(true);
        };

        const handleDragOver = (e, index) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          setDragOverIndex(index);
        };

        const handleDragLeave = () => {
          setDragOverIndex(null);
        };

        const handleDragEnd = () => {
          setIsDragging(false);
          setDragOverIndex(null);
        };

        const handleDrop = (e, dropIndex, isDropAtEnd = false) => {
          e.preventDefault();
          const data = JSON.parse(e.dataTransfer.getData('text/plain') || '{}');

          // 将 tags 映射为包含状态的对象数组
          let mapped = tags.map((t, i) => ({
            tag: t,
            isSelected: selectedTags.has(i),
            isIgnored: ignoredTags.has(i)
          }));

          if (data.multi) {
            // 多选拖动
            const { indices } = data;
            // 检查是否拖放到选中的标签区域内
            if (!isDropAtEnd && indices.includes(dropIndex)) return;

            // 提取选中的项（按原顺序）
            const selectedItems = indices.map(i => mapped[i]);
            // 删除选中的项（从后往前删除，避免索引变化）
            for (let i = indices.length - 1; i >= 0; i--) {
              mapped.splice(indices[i], 1);
            }
            // 计算插入位置（考虑删除的元素）
            let insertIndex = isDropAtEnd ? mapped.length : dropIndex;
            for (const idx of indices) {
              if (idx < dropIndex) insertIndex--;
            }
            // 插入选中的项
            mapped.splice(insertIndex, 0, ...selectedItems);

            // 提取 newTags
            const newTags = mapped.map(m => m.tag);
            updatePromptFromTags(newTags);

            // 重新收集 newSelected 和 newIgnored 索引
            const newSelected = new Set();
            const newIgnored = new Set();
            mapped.forEach((m, i) => {
              if (m.isSelected) newSelected.add(i);
              if (m.isIgnored) newIgnored.add(i);
            });
            setSelectedTags(newSelected);
            setIgnoredTags(newIgnored);
          } else {
            // 单选拖动
            const dragIndex = data.index;
            if (isNaN(dragIndex) || (!isDropAtEnd && dragIndex === dropIndex)) return;

            // 剥离出拖动的项
            const [draggedItem] = mapped.splice(dragIndex, 1);

            // 计算插入位置
            let insertIndex = isDropAtEnd ? mapped.length : dropIndex;
            // 重点修复：如果 dragIndex < dropIndex，说明是从前往后拖，insertIndex 必须减 1
            if (!isDropAtEnd && dragIndex < dropIndex) {
              insertIndex--;
            }

            // 插入到新的位置
            mapped.splice(insertIndex, 0, draggedItem);

            // 提取 newTags
            const newTags = mapped.map(m => m.tag);
            updatePromptFromTags(newTags);

            // 重新收集 newSelected 和 newIgnored 索引
            const newSelected = new Set();
            const newIgnored = new Set();
            mapped.forEach((m, i) => {
              if (m.isSelected) newSelected.add(i);
              if (m.isIgnored) newIgnored.add(i);
            });
            setSelectedTags(newSelected);
            setIgnoredTags(newIgnored);
          }
          // 清除拖动预览状态
          setDragOverIndex(null);
          setIsDragging(false);
        };

        const handleTranslateAll = async () => {
          if (tags.length === 0) return;
          setIsTranslating(true);
          
          const newTranslations = { ...translations };
          for (const tag of tags) {
            if (!newTranslations[tag.text.toLowerCase()]) {
              const result = await translateWithBaidu(tag.text, 'en', 'zh');
              if (result.dst && result.dst !== tag.text) {
                newTranslations[tag.text.toLowerCase()] = result.dst;
              }
            }
          }
          
          setTranslations(newTranslations);
          setIsTranslating(false);
        };

        const isEnglish = (text) => /^[a-zA-Z0-9\s\-_]+$/.test(text);

        const handleTagClick = (index, e) => {
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            const newSelected = new Set(selectedTags);
            if (newSelected.has(index)) {
              newSelected.delete(index);
            } else {
              newSelected.add(index);
            }
            setSelectedTags(newSelected);
          } else if (e.shiftKey && selectedTags.size > 0) {
            e.preventDefault();
            const lastSelected = Array.from(selectedTags).pop();
            const start = Math.min(lastSelected, index);
            const end = Math.max(lastSelected, index);
            const newSelected = new Set(selectedTags);
            for (let i = start; i <= end; i++) {
              newSelected.add(i);
            }
            setSelectedTags(newSelected);
          } else {
            // 普通点击：如果已选中则取消选中该单个标签，否则只选中该标签
            const newSelected = new Set(selectedTags);
            if (newSelected.has(index)) {
              newSelected.delete(index);
            } else {
              newSelected.add(index);
            }
            setSelectedTags(newSelected);
          }
        };

        const handleSelectAll = () => {
          setSelectedTags(new Set(tags.map((_, i) => i)));
        };

        const handleDeselectAll = () => {
          setSelectedTags(new Set());
        };

        const handleDeleteSelected = () => {
          if (selectedTags.size === 0) return;

          // 将 tags 映射为包含状态的对象数组
          const mapped = tags.map((t, i) => ({
            tag: t,
            isSelected: selectedTags.has(i),
            isIgnored: ignoredTags.has(i)
          }));

          // 使用 filter 移除掉 isSelected 为 true 的项
          const filteredMapped = mapped.filter(m => !m.isSelected);

          // 重新生成 newTags
          const newTags = filteredMapped.map(m => m.tag);
          updatePromptFromTags(newTags);

          // 重新遍历剩下的 mapped 收集 newIgnored 状态
          const newIgnored = new Set();
          filteredMapped.forEach((m, i) => {
            if (m.isIgnored) newIgnored.add(i);
          });
          setIgnoredTags(newIgnored);

          // 清空 selectedTags
          setSelectedTags(new Set());
        };

        const handleIgnoreSelected = () => {
          if (selectedTags.size === 0) return;
          const newIgnored = new Set(ignoredTags);
          const allIgnored = Array.from(selectedTags).every(i => newIgnored.has(i));
          selectedTags.forEach(i => {
            if (allIgnored) {
              newIgnored.delete(i);
            } else {
              newIgnored.add(i);
            }
          });
          setIgnoredTags(newIgnored);
          setSelectedTags(new Set()); // 忽略后取消选择状态
          // 忽略只是视觉上的禁用，不删除数据
        };

        const handleMouseDown = (e) => {
          if (e.target === tagContainerRef.current || e.target.closest('.tag-container-bg')) {
            e.preventDefault();
            setIsSelecting(true);
            setSelectionStart({ x: e.clientX, y: e.clientY });
            setSelectionEnd({ x: e.clientX, y: e.clientY });
          }
        };

        const selectionBoxStyle = isSelecting && selectionStart && selectionEnd ? {
          left: Math.min(selectionStart.x, selectionEnd.x),
          top: Math.min(selectionStart.y, selectionEnd.y),
          width: Math.abs(selectionEnd.x - selectionStart.x),
          height: Math.abs(selectionEnd.y - selectionStart.y),
        } : null;

        // 处理图片拖拽进入
        const handleImageDragEnter = (e) => {
          e.preventDefault();
          e.stopPropagation();
          setIsImageDragging(true);
        };

        // 处理图片拖拽悬停
        const handleImageDragOver = (e) => {
          e.preventDefault();
          e.stopPropagation();
          e.dataTransfer.dropEffect = 'copy';
          setIsImageDragging(true);
        };

        // 处理图片拖拽离开
        const handleImageDragLeave = (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (!e.currentTarget.contains(e.relatedTarget)) {
            setIsImageDragging(false);
          }
        };

        // 处理图片拖放
        const handleImageDrop = (e) => {
          e.preventDefault();
          e.stopPropagation();
          setIsImageDragging(false);
          const files = e.dataTransfer.files;
          if (files.length > 0 && files[0].type.startsWith('image/')) {
            const file = files[0];
            const imageUrl = URL.createObjectURL(file);
            setDroppedImage(imageUrl);
            setShowCloneConfirm(true);
          }
        };

        return (
          <div
            className={`prompt-tag-manager relative transition-all duration-200 ${isImageDragging && type === 'positive' ? 'ring-2 ring-blue-400 ring-dashed bg-blue-50/50 dark:bg-blue-900/20 rounded-xl' : ''}`}
            onDragEnter={handleImageDragEnter}
            onDragOver={handleImageDragOver}
            onDragLeave={handleImageDragLeave}
            onDrop={handleImageDrop}
          >
            {/* 拖拽提示 - 仅正面提示词显示 */}
            {isImageDragging && type === 'positive' && (
              <motion.div
                initial={{ opacity: 0, scale: 0.95 }}
                animate={{ opacity: 1, scale: 1 }}
                exit={{ opacity: 0, scale: 0.95 }}
                className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none"
              >
                <div className="bg-blue-500/90 text-white px-4 py-2 rounded-lg shadow-lg text-sm font-medium">
                  放下图片以复刻生成参数
                </div>
              </motion.div>
            )}
            {/* 工具栏 */}
            <div className="flex items-center gap-1 mb-2 flex-wrap">
              <div className="flex rounded-lg overflow-hidden neumorph-raised">
                <button
                  onClick={() => setActiveTab('input')}
                  className={`px-3 py-1 text-xs ${activeTab === 'input' ? 'bg-blue-500 text-white' : 'bg-transparent text-gray-600 dark:text-neutral-400'}`}
                >
                  输入
                </button>
                <button
                  onClick={() => setActiveTab('tags')}
                  className={`px-3 py-1 text-xs ${activeTab === 'tags' ? 'bg-blue-500 text-white' : 'bg-transparent text-gray-600 dark:text-neutral-400'}`}
                >
                  标签 ({tags.length})
                </button>
              </div>
              
              <div className="flex items-center gap-1 ml-auto">
                {onParseWebUIParams && type === 'positive' && (
                  <button
                    onClick={async () => {
                      const handleParse = (text) => {
                        if (parseWebUIParams(text, availableModels, onParseWebUIParams)) {
                          if(navigator.vibrate) navigator.vibrate(50);
                        }
                      };
                      try {
                        const text = await navigator.clipboard.readText();
                        if (text && (text.includes("Steps:") || text.includes("Negative prompt:"))) {
                          handleParse(text);
                        } else {
                          throw new Error("剪贴板未包含参数");
                        }
                      } catch (e) {
                        const manualText = prompt("无法自动读取剪贴板或内容不符，请手动粘贴您的生图参数文本：\n(如: xxx, Negative prompt: xxx, Steps: 30...)");
                        if (manualText) handleParse(manualText);
                      }
                    }}
                    className="neumorph-raised btn-physics px-2 py-1 rounded-lg text-xs text-white flex items-center gap-1"
                    title="从剪贴板复刻参数"
                  >
                    <ImportIcon className="w-3 h-3" />
                    复刻
                  </button>
                )}
                <button
                  onClick={handleTranslateAll}
                  disabled={isTranslating || tags.length === 0}
                  className="neumorph-raised btn-physics px-2 py-1 rounded-lg text-xs text-white disabled:opacity-50 flex items-center gap-1"
                  title="翻译所有标签"
                >
                  <TranslateIcon className="w-3 h-3" />
                  {isTranslating ? '翻译中...' : '翻译'}
                </button>
                <button
                  onClick={() => {
                    onChange('');
                    setIgnoredTags(new Set());
                    setSelectedTags(new Set());
                  }}
                  disabled={tags.length === 0}
                  className="neumorph-raised btn-physics px-2 py-1 rounded-lg text-xs text-white disabled:opacity-50 flex items-center gap-1"
                  title="清空所有标签"
                >
                  <TrashIcon className="w-3 h-3" />
                  清空
                </button>
              </div>
            </div>



            {/* 输入模式 */}
            {activeTab === 'input' && (
              <div className="relative">
                <textarea
                  ref={textareaRef}
                  value={value}
                  onChange={e => onChange(e.target.value)}
                  onDragOver={(e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'copy';
                  }}
                  onDrop={(e) => {
                    e.preventDefault();
                    const files = e.dataTransfer.files;
                    if (files.length > 0 && files[0].type.startsWith('image/')) {
                      const file = files[0];
                      const imageUrl = URL.createObjectURL(file);
                      setDroppedImage(imageUrl);
                      setShowCloneConfirm(true);
                    }
                  }}
                  onBlur={async (e) => {
                    // 失去焦点时检查并翻译中文
                    const text = e.target.value;
                    if (!text.trim()) return;
                    
                    // 检查是否包含中文
                    const hasChinese = /[\u4e00-\u9fa5]/.test(text);
                    if (!hasChinese) return;
                    
                    // 检查是否配置了百度翻译API
                    const appid = localStorage.getItem('baidu_translate_appid');
                    const key = localStorage.getItem('baidu_translate_key');
                    if (!appid || !key) {
                      console.warn('未配置百度翻译API，中文将保持原样');
                      return;
                    }
                    
                    // 解析标签并翻译中文部分
                    const parts = text.split(',').map(p => p.trim()).filter(Boolean);
                    const translatedParts = await Promise.all(parts.map(async (part) => {
                      // 如果包含中文，进行翻译
                      if (/[\u4e00-\u9fa5]/.test(part)) {
                        try {
                          const result = await translateWithBaidu(part, 'zh', 'en');
                          if (result.dst && result.dst !== result.src) {
                            // 保存翻译映射
                            setTranslations(prev => ({ ...prev, [result.dst.toLowerCase()]: part }));
                            return result.dst;
                          }
                        } catch (error) {
                          console.error('翻译出错:', error);
                        }
                      }
                      return part;
                    }));
                    
                    const newValue = translatedParts.join(', ');
                    if (newValue !== text) {
                      onChange(newValue);
                    }
                  }}
                  placeholder={type === 'positive' ? "输入正面提示词（支持中文自动翻译）..." : "输入提示词（支持中文自动翻译）..."}
                  className="w-full neumorph-pressed px-3 py-2 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 outline-none resize-none h-24"
                />
                <p className="text-xs text-gray-400 mt-1">提示：输入中文后点击其他地方或按Tab键会自动翻译为英文</p>
              </div>
            )}

            {/* 标签模式 */}
            {activeTab === 'tags' && (
              <div className="space-y-2">
                <div className="flex gap-1 relative">
                  <div className="flex-1 relative">
                    <input
                      ref={inputRef}
                      type="text"
                      value={inputValue}
                      onChange={e => setInputValue(e.target.value)}
                      onKeyDown={e => {
                        if (e.key === 'Enter' && inputValue.trim()) {
                          handleAddTag(inputValue);
                        }
                      }}
                      onFocus={() => setIsInputFocused(true)}
                      onBlur={() => setTimeout(() => setIsInputFocused(false), 200)}
                      placeholder="输入新标签（中文会自动翻译，或搜索标签库）..."
                      className="w-full neumorph-pressed px-2 py-1 rounded-lg text-sm text-gray-900 dark:text-white outline-none"
                    />
                    {/* 搜索建议下拉框 - 4列网格形式 */}
                    {showSuggestions && searchSuggestions.length > 0 && (
                      <div
                        ref={suggestionsRef}
                        className="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 max-h-[480px] overflow-y-auto z-50 p-2 custom-scrollbar"
                      >
                        <div className="grid grid-cols-4 gap-1.5">
                          {searchSuggestions.map((tag, idx) => {
                            const [enTag, catId, pop, alias, cnTag] = tag;
                            const displayText = cnTag || enTag;
                            const subText = cnTag ? enTag : '';
                            const formatPop = (num) => {
                              const n = parseInt(num, 10);
                              if (isNaN(n)) return '0';
                              if (n >= 1000000) return `${(n / 1000000).toFixed(1).replace(/\.0$/, '')}M`;
                              if (n >= 1000) return `${(n / 1000).toFixed(1).replace(/\.0$/, '')}K`;
                              return n.toString();
                            };
                            return (
                              <button
                                key={idx}
                                onClick={() => handleAddTagFromSuggestion(tag)}
                                className="text-left px-2 py-0.5 rounded flex items-center justify-between bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 active:opacity-80"
                                title={`${enTag}${cnTag ? ` (${cnTag})` : ''}${alias ? ` [${alias}]` : ''} - 热度: ${pop || 0}`}
                              >
                                <div className="overflow-hidden mr-1">
                                  <div className="font-medium text-2xs truncate leading-tight">{displayText}</div>
                                  {subText && (
                                    <div className="text-[10px] truncate leading-tight text-gray-500 dark:text-gray-500">{subText}</div>
                                  )}
                                </div>
                                <div className="text-[10px] font-mono flex-shrink-0 text-gray-500 dark:text-gray-500">
                                  {formatPop(pop)}
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>

                            <span

                              title={tag.text}
                            >
                              {tag.text}
                            </span>
                          </div>
                        </div>

                    })

                  {/* 最后一个标签后面的放置区域 - 允许拖放到最后 */}

                    <div
                      onDragOver={e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverIndex(tags.length); }}
                      onDragLeave={() => setDragOverIndex(null)}

                      className={`flex-grow min-w-[40px] h-full self-stretch ${dragOverIndex === tags.length ? 'bg-blue-500/20' : ''}`}

                      {dragOverIndex === tags.length && isDragging && (

                </div>
                <p className="text-xs text-gray-400">

              </div>

            {/* 复刻确认弹窗 */}
            {showCloneConfirm && (

      // 模型选择器全屏模态框组件 - 使用CharacterCard展示模型
      const ModelPickerModal = ({ isOpen, onClose, type, models, selectedIds, onConfirm, serverUrl, checkpointsData, lorasData }) => {
        const [tempSelectedIds, setTempSelectedIds] = useState(new Set());
        const [searchQuery, setSearchQuery] = useState('');
        const [visible, setVisible] = useState(false);
        const [animationPhase, setAnimationPhase] = useState('hidden');
        const [modelCards, setModelCards] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const portalRef = useRef(null);

        // 初始化选中状态
        useEffect(() => {
          if (isOpen && selectedIds) {
            setTempSelectedIds(new Set(selectedIds));
          }
        }, [isOpen, selectedIds]);

        // 动态创建portal容器
        useEffect(() => {
          if (!portalRef.current) {
            portalRef.current = document.createElement('div');
            portalRef.current.id = 'model-picker-modal-root';
            document.body.appendChild(portalRef.current);
          }
          return () => {
            if (portalRef.current && portalRef.current.parentNode) {
              portalRef.current.parentNode.removeChild(portalRef.current);
            }
          };
        }, []);

        // 动画控制
        useEffect(() => {
          if (isOpen) {
            setVisible(true);
            requestAnimationFrame(() => {
              setAnimationPhase('entering');
              setTimeout(() => setAnimationPhase('entered'), 500);
            });
            // 加载模型卡片数据
            loadModelCards();
          } else {
            setAnimationPhase('exiting');
            setTimeout(() => {
              setVisible(false);
              setAnimationPhase('hidden');
              setSearchQuery('');
            }, 400);
          }
        }, [isOpen]);

        // 加载模型卡片数据 - 使用已有的imageSrc数据，并按文件名智能去重
        const loadModelCards = async () => {
          if (!models || models.length === 0) return;
          setIsLoading(true);
          try {
            // 获取已有的模型数据（包含imageSrc）
            const existingModels = type === 'checkpoint' ? (checkpointsData || []) : (lorasData || []);
            
            // 智能去重：按文件名（clean_name）去重，同名模型只保留第一个
            const seenNames = new Set();
            const uniqueModels = [];
            
            for (const modelPath of models) {
              const fileName = modelPath.split(/[\\/]/).pop();
              const cleanName = fileName.replace(/\.(safetensors|ckpt|pt|pth)$/i, '');
              
              // 如果同名模型已存在，跳过
              if (seenNames.has(cleanName.toLowerCase())) {
                continue;
              }
              
              seenNames.add(cleanName.toLowerCase());
              uniqueModels.push({ modelPath, fileName, cleanName });
            }
            
            // 将模型路径转换为卡片格式，并保留imageSrc
            const cards = uniqueModels.map(({ modelPath, fileName, cleanName }) => {
              // 从已有数据中查找对应的imageSrc - 优先匹配modelPath，其次匹配文件名
              const existingModel = existingModels.find(m => {
                const mFileName = m.modelPath?.split(/[\\/]/).pop();
                return m.modelPath === modelPath || 
                       m.id === modelPath ||
                       mFileName === fileName ||
                       m.clean_name?.toLowerCase() === cleanName.toLowerCase();
              });
              
              return {
                id: modelPath,
                modelPath: modelPath,
                clean_name: cleanName,
                name: cleanName,
                groups: [type === 'checkpoint' ? 'checkpoint' : 'lora'],
                value: cleanName,
                imageSrc: existingModel?.imageSrc || null
              };
            });
            setModelCards(cards);
          } catch (error) {
            console.error('Error loading model cards:', error);
          } finally {
            setIsLoading(false);
          }
        };

        // ESC键关闭
        useEffect(() => {
          const handleKeyDown = (e) => {
            if (e.key === 'Escape' && isOpen) {
              onClose();
            }
          };
          if (isOpen) {
            document.addEventListener('keydown', handleKeyDown);
            return () => document.removeEventListener('keydown', handleKeyDown);
          }
        }, [isOpen, onClose]);

        // 处理卡片选中
        const handleCardSelect = (modelPath) => {
          if (type === 'checkpoint') {
            // 单选模式：清空之前的选中，选中当前
            setTempSelectedIds(new Set([modelPath]));
          } else {
            // 多选模式：Toggle
            setTempSelectedIds(prev => {
              const newSet = new Set(prev);
              if (newSet.has(modelPath)) {
                newSet.delete(modelPath);
              } else {
                newSet.add(modelPath);
              }
              return newSet;
            });
          }
        };

        // 确认选择
        const handleConfirm = () => {
          onConfirm(Array.from(tempSelectedIds));
          onClose();
        };

        // 过滤模型
        const filteredModels = searchQuery.trim()
          ? modelCards.filter(m => m.clean_name.toLowerCase().includes(searchQuery.toLowerCase()))
          : modelCards;

        // 动画样式 - 与随机灵感同款弹出动画
        const getAnimationStyles = () => {
          switch (animationPhase) {
            case 'hidden':
              return { transform: 'scale(0.3)', opacity: 0 };
            case 'entering':
              return { transform: 'scale(1)', opacity: 1 };
            case 'entered':
              return { transform: 'scale(1)', opacity: 1 };
            case 'exiting':
              return { transform: 'scale(0.9)', opacity: 0 };
            default:
              return { transform: 'scale(0.3)', opacity: 0 };
          }
        };

        if (!visible) return null;

        // 防止拖拽选择文字时误关闭
        const handleMouseDown = (e) => {
          e.currentTarget.dataset.mousedownTarget = e.target === e.currentTarget ? 'backdrop' : 'content';
        };

        const handleMouseUp = (e) => {
          const mousedownTarget = e.currentTarget.dataset.mousedownTarget;
          const mouseupTarget = e.target === e.currentTarget ? 'backdrop' : 'content';
          if (mousedownTarget === 'backdrop' && mouseupTarget === 'backdrop') {
            onClose();
          }
        };

        return ReactDOM.createPortal(
          <div 
            className="fixed inset-0 z-[3000] flex items-center justify-center"
            style={{ background: 'rgba(0, 0, 0, 0.8)', backdropFilter: 'blur(20px)' }}
            onMouseDown={handleMouseDown}
            onMouseUp={handleMouseUp}
          >
            <div
              className="w-full h-full flex flex-col p-6"
              style={{
                ...getAnimationStyles(),
                transition: 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease'
              }}
            >
              {/* 顶部标题栏 */}
              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-4">
                  <h2 className="text-2xl font-bold text-white">
                    {type === 'checkpoint' ? '选择大模型' : '选择 LoRA'}
                  </h2>
                  <span className="text-sm text-gray-400">
                    {type === 'checkpoint' ? '单选模式' : '多选模式'}
                    {tempSelectedIds.size > 0 && ` · 已选择 ${tempSelectedIds.size} 个`}
                  </span>
                </div>
                <div className="flex items-center gap-3">
                  {/* 搜索框 */}
                  <div className="relative">
                    <input
                      type="text"
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      placeholder="搜索模型..."
                      className="w-64 px-4 py-2 pl-10 rounded-xl bg-white/10 text-white placeholder-gray-400 outline-none border border-white/10 focus:border-blue-500/50"
                    />
                    <SearchIcon className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                  </div>
                  {/* 完成按钮 */}
                  <button
                    onClick={handleConfirm}
                    className="px-6 py-2 rounded-xl bg-blue-500 text-white font-medium hover:bg-blue-600 transition-colors"
                  >
                    完成
                  </button>
                  {/* 关闭按钮 */}
                  <button
                    onClick={onClose}
                    className="p-2 rounded-xl bg-white/10 text-gray-400 hover:bg-white/20 hover:text-white transition-colors"
                  >
                    <XIcon className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {/* 模型网格 */}
              <div className="flex-1 overflow-auto custom-scrollbar">
                {isLoading ? (
                  <div className="flex items-center justify-center h-full">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                  </div>
                ) : filteredModels.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-gray-400">
                    <FolderIcon className="w-16 h-16 mb-4 opacity-50" />
                    <p>{searchQuery ? '未找到匹配的模型' : '暂无可用模型'}</p>
                  </div>
                ) : (
                  <div className="grid gap-4" style={{ 
                    gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))',
                    maxHeight: 'calc(100vh - 150px)'
                  }}>
                    {filteredModels.map(model => (
                      <div key={model.id} className="aspect-[3/4]">
                        <CharacterCard
                          char={model}
                          isSelected={tempSelectedIds.has(model.id)}
                          onSelect={() => handleCardSelect(model.id)}
                          onEdit={() => {}}
                          onImageUpload={() => {}}
                          onToggleFavorite={() => {}}
                          isPicker={true}
                        />
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>,
          portalRef.current
        );
      };

      // 快捷生图全屏模态框组件
      const QuickGenerateModal = ({ isOpen, onClose, imageGenSettings, setImageGenSettings, checkpointsData, lorasData, charactersData }) => {

          // 发送请求
          const response = await fetch(`${localSettings.serverUrl}/prompt`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: workflow })
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const result = await response.json();
          const promptId = result.prompt_id;

          // 等待生成完成
          return new Promise((resolve, reject) => {
            const wsUrl = localSettings.serverUrl.replace('http://', 'ws://').replace('https://', 'wss://');
            const clientId = `echo_quick_${Date.now()}_${batchIndex}`;
            let ws = null;
            let completed = false;
            let timeoutId = null;

            ws = new WebSocket(`${wsUrl}/ws?clientId=${clientId}`);

            ws.onmessage = async (event) => {
              try {
                if (event.data instanceof Blob) return;
                const data = JSON.parse(event.data);

                if (data.type === 'progress') {
                  const progressValue = Math.round((data.data.value / data.data.max) * 100);
                  setGenerationProgress(progressValue);
                  setGenerationStage(`生成第${batchIndex + 1}/${totalBatch}张 ${progressValue}%`);
                }

                if (data.type === 'executed') {
                  completed = true;
                  const image = await fetchGeneratedImage(promptId);
                  if (ws) ws.close();
                  if (timeoutId) clearTimeout(timeoutId);
                  resolve(image);
                }
              } catch (err) {
                console.error('WebSocket error:', err);
              }
            };

            ws.onerror = (err) => {
              console.error('WebSocket error:', err);
            };

            // 轮询备用
            const pollInterval = setInterval(async () => {
              if (completed) {
                clearInterval(pollInterval);
                return;
              }

              try {
                const historyResponse = await fetch(`${localSettings.serverUrl}/history/${promptId}`);
                if (!historyResponse.ok) return;

                const historyData = await historyResponse.json();
                const promptHistory = historyData[promptId];

                if (promptHistory && promptHistory.outputs) {
                  clearInterval(pollInterval);
                  completed = true;
                  const image = await fetchGeneratedImage(promptId);
                  if (ws) ws.close();
                  if (timeoutId) clearTimeout(timeoutId);
                  resolve(image);
                }
              } catch (err) {
                console.error('Poll error:', err);
              }
            }, 2000);

            // 超时处理
            timeoutId = setTimeout(() => {
              if (!completed) {
                clearInterval(pollInterval);
                if (ws) ws.close();
                reject(new Error('生成超时'));
              }
            }, 300000);
          });
        };

        // 生成图片（支持批量）
        const handleGenerate = async () => {
          if (!localSettings.modelPath) {
            showToast('请先选择大模型！');
            return;
          }

          setIsGenerating(true);
          setGenerationProgress(0);
          setGenerationStage('准备中...');
          setGeneratedImage(null);
          setGeneratedImages([]);

          try {
            const images = [];
            const total = batchSize;

            for (let i = 0; i < total; i++) {
              setCurrentBatchIndex(i + 1);
              setGenerationStage(`生成第${i + 1}/${total}张...`);

              const image = await generateSingleImage(i, total);
              if (image) {
                images.push(image);
                setGeneratedImages([...images]);
                
                // 每生成一张图片就立即添加到历史记录的最前面（逐张显示）
                setImageHistory(prev => {
                  const newHistory = [image, ...prev];
                  // 限制历史记录数量，避免内存溢出，最多保留100张
                  return newHistory.slice(0, 100);
                });
                
                // 保存生成参数到数据库，用于后续复刻功能
                const paramsToSave = {
                  positivePrompt: localSettings.positivePrompt,
                  negativePrompt: localSettings.negativePrompt,
                  width: localSettings.width,
                  height: localSettings.height,
                  steps: localSettings.steps,
                  cfg: localSettings.cfg,
                  seed: localSettings.seed,
                  sampler: localSettings.sampler,
                  scheduler: localSettings.scheduler,
                  modelPath: localSettings.modelPath,
                  loras: localSettings.loras,
                  timestamp: Date.now()
                };
                
                // 异步保存参数
                dbLoad('recent_generation_params').then(existing => {
                  const paramsMap = existing || {};
                  paramsMap[image] = paramsToSave;
                  // 只保留最近50张图片的参数
                  const entries = Object.entries(paramsMap);
                  if (entries.length > 50) {
                    const sorted = entries.sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));
                    const trimmed = sorted.slice(0, 50);
                    const newMap = {};
                    trimmed.forEach(([k, v]) => newMap[k] = v);
                    dbSave('recent_generation_params', newMap);
                  } else {
                    dbSave('recent_generation_params', paramsMap);
                  }
                });
              }

              // 短暂延迟，避免请求过快
              if (i < total - 1) {
                await new Promise(resolve => setTimeout(resolve, 500));
              }
            }

            setGenerationStage('完成！');
            setGenerationProgress(100);
            setImageGenSettings(localSettings);
            dbSave(IMAGE_GEN_KEY, localSettings);

            // 如果只有一张图，也设置到 generatedImage 保持兼容
            if (images.length === 1) {
              setGeneratedImage(images[0]);
            }

          } catch (error) {
            console.error('Generation error:', error);
            showToast('生成失败：' + error.message);
          } finally {
            setIsGenerating(false);
            setCurrentBatchIndex(0);
          }
        };

        // 从PNG图片中提取文本块数据
        const extractPngMetadata = async (imageUrl) => {
          try {
            // 获取图片数据
            const response = await fetch(imageUrl);
            const blob = await response.blob();
            const arrayBuffer = await blob.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);
            
            // PNG文件签名
            const pngSignature = [0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A];
            for (let i = 0; i < 8; i++) {
              if (uint8Array[i] !== pngSignature[i]) {
                throw new Error('不是有效的PNG文件');
              }
            }
            
            // 查找tEXt或iTXt块
            let offset = 8;
            const textChunks = {};
            
            while (offset < uint8Array.length) {
              // 读取块长度（4字节，大端序）
              const length = (uint8Array[offset] << 24) | 
                            (uint8Array[offset + 1] << 16) | 
                            (uint8Array[offset + 2] << 8) | 
                            uint8Array[offset + 3];
              
              // 读取块类型（4字节）
              const type = String.fromCharCode(
                uint8Array[offset + 4], 
                uint8Array[offset + 5], 
                uint8Array[offset + 6], 
                uint8Array[offset + 7]
              );
              
              // 检查是否是tEXt块
              if (type === 'tEXt') {
                // 读取块数据
                const dataStart = offset + 8;
                const dataEnd = dataStart + length;
                const data = uint8Array.slice(dataStart, dataEnd);
                
                // 查找null分隔符
                let nullIndex = 0;
                for (let i = 0; i < data.length; i++) {
                  if (data[i] === 0) {
                    nullIndex = i;
                    break;
                  }
                }
                
                // 提取关键字和文本
                const keyword = new TextDecoder().decode(data.slice(0, nullIndex));
                const text = new TextDecoder().decode(data.slice(nullIndex + 1));
                textChunks[keyword] = text;
              }
              
              // 检查是否是iTXt块
              if (type === 'iTXt') {
                const dataStart = offset + 8;
                const dataEnd = dataStart + length;
                const data = uint8Array.slice(dataStart, dataEnd);
                
                // 查找关键字（以null结尾）
                let nullIndex = 0;
                for (let i = 0; i < data.length; i++) {
                  if (data[i] === 0) {
                    nullIndex = i;
                    break;
                  }
                }
                
                const keyword = new TextDecoder().decode(data.slice(0, nullIndex));
                
                // iTXt格式：关键字\0压缩标志\0压缩方法\0语言\0翻译后的关键字\0文本
                // 简化处理，直接查找最后一个null后的文本
                let lastNullIndex = nullIndex;
                for (let i = data.length - 1; i >= 0; i--) {
                  if (data[i] === 0) {
                    lastNullIndex = i;
                    break;
                  }
                }
                
                const text = new TextDecoder().decode(data.slice(lastNullIndex + 1));
                textChunks[keyword] = text;
              }
              
              // 检查是否是IEND块（文件结束）
              if (type === 'IEND') {
                break;
              }
              
              // 移动到下一个块（长度+类型+数据+CRC）
              offset += 12 + length;
            }
            
            return textChunks;
          } catch (error) {
            console.error('提取PNG元数据失败:', error);
            return null;
          }
        };

        // 解析ComfyUI工作流参数
        const parseComfyUIParams = (workflowData) => {
          try {
            const params = {
              positivePrompt: '',
              negativePrompt: '',
              width: 512,
              height: 512,
              steps: 20,
              cfg: 7,
              seed: -1,
              sampler: 'euler',
              scheduler: 'normal',
              modelPath: '',
              loras: []
            };
            
            // 查找KSampler节点
            for (const nodeId in workflowData) {
              const node = workflowData[nodeId];
              if (node.class_type === 'KSampler' || node.class_type === 'KSamplerAdvanced') {
                params.steps = node.inputs.steps || params.steps;
                params.cfg = node.inputs.cfg || params.cfg;
                params.seed = node.inputs.seed || params.seed;
                params.sampler = node.inputs.sampler_name || params.sampler;
                params.scheduler = node.inputs.scheduler || params.scheduler;
                
                // 查找正向提示词
                if (node.inputs.positive && node.inputs.positive[0]) {
                  const positiveNodeId = node.inputs.positive[0];
                  const positiveNode = workflowData[positiveNodeId];
                  if (positiveNode && positiveNode.inputs && positiveNode.inputs.text) {
                    params.positivePrompt = positiveNode.inputs.text;
                  }
                }
                
                // 查找反向提示词
                if (node.inputs.negative && node.inputs.negative[0]) {
                  const negativeNodeId = node.inputs.negative[0];
                  const negativeNode = workflowData[negativeNodeId];
                  if (negativeNode && negativeNode.inputs && negativeNode.inputs.text) {
                    params.negativePrompt = negativeNode.inputs.text;
                  }
                }
              }
              
              // 查找EmptyLatentImage节点获取宽高
              if (node.class_type === 'EmptyLatentImage') {
                params.width = node.inputs.width || params.width;
                params.height = node.inputs.height || params.height;
              }
              
              // 查找CheckpointLoader节点获取模型
              if (node.class_type === 'CheckpointLoaderSimple' || node.class_type === 'CheckpointLoader') {
                params.modelPath = node.inputs.ckpt_name || params.modelPath;
              }
              
              // 查找LoraLoader节点获取LoRA
              if (node.class_type === 'LoraLoader') {
                params.loras.push({
                  id: `lora_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                  name: node.inputs.lora_name,
                  enabled: true,
                  strength: node.inputs.strength_model || 1.0,
                  strengthClip: node.inputs.strength_clip || node.inputs.strength_model || 1.0,
                  triggerWords: ''
                });
              }
            }
            
            return params;
          } catch (error) {
            console.error('解析ComfyUI参数失败:', error);
            return null;
          }
        };

        // 复刻图片 - 解析图片元数据并填入生成参数
        const handleCloneImage = async (imageUrl) => {
          try {
            console.log('开始复刻图片:', imageUrl);
            
            // 首先尝试从本地数据库查找
            const recentParams = await dbLoad('recent_generation_params');
            console.log('从数据库获取的参数:', recentParams);
            
            if (recentParams && recentParams[imageUrl]) {
              const params = recentParams[imageUrl];
              console.log('找到本地参数:', params);
              
              setLocalSettings(prev => ({
                ...prev,
                positivePrompt: params.positivePrompt || '',
                negativePrompt: params.negativePrompt || '',
                width: params.width || 512,
                height: params.height || 512,
                steps: params.steps || 20,
                cfg: params.cfg || 7,
                seed: params.seed !== undefined ? params.seed : -1,
                sampler: params.sampler || 'euler',
                scheduler: params.scheduler || 'normal',
                modelPath: params.modelPath || '',
                loras: Array.isArray(params.loras) ? params.loras : [],
              }));
              
              // 清除角色提示词，因为已经在正面提示词里面了
              setCharacterPromptText('');
              
              setError('已复刻生成参数！');
              setTimeout(() => setError(null), 3000);
              return;
            }
            
            // 尝试从PNG元数据解析
            console.log('尝试从PNG元数据解析...');
            const metadata = await extractPngMetadata(imageUrl);
            console.log('提取的元数据:', metadata);
            
            if (metadata) {
              // 查找ComfyUI工作流数据
              let workflowData = null;
              
              if (metadata['workflow']) {
                try {
                  workflowData = JSON.parse(metadata['workflow']);
                  console.log('从workflow解析的数据:', workflowData);
                } catch (e) {
                  console.error('解析workflow失败:', e);
                }
              }
              
              if (metadata['prompt']) {
                try {
                  workflowData = JSON.parse(metadata['prompt']);
                  console.log('从prompt解析的数据:', workflowData);
                } catch (e) {
                  console.error('解析prompt失败:', e);
                }
              }
              
              if (workflowData) {
                const params = parseComfyUIParams(workflowData);
                console.log('解析的参数:', params);
                
                if (params) {
                  setLocalSettings(prev => ({
                    ...prev,
                    positivePrompt: params.positivePrompt || '',
                    negativePrompt: params.negativePrompt || '',
                    width: params.width || 512,
                    height: params.height || 512,
                    steps: params.steps || 20,
                    cfg: params.cfg || 7,
                    seed: params.seed !== undefined ? params.seed : -1,
                    sampler: params.sampler || 'euler',
                    scheduler: params.scheduler || 'normal',
                    modelPath: params.modelPath || '',
                    loras: Array.isArray(params.loras) ? params.loras : [],
                  }));
                  
                  // 清除角色提示词，因为已经在正面提示词里面了
                  setCharacterPromptText('');
                  
                  setError('已从图片元数据解析并复刻生成参数！');
                  setTimeout(() => setError(null), 3000);
                  return;
                }
              }
            }
            
            // 如果都没有找到，提示用户
            setError('未找到该图片的生成参数，图片可能不包含ComfyUI元数据');
            setTimeout(() => setError(null), 5000);
            
          } catch (error) {
            console.error('Clone image error:', error);
            setError('复刻失败：' + error.message);
            setTimeout(() => setError(null), 5000);
          }
        };

        // 获取生成的图片
        const fetchGeneratedImage = async (promptId) => {
          try {
            const historyResponse = await fetch(`${localSettings.serverUrl}/history/${promptId}`);
            if (!historyResponse.ok) return null;
            
            const historyData = await historyResponse.json();
            const promptHistory = historyData[promptId];
            
            if (promptHistory && promptHistory.outputs) {
              // 优先查找SaveImage节点（节点20）的输出，这是最终保存的图像
              // 在高清修复模式下，节点20引用的是高分修复后的图像（节点51）
              const saveNodeOutput = promptHistory.outputs["20"];
              if (saveNodeOutput && saveNodeOutput.images && saveNodeOutput.images.length > 0) {
                const imageData = saveNodeOutput.images[0];
                const imageUrl = `${localSettings.serverUrl}/view?filename=${encodeURIComponent(imageData.filename)}&subfolder=${encodeURIComponent(imageData.subfolder || '')}&type=${imageData.type || 'output'}`;
                
                const imgResponse = await fetch(imageUrl);
                const blob = await imgResponse.blob();
                
                return new Promise((resolve) => {
                  const reader = new FileReader();
                  reader.onload = (e) => resolve(e.target.result);
                  reader.readAsDataURL(blob);
                });
              }
              
              // 如果没有找到SaveImage节点，再遍历其他节点
              for (const nodeId in promptHistory.outputs) {
                const nodeOutput = promptHistory.outputs[nodeId];
                if (nodeOutput.images && nodeOutput.images.length > 0) {
                  const imageData = nodeOutput.images[0];
                  const imageUrl = `${localSettings.serverUrl}/view?filename=${encodeURIComponent(imageData.filename)}&subfolder=${encodeURIComponent(imageData.subfolder || '')}&type=${imageData.type || 'output'}`;
                  
                  const imgResponse = await fetch(imageUrl);
                  const blob = await imgResponse.blob();
                  
                  return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(blob);
                  });
                }
              }
            }
            return null;
          } catch (err) {
            console.error('Fetch image error:', err);
            return null;
          }
        };

        // 构建ComfyUI工作流
        const buildWorkflow = (positivePrompt, allLoras, negativePrompt, customSeed = null) => {
          // 基础工作流 - 参考角色卡片生图实现
          const seed = customSeed !== null ? customSeed : (localSettings.seed === -1 ? Math.floor(Math.random() * 2147483647) : localSettings.seed);

          const workflow = {
            "17": {
              "inputs": {
                "text": negativePrompt || localSettings.negativePrompt,
                "clip": ["37", 0]
              },
              "class_type": "CLIPTextEncode",
              "_meta": { "title": "CLIP文本编码" }
            },
            "19": {
              "inputs": {
                "width": localSettings.width,
                "height": localSettings.height,
                "batch_size": 1
              },
              "class_type": "EmptyLatentImage",
              "_meta": { "title": "空Latent图像" }
            },
            "20": {
              "inputs": {
                "filename_prefix": "Echo_QuickGen",
                "images": ["44", 0]
              },
              "class_type": "SaveImage",
              "_meta": { "title": "保存图像" }
            },
            "24": {
              "inputs": {
                "text": positivePrompt,
                "clip": ["37", 0]
              },
              "class_type": "CLIPTextEncode",
              "_meta": { "title": "CLIP文本编码" }
            },
            "28": {
              "inputs": {
                "seed": seed,
                "steps": localSettings.steps,
                "cfg": localSettings.cfg,
                "sampler_name": localSettings.sampler,
                "scheduler": localSettings.scheduler,
                "denoise": 1,
                "model": ["31", 0],
                "positive": ["24", 0],
                "negative": ["17", 0],
                "latent_image": ["19", 0]
              },
              "class_type": "KSampler",
              "_meta": { "title": "K采样器" }
            },
            "31": {
              "inputs": {
                "ckpt_name": localSettings.modelPath
              },
              "class_type": "CheckpointLoaderSimple",
              "_meta": { "title": "Checkpoint加载器（简易）" }
            },
            "37": {
              "inputs": {
                "stop_at_clip_layer": -2,
                "clip": ["31", 1]
              },
              "class_type": "CLIPSetLastLayer",
              "_meta": { "title": "设置CLIP最后一层" }
            },
            "44": {
              "inputs": {
                "samples": ["28", 0],
                "vae": ["31", 2]
              },
              "class_type": "VAEDecode",
              "_meta": { "title": "VAE解码" }
            }
          };

          // 跟踪前一个节点的信息（用于LoRA链和高清修复）
          // 初始来源: CheckpointLoaderSimple 输出 MODEL (索引0), CLIPSetLastLayer 输出 CLIP (索引0)
          let prevModelNode = "31";
          let prevModelIndex = 0;
          let prevClipNode = "37";
          let prevClipIndex = 0;
          
          // 添加LoRA节点（链式连接）- 包含所有LoRA（包括禁用的）
          if (allLoras.length > 0) {
            allLoras.forEach((lora, index) => {
              const loraNodeId = `lora_${index}`;
              
              workflow[loraNodeId] = {
                "inputs": {
                  "lora_name": lora.name,
                  "strength_model": lora.strength || 1,
                  "strength_clip": lora.strengthClip !== undefined ? lora.strengthClip : (lora.strength || 1),
                  "model": [prevModelNode, prevModelIndex],
                  "clip": [prevClipNode, prevClipIndex]
                },
                "class_type": "LoraLoader",
                "_meta": { "title": `Load LoRA (${lora.name})` }
              };
              
              // 更新前一个节点为当前LoRA节点
              // LoraLoader 输出: 0=MODEL, 1=CLIP
              prevModelNode = loraNodeId;
              prevModelIndex = 0;  // MODEL 输出索引
              prevClipNode = loraNodeId;
              prevClipIndex = 1;   // CLIP 输出索引
            });
            
            // 最后一个LoRA节点的输出连接到KSampler和CLIPTextEncode
            workflow["28"].inputs.model = [prevModelNode, prevModelIndex];  // MODEL
            workflow["17"].inputs.clip = [prevClipNode, prevClipIndex];    // CLIP
            workflow["24"].inputs.clip = [prevClipNode, prevClipIndex];    // CLIP
          }

          // 添加高分辨率修复节点 - 参考XL标准工作流
          if (hiresSettings.enabled) {
            const hiresWidth = Math.floor(localSettings.width * hiresSettings.scale);
            const hiresHeight = Math.floor(localSettings.height * hiresSettings.scale);
            
            // 45. 预览图像（初始生成）
            workflow["45"] = {
              "inputs": {
                "images": ["44", 0]
              },
              "class_type": "PreviewImage",
              "_meta": { "title": "预览图像" }
            };
            
            // 46. 加载放大模型
            workflow["46"] = {
              "inputs": {
                "model_name": hiresSettings.upscaler
              },
              "class_type": "UpscaleModelLoader",
              "_meta": { "title": "加载放大模型" }
            };
            
            // 47. 使用模型放大图像
            workflow["47"] = {
              "inputs": {
                "upscale_model": ["46", 0],
                "image": ["44", 0]
              },
              "class_type": "ImageUpscaleWithModel",
              "_meta": { "title": "使用模型放大图像" }
            };
            
            // 48. 缩放图像到目标尺寸
            workflow["48"] = {
              "inputs": {
                "upscale_method": "nearest-exact",
                "width": hiresWidth,
                "height": hiresHeight,
                "crop": "disabled",
                "image": ["47", 0]
              },
              "class_type": "ImageScale",
              "_meta": { "title": "缩放图像" }
            };
            
            // 49. VAE编码
            workflow["49"] = {
              "inputs": {
                "pixels": ["48", 0],
                "vae": ["31", 2]
              },
              "class_type": "VAEEncode",
              "_meta": { "title": "VAE编码" }
            };
            
            // 50. 高分采样器（使用放大后的latent）
            workflow["50"] = {
              "inputs": {
                "seed": localSettings.seed === -1 ? Math.floor(Math.random() * 2147483647) : localSettings.seed + 1,
                "steps": hiresSettings.steps,
                "cfg": localSettings.cfg,
                "sampler_name": localSettings.sampler,
                "scheduler": localSettings.scheduler,
                "denoise": hiresSettings.denoise,
                "model": [prevModelNode, prevModelIndex],
                "positive": ["24", 0],
                "negative": ["17", 0],
                "latent_image": ["49", 0]
              },
              "class_type": "KSampler",
              "_meta": { "title": "K采样器（高分）" }
            };
            
            // 51. VAE解码（高分）
            workflow["51"] = {
              "inputs": {
                "samples": ["50", 0],
