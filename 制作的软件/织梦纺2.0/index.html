      };

      // ==========================================
      // 剧本编辑面板 (增强版 - 集成AI生成功能)
      // ==========================================
      
      const ScriptPanel = ({ localProject, updateProject, allCharacters, onCharactersUpdate, selectedLineIndex, setSelectedLineIndex, themes, allBackgrounds, projects }) => {
         const [aspectRatio, setAspectRatio] = useState(16 / 9);
         const [audioPreviewEnabled, setAudioPreviewEnabled] = useState(false);
         const [dragTarget, setDragTarget] = useState(null); 
         const [showAddCharMenu, setShowAddCharMenu] = useState(false);
         const [pickerState, setPickerState] = useState({ isOpen: false, type: null, context: null });
         const [expandedItemPropTab, setExpandedItemPropTab] = useState(null);
         const [dragState, setDragState] = useState({ isDragging: false, draggedIndex: null, dropIndex: null });
         const [showBatchAIGenerate, setShowBatchAIGenerate] = useState(false);
         const [batchGenerateType, setBatchGenerateType] = useState('background'); // 'background' | 'voice'
         const [selectedScriptIds, setSelectedScriptIds] = useState(new Set());
         const [isBatchGenerating, setIsBatchGenerating] = useState(false);
         const [aiGenProgress, setAiGenProgress] = useState({ current: 0, total: 0 });
         const [batchImageSource, setBatchImageSource] = useState(() => {
           const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
           return localImageConfig.autoUseBatchImage ? 'local' : 'cloud';
         });
         const [batchVoiceSource, setBatchVoiceSource] = useState('local'); // 'local' | 'cloud'
         
         // 生成背景选择菜单状态
         const [bgSourceMenuLineId, setBgSourceMenuLineId] = useState(null);
         
         // 单独语音生成模态框状态
         const [showSingleVoiceModal, setShowSingleVoiceModal] = useState(false);
         const [singleVoiceLine, setSingleVoiceLine] = useState(null);
         const [singleVoiceChar, setSingleVoiceChar] = useState(null);
         const [singleVoiceSettings, setSingleVoiceSettings] = useState(null);
         
         const dragTimer = useRef(null);
         const itemRefs = useRef({});
         const dragStartPosRef = useRef({ x: 0, y: 0 });
         
         const previewContainerRef = useRef(null);
         const scrollContainerRef = useRef(null);
         const gestureStateRef = useRef({ startX: 0, startY: 0, startXPercent: 0, startYPercent: 0, initialDist: null, initialScale: 100 });

         const bgmPreviewRef = useRef(new Audio());
         const bgsPreviewRef = useRef(new Audio());
         const sePreviewRef = useRef(new Audio());
         const voicePreviewRef = useRef(new Audio());
         const [previewAudioId, setPreviewAudioId] = useState(null);
         const previewAudioRef = useRef(null);

         const scrollInterval = useRef(null);
         const lastTouchY = useRef(0);
         const dragStateRef = useRef(dragState);

         useEffect(() => { dragStateRef.current = dragState; }, [dragState]);

         useEffect(() => {
             if (dragState.isDragging) {
                 document.body.style.overflow = 'hidden';
                 if (scrollContainerRef.current) scrollContainerRef.current.style.overflow = 'hidden';
             } else {
                 document.body.style.overflow = '';
                 if (scrollContainerRef.current) scrollContainerRef.current.style.overflow = 'auto';
             }
             return () => {
                 document.body.style.overflow = '';
                 if (scrollContainerRef.current) scrollContainerRef.current.style.overflow = 'auto';
             };
         }, [dragState.isDragging]);

         useEffect(() => {
             bgmPreviewRef.current.loop = true;
             bgsPreviewRef.current.loop = true;
             return () => {
                 bgmPreviewRef.current.pause();
                 bgsPreviewRef.current.pause();
                 sePreviewRef.current.pause();
                 voicePreviewRef.current.pause();
                 if (previewAudioRef.current) previewAudioRef.current.pause();
             }
         }, []);

         const currentLine = selectedLineIndex !== null ? localProject.scripts[selectedLineIndex] : null;
         
         const getEffectiveBackground = useCallback((idx) => {
             if (idx === null || idx < 0 || !localProject.scripts[idx]) return null;
             const line = localProject.scripts[idx];
             if (line.backgroundId) {
                 const bg = allBackgrounds.find(b => b.id === line.backgroundId);
                 if (bg) return bg;
                 if (localProject.backgrounds) {
                     const localBg = localProject.backgrounds.find(b => b.id === line.backgroundId);
                     if (localBg) return localBg;
                 }
             }
             for (let i = idx - 1; i >= 0; i--) {
                 const prevLine = localProject.scripts[i];
                 if (prevLine.backgroundId) {
                     const bg = allBackgrounds.find(b => b.id === prevLine.backgroundId);
                     if (bg) return bg;
                     if (localProject.backgrounds) {
                         const localBg = localProject.backgrounds.find(b => b.id === prevLine.backgroundId);
                         if (localBg) return localBg;
                     }
                 }
             }
             return null;
         }, [localProject.scripts, allBackgrounds, localProject.backgrounds]);

         const currentBg = getEffectiveBackground(selectedLineIndex);
         const getStageCharacters = useCallback((line) => {
             if (!line) return [];
             if (Array.isArray(line.stageCharacters)) return line.stageCharacters;
             if (line.characterId) { return [{ charId: line.characterId, x: 50, y: 0, scale: 100, isLegacy: true }]; }
             return [];
         }, []);
         
         const stageCharacters = useMemo(() => getStageCharacters(currentLine), [currentLine, getStageCharacters]);
         const stageCharsRef = useRef(stageCharacters);
         useEffect(() => { stageCharsRef.current = stageCharacters; }, [stageCharacters]);
         const updateLineRef = useRef(null);
         const updateLine = (updates) => {
            if (selectedLineIndex === null) return;
            const newScripts = [...localProject.scripts];
            newScripts[selectedLineIndex] = { ...newScripts[selectedLineIndex], ...updates };
            updateProject({ scripts: newScripts });
         };
         updateLineRef.current = updateLine;

         useEffect(() => {
             const handleMouseMove = (e) => {
                 if (dragTarget === null || dragTarget.isTouch) return;
                 const container = previewContainerRef.current;
                 if (!container) return;
                 const rect = container.getBoundingClientRect();
                 const deltaX = e.clientX - dragTarget.startX;
                 const deltaY = dragTarget.startY - e.clientY; 
                 const deltaPercentX = (deltaX / rect.width) * 100;
                 const deltaPercentY = (deltaY / rect.height) * 100;
                 let newX = dragTarget.startXPercent + deltaPercentX;
                 newX = Math.max(-200, Math.min(300, newX)); 
                 let newY = dragTarget.startYPercent + deltaPercentY;
                 newY = Math.max(-200, Math.min(200, newY)); 
                 const currentChars = stageCharsRef.current;
                 const newStageChars = [...currentChars];
                 if (newStageChars[dragTarget.index]) {
                     newStageChars[dragTarget.index] = { ...newStageChars[dragTarget.index], x: Math.round(newX), y: Math.round(newY) };
                     if (updateLineRef.current) updateLineRef.current({ stageCharacters: newStageChars });
                 }
             };
             const handleMouseUp = () => { if(dragTarget && !dragTarget.isTouch) setDragTarget(null); };

             const handleTouchMove = (e) => {
                if (dragTarget === null || !dragTarget.isTouch) return;
                e.preventDefault(); 
                const container = previewContainerRef.current;
                if (!container) return;

                if (e.touches.length === 2) {
                     const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                     if (!gestureStateRef.current.initialDist) {
                         gestureStateRef.current.initialDist = dist;
                         const currentChars = stageCharsRef.current;
                         gestureStateRef.current.initialScale = currentChars[dragTarget.index]?.scale || 100;
                     }
                     const scaleFactor = dist / gestureStateRef.current.initialDist;
                     let newScale = gestureStateRef.current.initialScale * scaleFactor;
                     newScale = Math.max(10, Math.min(300, newScale));
                     const currentChars = stageCharsRef.current;
                     const newStageChars = [...currentChars];
                     if (newStageChars[dragTarget.index]) {
                         newStageChars[dragTarget.index] = { ...newStageChars[dragTarget.index], scale: Math.round(newScale) };
                         if (updateLineRef.current) updateLineRef.current({ stageCharacters: newStageChars });
                     }
                } 
                else if (e.touches.length === 1) {
                    if (gestureStateRef.current.initialDist) {
                        gestureStateRef.current.initialDist = null;
                        gestureStateRef.current.startX = e.touches[0].clientX;
                        gestureStateRef.current.startY = e.touches[0].clientY;
                        const currentChars = stageCharsRef.current;
                        gestureStateRef.current.startXPercent = currentChars[dragTarget.index]?.x || 50;
                        gestureStateRef.current.startYPercent = currentChars[dragTarget.index]?.y || 0;
                    }
                    const touch = e.touches[0];
                    const rect = container.getBoundingClientRect();
                    const deltaX = touch.clientX - gestureStateRef.current.startX;
                    const deltaY = gestureStateRef.current.startY - touch.clientY;
                    const deltaPercentX = (deltaX / rect.width) * 100;
                    const deltaPercentY = (deltaY / rect.height) * 100;
                    let newX = gestureStateRef.current.startXPercent + deltaPercentX;
                    newX = Math.max(-200, Math.min(300, newX));
                    let newY = gestureStateRef.current.startYPercent + deltaPercentY;
                    newY = Math.max(-200, Math.min(200, newY));
                    const currentChars = stageCharsRef.current;
                    const newStageChars = [...currentChars];
                    if (newStageChars[dragTarget.index]) {
                         newStageChars[dragTarget.index] = { ...newStageChars[dragTarget.index], x: Math.round(newX), y: Math.round(newY) };
                         if (updateLineRef.current) updateLineRef.current({ stageCharacters: newStageChars });
                    }
                }
             };

             const handleTouchEnd = (e) => { if (dragTarget && dragTarget.isTouch && e.touches.length === 0) { setDragTarget(null); } };

             if (dragTarget !== null) { 
                 window.addEventListener('mousemove', handleMouseMove); window.addEventListener('mouseup', handleMouseUp); 
                 window.addEventListener('touchmove', handleTouchMove, { passive: false }); window.addEventListener('touchend', handleTouchEnd);
             }
             return () => { 
                 window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); 
                 window.removeEventListener('touchmove', handleTouchMove); window.removeEventListener('touchend', handleTouchEnd);
             };
         }, [dragTarget]);

         const handleSpriteMouseDown = (e, index) => { e.preventDefault(); e.stopPropagation(); setDragTarget({ index, startX: e.clientX, startY: e.clientY, startXPercent: stageCharacters[index].x, startYPercent: stageCharacters[index].y || 0 }); };
         const handleSpriteTouchStart = (e, index) => {
            e.preventDefault(); e.stopPropagation();
            const touch = e.touches[0];
            const current = stageCharacters[index];
            const isPinch = e.touches.length === 2;
            gestureStateRef.current = { startX: touch.clientX, startY: touch.clientY, startXPercent: current.x, startYPercent: current.y || 0, initialDist: isPinch ? Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY) : null, initialScale: current.scale };
            setDragTarget({ index, isTouch: true });
         };
         const handleSpriteWheel = (e, index) => { e.preventDefault(); e.stopPropagation(); const current = stageCharacters[index]; const delta = e.deltaY > 0 ? -5 : 5; const newScale = Math.max(10, Math.min(300, current.scale + delta)); handleUpdateStageChar(index, { scale: newScale }); };

         const activeTheme = themes.find(t => t.id === localProject.defaultThemeId) || themes[0];
         const addLine = () => { const prevIndex = selectedLineIndex !== null ? selectedLineIndex : localProject.scripts.length - 1; const prevLine = prevIndex >= 0 ? localProject.scripts[prevIndex] : null; const newLine = { id: Date.now().toString(), characterId: null, text: "内容...", stageCharacters: [], backgroundId: prevLine?.backgroundId, bgmId: prevLine?.bgmId, bgsId: prevLine?.bgsId, choices: [] }; const newScripts = [...localProject.scripts]; if (selectedLineIndex !== null) { newScripts.splice(selectedLineIndex + 1, 0, newLine); setSelectedLineIndex(selectedLineIndex + 1); } else { newScripts.push(newLine); setSelectedLineIndex(newScripts.length - 1); } updateProject({ scripts: newScripts }); };
         const handleDuplicateLine = (index) => {
             const lineToCopy = localProject.scripts[index];
             const newLine = { ...lineToCopy, id: Date.now().toString() + Math.random().toString().slice(2, 6) };
             const newScripts = [...localProject.scripts];
             newScripts.splice(index + 1, 0, newLine);
             updateProject({ scripts: newScripts });
             setSelectedLineIndex(index + 1);
         };
         const handleMoveLine = (direction) => { if (selectedLineIndex === null) return; const newIndex = selectedLineIndex + direction; if (newIndex < 0 || newIndex >= localProject.scripts.length) return; const newScripts = [...localProject.scripts]; const [removed] = newScripts.splice(selectedLineIndex, 1); newScripts.splice(newIndex, 0, removed); updateProject({ scripts: newScripts }); setSelectedLineIndex(newIndex); };
         const handleDeleteLine = () => { if (selectedLineIndex === null) return; const newScripts = localProject.scripts.filter((_, i) => i !== selectedLineIndex); updateProject({ scripts: newScripts }); setSelectedLineIndex(null); };
         const handleAddStageChar = (charId) => { if (!currentLine) return; const currentStageChars = stageCharacters; if(currentStageChars.length >= 6) { alert("舞台最多容纳6名角色"); return; } const newChar = { charId, x: 50, y: 0, scale: 100 }; updateLine({ stageCharacters: [...currentStageChars, newChar] }); };
         const handleUpdateStageChar = (index, updates) => { const newStageChars = [...stageCharacters]; newStageChars[index] = { ...newStageChars[index], ...updates }; updateLine({ stageCharacters: newStageChars }); };
         const handleRemoveStageChar = (index) => { const newStageChars = stageCharacters.filter((_, i) => i !== index); updateLine({ stageCharacters: newStageChars }); };
         const moveLayer = (index, direction) => { const newStageChars = [...stageCharacters]; const targetIndex = index + direction; if (targetIndex < 0 || targetIndex >= newStageChars.length) return; const temp = newStageChars[index]; newStageChars[index] = newStageChars[targetIndex]; newStageChars[targetIndex] = temp; updateLine({ stageCharacters: newStageChars }); };

         const stopAutoScroll = () => {
             if (scrollInterval.current) {
                 clearInterval(scrollInterval.current);
                 scrollInterval.current = null;
             }
         };

         useEffect(() => {
             if (!dragState.isDragging) {
                 stopAutoScroll();
             }
         }, [dragState.isDragging]);

         const handleScriptItemTouchStart = (e, index) => {
             if (dragState.isDragging) return;
             if (e.touches && e.touches[0]) {
                 dragStartPosRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
             }
             if (dragTimer.current) { clearTimeout(dragTimer.current); dragTimer.current = null; }
             dragTimer.current = setTimeout(() => {
                 setDragState({ isDragging: true, draggedIndex: index, dropIndex: index });
                 if (navigator.vibrate) navigator.vibrate(50);
             }, 500);
         };

         const handleScriptItemMouseDown = (e, index) => {
             if (dragState.isDragging) return;
             if (e.button !== 0) return;
             dragStartPosRef.current = { x: e.clientX, y: e.clientY };
             if (dragTimer.current) { clearTimeout(dragTimer.current); dragTimer.current = null; }
             dragTimer.current = setTimeout(() => {
                 setDragState({ isDragging: true, draggedIndex: index, dropIndex: index });
             }, 500);
         };

         const handleScriptItemTouchMove = (e) => {
             if (dragState.isDragging) {
                 if (e.cancelable) e.preventDefault();
                 return;
             }
             if (dragTimer.current && e.touches && e.touches[0]) {
                 const touch = e.touches[0];
                 const dx = Math.abs(touch.clientX - dragStartPosRef.current.x);
                 const dy = Math.abs(touch.clientY - dragStartPosRef.current.y);
                 if (dx > 10 || dy > 10) {
                     clearTimeout(dragTimer.current);
                     dragTimer.current = null;
                 }
             }
         };

         const handleScriptItemMouseMove = (e) => {
             if (dragState.isDragging) return;
             if (dragTimer.current) {
                 const dx = Math.abs(e.clientX - dragStartPosRef.current.x);
                 const dy = Math.abs(e.clientY - dragStartPosRef.current.y);
                 if (dx > 5 || dy > 5) { 
                     clearTimeout(dragTimer.current);
                     dragTimer.current = null;
                 }
             }
         };

         const cancelDragTimer = () => {
             if (dragTimer.current) {
                 clearTimeout(dragTimer.current);
                 dragTimer.current = null;
             }
         };

         const updateDropIndexWhileScrolling = () => {
             const touchY = lastTouchY.current;
             let closestIndex = dragStateRef.current.draggedIndex;
             let minDiff = Infinity;
             Object.entries(itemRefs.current).forEach(([keyStr, el]) => {
                 if (!el) return;
                 const idx = parseInt(keyStr);
                 const rect = el.getBoundingClientRect();
                 const centerY = rect.top + rect.height / 2;
                 const diff = Math.abs(touchY - centerY);
                 if (diff < minDiff) { minDiff = diff; closestIndex = idx; }
             });
             if (closestIndex !== dragStateRef.current.dropIndex) {
                 setDragState(prev => ({ ...prev, dropIndex: closestIndex }));
                 if (navigator.vibrate) navigator.vibrate(10);
             }
         };

         const handleGlobalDragMove = (e) => {
             if (!dragState.isDragging) return;
             e.preventDefault();
             const touchY = e.touches[0].clientY;
             lastTouchY.current = touchY;
             handleGlobalMoveLogic(touchY);
         };

         const handleGlobalMouseMove = (e) => {
             if (!dragState.isDragging) return;
             e.preventDefault();
             const touchY = e.clientY;
             lastTouchY.current = touchY;
             handleGlobalMoveLogic(touchY);
         };

         const handleGlobalMoveLogic = (touchY) => {
             updateDropIndexWhileScrolling();
             const container = scrollContainerRef.current;
             if (container) {
                 const rect = container.getBoundingClientRect();
                 const threshold = 80;
                 const scrollSpeed = 10;
                 let direction = 0;
                 if (touchY < rect.top + threshold) direction = -1;
                 else if (touchY > rect.bottom - threshold) direction = 1;

                 if (direction !== 0) {
                     if (!scrollInterval.current) {
                         scrollInterval.current = setInterval(() => {
                             if (scrollContainerRef.current) {
                                 scrollContainerRef.current.scrollTop += direction * scrollSpeed;
                                 requestAnimationFrame(updateDropIndexWhileScrolling);
                             }
                         }, 20);
                     }
                 } else {
                     stopAutoScroll();
                 }
             }
         };

         const handleGlobalDragEnd = () => {
             stopAutoScroll();
             if (dragState.isDragging) {
                 const { draggedIndex, dropIndex } = dragState;
                 if (draggedIndex !== null && dropIndex !== null && draggedIndex !== dropIndex) {
                     const newScripts = [...localProject.scripts];
                     const [item] = newScripts.splice(draggedIndex, 1);
                     newScripts.splice(dropIndex, 0, item);
                     updateProject({ scripts: newScripts });
                     if (selectedLineIndex === draggedIndex) setSelectedLineIndex(dropIndex);
                     else if (selectedLineIndex > draggedIndex && selectedLineIndex <= dropIndex) setSelectedLineIndex(selectedLineIndex - 1);
                     else if (selectedLineIndex < draggedIndex && selectedLineIndex >= dropIndex) setSelectedLineIndex(selectedLineIndex + 1);
                 }
                 setDragState({ isDragging: false, draggedIndex: null, dropIndex: null });
             }
         };

         const handleScriptItemClick = (idx) => {
             if (dragState.isDragging) return;
             // 当有多选时，禁止展开对话编辑界面
             if (selectedScriptIds.size > 0) return;
             if (selectedLineIndex === idx) {
                 setSelectedLineIndex(null);
             } else {
                 setSelectedLineIndex(idx);
                 setExpandedItemPropTab(null);
             }
         };

         useEffect(() => {
             if (dragState.isDragging) {
                 window.addEventListener('touchmove', handleGlobalDragMove, { passive: false });
                 window.addEventListener('touchend', handleGlobalDragEnd);
                 window.addEventListener('touchcancel', handleGlobalDragEnd);
                 window.addEventListener('mousemove', handleGlobalMouseMove);
                 window.addEventListener('mouseup', handleGlobalDragEnd);
             }
             return () => {
                 window.removeEventListener('touchmove', handleGlobalDragMove);
                 window.removeEventListener('touchend', handleGlobalDragEnd);
                 window.removeEventListener('touchcancel', handleGlobalDragEnd);
                 window.removeEventListener('mousemove', handleGlobalMouseMove);
                 window.removeEventListener('mouseup', handleGlobalDragEnd);
             };
         }, [dragState.isDragging, dragState.draggedIndex, dragState.dropIndex]);

         const projectAudios = localProject.audios || [];
         const bgms = projectAudios.filter(a => a.type === 'bgm');
         const bgss = projectAudios.filter(a => a.type === 'bgs');
         const ses = projectAudios.filter(a => a.type === 'se');
         const voices = projectAudios.filter(a => a.type === 'voice');
         
         const handleAudioUpload = async (fileBase64, type) => { 
           const newAudio = { id: Date.now().toString(), name: `Audio ${projectAudios.length + 1}`, type, data: fileBase64 }; 
           const newAudios = [...projectAudios, newAudio]; 
           updateProject({ audios: newAudios }); 
           if (currentLine) { 
             if (type === 'bgm') updateLine({ bgmId: newAudio.id }); 
             if (type === 'bgs') updateLine({ bgsId: newAudio.id }); 
             if (type === 'se') updateLine({ seId: newAudio.id }); 
             if (type === 'voice') updateLine({ voiceId: newAudio.id }); 
           } 
         };
         
         const getEffectiveAudioId = useCallback((type, currentIndex) => { 
           for (let i = currentIndex; i >= 0; i--) { 
             const line = localProject.scripts[i]; 
             if (type === 'bgm' && line.bgmId !== undefined) return line.bgmId; 
             if (type === 'bgs' && line.bgsId !== undefined) return line.bgsId; 
           } 
           return null; 
         }, [localProject.scripts]);
         
         const getAudioSrc = (id) => (localProject.audios || []).find(a => a.id === id)?.data || null;
         
         const toggleAudioPreview = (id) => { 
           if (previewAudioRef.current) { 
             previewAudioRef.current.pause(); 
             previewAudioRef.current = null; 
           } 
           if (previewAudioId === id) { 
             setPreviewAudioId(null); 
             return; 
           } 
           const src = getAudioSrc(id); 
           if (src) { 
             const audio = new Audio(src); 
             audio.onended = () => setPreviewAudioId(null); 
             audio.play().catch(e => console.error("Audio play failed", e)); 
             previewAudioRef.current = audio; 
             setPreviewAudioId(id); 
           } 
         };
         
         useEffect(() => { 
           if (!audioPreviewEnabled) { 
             bgmPreviewRef.current.pause(); 
             bgsPreviewRef.current.pause(); 
             return; 
           } 
           if (currentLine && selectedLineIndex !== null) { 
             const effBgmId = getEffectiveAudioId('bgm', selectedLineIndex); 
             if (effBgmId) { 
               const src = getAudioSrc(effBgmId); 
               if (src && (!bgmPreviewRef.current.src || bgmPreviewRef.current.src !== src || bgmPreviewRef.current.paused)) { 
                 bgmPreviewRef.current.src = src; 
                 bgmPreviewRef.current.play().catch(()=>{}); 
               } 
             } else if (effBgmId === "") { 
               bgmPreviewRef.current.pause(); 
             } 
             const effBgsId = getEffectiveAudioId('bgs', selectedLineIndex); 
             if (effBgsId) { 
               const src = getAudioSrc(effBgsId); 
               if (src && (!bgsPreviewRef.current.src || bgsPreviewRef.current.src !== src || bgsPreviewRef.current.paused)) { 
                 bgsPreviewRef.current.src = src; 
                 bgsPreviewRef.current.play().catch(()=>{}); 
               } 
             } else if (effBgsId === "") { 
               bgsPreviewRef.current.pause(); 
             } 
             if (currentLine.voiceId) { 
               const src = getAudioSrc(currentLine.voiceId); 
               if(src) { 
                 voicePreviewRef.current.src = src; 
                 voicePreviewRef.current.currentTime = 0; 
                 voicePreviewRef.current.play().catch(()=>{}); 
               } 
             } 
             if (currentLine.seId) { 
               const src = getAudioSrc(currentLine.seId); 
               if(src) { 
                 sePreviewRef.current.src = src; 
                 sePreviewRef.current.currentTime = 0; 
                 sePreviewRef.current.play().catch(()=>{}); 
               } 
             } 
           } 
         }, [selectedLineIndex, audioPreviewEnabled, getEffectiveAudioId]);

         const TabButton = ({ id, label, icon }) => ( 
           <button 
             onClick={() => setExpandedItemPropTab(expandedItemPropTab === id ? null : id)} 
             className={`flex-1 py-1.5 text-xs font-bold flex items-center justify-center gap-1 border rounded-md transition-colors ${expandedItemPropTab === id ? 'bg-mono-900 text-white border-mono-900 dark:bg-mono-100 dark:text-black dark:border-mono-100' : 'bg-transparent border-mono-300 dark:border-mono-700 text-mono-500 hover:bg-mono-100'}`}
           > 
             <Icon name={icon} size={12} /> {label} 
           </button> 
         );
         
         const handlePickerSelect = (selectedId) => { 
           if (pickerState.type === 'background') { 
             updateLine({ backgroundId: selectedId || undefined }); 
           } else if (pickerState.type === 'sprite') { 
             const { charIndex } = pickerState.context; 
             handleUpdateStageChar(charIndex, { spriteKey: selectedId }); 
           } 
         };
         
         const handlePickerItemsUpdate = (newItems) => { 
           if (pickerState.type === 'background') { 
             // 背景更新逻辑
           } else if (pickerState.type === 'sprite') { 
             const { charId } = pickerState.context; 
             const newAllCharacters = allCharacters.map(c => c.id === charId ? { ...c, sprites: newItems } : c); 
             onCharactersUpdate(newAllCharacters); 
           } 
         };
         
         const handlePickerUpload = async (file) => { 
           const b64 = await fileToBase64(file); 
           if (pickerState.type === 'background') { 
             const type = file.type.startsWith('video/') ? 'video' : 'image'; 
             const newBg = { id: Date.now().toString(), name: file.name.split('.')[0] || '新背景', data: b64, type: type }; 
             updateProject({ backgrounds: [...(localProject.backgrounds || []), newBg] }); 
           } else if (pickerState.type === 'sprite') { 
             const { charId } = pickerState.context; 
             const char = allCharacters.find(c => c.id === charId); 
             if (!char) return; 
             const existingSprites = char.sprites || {}; 
             let baseName = file.name.split('.')[0].replace(/[^a-zA-Z0-9_]/g, '') || 'sprite'; 
             let newKey = baseName; 
             let i = 1; 
             while(existingSprites[newKey]) { newKey = `${baseName}_${i}`; i++; } 
             const newSprites = { ...existingSprites, [newKey]: b64 }; 
             const newAllCharacters = allCharacters.map(c => c.id === charId ? { ...c, sprites: newSprites } : c); 
             onCharactersUpdate(newAllCharacters); 
           } 
         };
         
         const getPickerProps = () => { 
           if (!pickerState.isOpen) return null; 
           if (pickerState.type === 'background') { 
             const combinedBgs = [...allBackgrounds]; 
             if (localProject.backgrounds) { 
               localProject.backgrounds.forEach(lbg => { 
                 if (!combinedBgs.find(gb => gb.id === lbg.id)) { 
                   combinedBgs.push(lbg); 
                 } 
               }); 
             } 
             return { title: "选择背景", items: combinedBgs, onSelect: handlePickerSelect, onUpdateItems: () => {}, onUpload: handlePickerUpload, selectedId: currentLine?.backgroundId, itemType: 'background', accept: "image/*,video/*", projects: projects }; 
           } 
           if (pickerState.type === 'sprite') { 
             const { charId, charIndex } = pickerState.context; 
             const char = allCharacters.find(c => c.id === charId); 
             const stageChar = stageCharacters[charIndex]; 
             return { title: `为 ${char?.name} 选择立绘`, items: Object.entries(char?.sprites || {}), onSelect: handlePickerSelect, onUpdateItems: handlePickerItemsUpdate, onUpload: handlePickerUpload, selectedId: stageChar?.spriteKey, itemType: 'sprite', accept: "image/*", defaultPreviewUrl: char?.avatar }; 
           } 
           return null; 
         };
         
         const pickerProps = getPickerProps();

         // 批量AI生成功能
         const toggleScriptSelection = (index) => {
           const newSet = new Set(selectedScriptIds);
           if (newSet.has(index)) newSet.delete(index);
           else newSet.add(index);
           setSelectedScriptIds(newSet);
         };

         const handleBatchAIGenerate = async () => {
           if (selectedScriptIds.size === 0) return;
           
           setIsBatchGenerating(true);
           setAiGenProgress({ current: 0, total: selectedScriptIds.size });
           
           try {
             const configs = StorageService.getAPIConfigs();
             const scripts = localProject.scripts;
             const selectedIndices = Array.from(selectedScriptIds).sort((a, b) => a - b);
             
             if (batchGenerateType === 'background') {
               // 检查是否使用本地生图
               const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
               const useLocalImage = batchImageSource === 'local';
               
               if (!useLocalImage) {
                 const bgGenConfig = configs.find(c => c.type === 'bg_gen' && c.isActive) || configs.find(c => c.type === 'image' && c.isActive);
                 if (!bgGenConfig || !bgGenConfig.apiKey) {
                   alert("背景生成API未配置");
                   return;
                 }
               }
               
               // 直接使用场景描述（用户可见可编辑）
               const indexToPrompt = new Map();
               
               selectedIndices.forEach(idx => {
                 const line = scripts[idx];
                 const prompt = line.sceneDescription || `Scene ${idx + 1}`;
                 indexToPrompt.set(idx, prompt);
               });
               
               // 去重场景
               const uniquePrompts = [...new Set(indexToPrompt.values())];
               const promptToBgId = new Map();
               
               setAiGenProgress({ current: 0, total: uniquePrompts.length });
               
               for (let i = 0; i < uniquePrompts.length; i++) {
                 const prompt = uniquePrompts[i];
                 try {
                   let result;
                   
                   if (useLocalImage) {
                    // 使用本地生图
                    const tempChar = {
                      value: prompt,
                      name: `bg_${i}`
                    };
                    result = await LocalImageService.generateImage(localImageConfig, tempChar);
                  } else {
                    // 使用云端API
                    const bgGenConfig = configs.find(c => c.type === 'bg_gen' && c.isActive) || configs.find(c => c.type === 'image' && c.isActive);
                     result = await AIService.generateBackground(bgGenConfig, prompt, {
                       imageSize: '1024x576',
                       steps: 20
                     });
                   }
                   
                   const bgId = `bg_batch_${Date.now()}_${i}`;
                   promptToBgId.set(prompt, bgId);
                   
                   // 添加到项目背景库
                   const newBg = {
                     id: bgId,
                     name: `AI背景-${prompt.slice(0, 30)}`,
                     data: result,
                     type: 'image',
                     isAIGenerated: true,
                     prompt: prompt
                   };
                   
                   updateProject({
                     backgrounds: [...(localProject.backgrounds || []), newBg]
                   });
                   
                   setAiGenProgress(prev => ({ ...prev, current: i + 1 }));
                 } catch (err) {
                   console.error("背景生成失败:", err);
                 }
                 
                 // 延迟避免速率限制
                 if (i < uniquePrompts.length - 1) await new Promise(r => setTimeout(r, 1000));
               }
               
               // 更新脚本背景引用
               const newScripts = [...scripts];
               selectedIndices.forEach(idx => {
                 const line = newScripts[idx];
                 const prompt = indexToPrompt.get(idx);
                 const bgId = promptToBgId.get(prompt);
                 if (bgId) {
                   line.backgroundId = bgId;
                 }
               });
               updateProject({ scripts: newScripts });
               
               alert(`成功生成 ${promptToBgId.size} 个背景`);
               
             } else if (batchGenerateType === 'voice') {
              // 批量生成语音
              const cloudTTSConfig = configs.find(c => c.type === 'tts' && c.isActive);
              const localTTSBaseUrl = localStorage.getItem('localTTSBaseUrl') || 'http://127.0.0.1:8000';
              
              // 收集需要生成语音的台词和角色
              const voiceTasks = [];
              const charactersNeedSetup = new Set();
              
              selectedIndices.forEach(idx => {
                const line = scripts[idx];
                if (!line.characterId || !line.text || line.text.length > 200) return;
                
                const char = allCharacters.find(c => c.id === line.characterId);
                if (!char) return;
                
                // 检查角色语音设置
                const voiceSettings = char.voiceSettings;
                
                if (batchVoiceSource === 'local') {
                  // 本地生成需要检查模型和情感设置
                  if (!voiceSettings || !voiceSettings.model || !voiceSettings.emotion) {
                    charactersNeedSetup.add(char.name);
                  }
                }
                
                voiceTasks.push({
                  index: idx,
                  line: line,
                  char: char,
                  voiceSettings: voiceSettings || { type: 'cloud', voice: 'Chinese (China)-XiaoxiaoNeural', speed: 1.0 }
                });
              });
              
              // 如果有角色需要设置，提示用户
              if (charactersNeedSetup.size > 0) {
                const charList = Array.from(charactersNeedSetup).join('、');
                alert(`以下角色未配置本地语音模型或情感：\n\n${charList}\n\n请先在角色设置中配置语音模型和情感，然后再进行批量生成。`);
                setIsBatchGenerating(false);
                return;
              }
              
              if (voiceTasks.length === 0) {
                alert('没有需要生成语音的台词（请确保选中的行有角色和台词内容）');
                setIsBatchGenerating(false);
                return;
              }
              
              // 如果是云端生成，检查API配置
              if (batchVoiceSource === 'cloud' && (!cloudTTSConfig || !cloudTTSConfig.apiKey)) {
                alert('云端TTS API未配置，请在设置中配置语音合成API，或选择本地生成');
                setIsBatchGenerating(false);
                return;
              }
              
              const newAudios = [...(localProject.audios || [])];
              const newScripts = [...scripts];
              let generatedCount = 0;
              
              setAiGenProgress({ current: 0, total: voiceTasks.length });
              
              for (let i = 0; i < voiceTasks.length; i++) {
                const task = voiceTasks[i];
                
                try {
                  let result;
                  let voiceType = batchVoiceSource === 'local' ? '本地' : '云端';
                  
                  if (batchVoiceSource === 'local') {
                    // 使用本地GPT-SoVITS
                    const vs = task.voiceSettings;
                    const requestBody = {
                      version: vs.version || 'v2ProPlus',
                      model_name: vs.model,
                      emotion: vs.emotion,
                      text: task.line.text,
                      text_lang: vs.textLang || '中文',
                      prompt_text_lang: vs.promptTextLang || '中文',
                      text_split_method: vs.textSplitMethod || '按标点符号切',
                      speed_facter: vs.speed || 1.0,
                      seed: vs.seed || -1,
                      top_k: 10,
                      top_p: 0.95,
                      temperature: 0.7
                    };
                    
                    const response = await fetch(`${localTTSBaseUrl.replace(/\/+$/, '')}/infer_single`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify(requestBody)
                    });
                    
                    if (!response.ok) throw new Error('本地TTS请求失败');
                    
                    const blob = await response.blob();
                    if (blob.type === 'application/json') {
                      const text = await blob.text();
                      const jsonData = JSON.parse(text);
                      if (jsonData.audio_url) {
                        result = jsonData.audio_url.replace('http://0.0.0.0:8000', localTTSBaseUrl.replace(/\/+$/,''));
                      } else {
                        throw new Error('本地TTS返回格式错误');
                      }
                    } else {
                      result = URL.createObjectURL(blob);
                    }
                  } else {
                    // 使用云端TTS
                    result = await AIService.generateSpeech(cloudTTSConfig, task.line.text, {
                      voice: task.voiceSettings.voice || 'Chinese (China)-XiaoxiaoNeural'
                    });
                  }
                  
                  const audioId = `voice_batch_${Date.now()}_${i}`;
                  newAudios.push({
                    id: audioId,
                    name: `${voiceType}语音-${task.char.name}-${task.index}`,
                    type: 'voice',
                    data: result,
                    isAIGenerated: true,
                    characterId: task.char.id
                  });
                  
                  newScripts[task.index] = { ...newScripts[task.index], voiceId: audioId };
                  generatedCount++;
                  
                  setAiGenProgress(prev => ({ ...prev, current: i + 1 }));
                } catch (err) {
                  console.error(`语音生成失败 (${task.char.name}):`, err);
                }
                
                if (i < voiceTasks.length - 1) await new Promise(r => setTimeout(r, 300));
              }
              
              updateProject({ audios: newAudios, scripts: newScripts });
              alert(`成功生成 ${generatedCount} / ${voiceTasks.length} 条语音`);
            }
           } finally {
             setIsBatchGenerating(false);
             setShowBatchAIGenerate(false);
             setSelectedScriptIds(new Set());
           }
         };

         return (
            <div className="flex flex-col md:flex-row h-full overflow-hidden bg-mono-100 dark:bg-mono-900">
               {/* Preview Section */}
               <div className="w-full md:w-[480px] lg:w-[640px] xl:w-[45%] md:h-full shrink-0 bg-black/5 dark:bg-black/20 pb-2 md:pb-0 md:border-r border-mono-200 dark:border-mono-800 flex flex-col">
                  <div className="flex items-center justify-between px-4 py-2 shrink-0">
                      <button onClick={() => setAudioPreviewEnabled(!audioPreviewEnabled)} className={`flex items-center gap-2 text-[10px] font-bold transition-colors ${audioPreviewEnabled ? 'text-green-600 dark:text-green-400' : 'text-mono-400 hover:text-mono-600'}`}> <Icon name={audioPreviewEnabled ? "Volume" : "VolumeX"} size={14}/> {audioPreviewEnabled ? "音频预览: 开" : "音频预览: 关"} </button>
                      <div className="flex gap-2">
                        <Button size="sm" variant="secondary" className="px-2 h-7 text-xs" onClick={() => setShowBatchAIGenerate(true)}>
                          <Icon name="Wand2" size={12}/> AI生成
                        </Button>
                        <Button size="sm" className="px-3 h-7 text-xs" onClick={addLine}><Icon name="Plus" size={12}/> 添加一行</Button>
                      </div>
                  </div>
                  <div className="w-full flex-1 flex items-center justify-center overflow-hidden p-2">
                      <div ref={previewContainerRef} className="relative bg-black rounded-lg border border-mono-800 overflow-hidden shadow-lg shrink-0" style={{ aspectRatio: '16/9', width: '100%', maxHeight: '100%', maxWidth: '100%' }}>
                          {currentBg ? ( currentBg.type === 'video' ? <video src={currentBg.data || currentBg.image} className="absolute inset-0 w-full h-full object-cover pointer-events-none" autoPlay loop muted playsInline /> : <img src={currentBg.data || currentBg.image} className="absolute inset-0 w-full h-full object-cover pointer-events-none" /> ) : <div className="absolute inset-0 w-full h-full bg-black"></div>}
                          {stageCharacters.map((sc, index) => { const charData = allCharacters.find(c => c.id === sc.charId); if (!charData) return null; const spriteImg = (sc.spriteKey && charData.sprites && charData.sprites[sc.spriteKey]) ? charData.sprites[sc.spriteKey] : charData.avatar; return ( <div key={`${sc.charId}-${index}`} onMouseDown={(e) => handleSpriteMouseDown(e, index)} onTouchStart={(e) => handleSpriteTouchStart(e, index)} onWheel={(e) => handleSpriteWheel(e, index)} className={`absolute select-none origin-bottom cursor-grab`} style={{ left: `${sc.x}%`, bottom: `${sc.y || 0}%`, height: `${sc.scale}%`, width: 'auto', transform: `translateX(-50%)`, zIndex: sc.zIndex || index + 10, filter: 'brightness(1)', opacity: 1 }}> <img src={spriteImg} className="h-full w-auto max-w-none object-contain pointer-events-none" alt={charData.name} /> {dragTarget?.index === index && <div className="absolute inset-0 border-2 border-dashed border-white/50 rounded-lg pointer-events-none"></div>} </div> ); })}
                          <div className="absolute bottom-0 inset-x-0 flex flex-col justify-end pointer-events-none z-[60] transition-all duration-300" style={{ height: `${activeTheme.height}%`, background: activeTheme.type === 'gradient' ? `linear-gradient(to top, ${activeTheme.primaryColor}${Math.floor(activeTheme.opacity * 255).toString(16).padStart(2,'0')} 0%, ${activeTheme.primaryColor}00 100%)` : `${activeTheme.primaryColor}${Math.floor(activeTheme.opacity * 255).toString(16).padStart(2,'0')}` }}>
                              <div className="w-full h-full relative flex flex-col justify-end p-4">
                                  <div className="mb-1"><span className="text-xs font-bold px-1 py-0.5 rounded-sm" style={{ color: activeTheme.nameTagColor, textShadow: '1px 1px 1px rgba(0,0,0,0.5)' }}>{allCharacters.find(c => c.id === currentLine?.characterId)?.name || "旁白"}</span></div>
                                  <div className="text-[10px] leading-relaxed font-medium" style={{ color: activeTheme.textColor, textShadow: activeTheme.primaryColor === '#ffffff' ? 'none' : '1px 1px 1px rgba(0,0,0,0.8)' }}>{currentLine?.text || "..."}</div>
                              </div>
                          </div>
                      </div>
                  </div>
               </div>
               
               {/* Script List */}
               <div ref={scrollContainerRef} className="flex-1 h-full overflow-y-auto custom-scrollbar p-2 space-y-2 pb-24 touch-pan-y relative" style={{ touchAction: 'pan-y' }}>
                  {/* 批量选择工具栏 */}
                  {selectedScriptIds.size > 0 && (
                    <div className="sticky top-0 z-30 bg-white dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-lg p-2 flex items-center justify-between shadow-md animate-fade-in">
                      <span className="text-sm font-bold">已选择 {selectedScriptIds.size} 行</span>
                      <div className="flex gap-2">
                        <Button size="sm" variant="secondary" onClick={() => setSelectedScriptIds(new Set())}>取消</Button>
                        <Button size="sm" onClick={() => setShowBatchAIGenerate(true)}>
                          <Icon name="Wand2" size={12}/> AI生成
                        </Button>
                      </div>
                    </div>
                  )}
                  
                  {localProject.scripts.map((line, idx) => {
                      const isSelected = selectedLineIndex === idx;
                      const charName = allCharacters.find(c => c.id === line.characterId)?.name || "旁白";
                      const isDraggingThis = dragState.isDragging && dragState.draggedIndex === idx;
                      const isBatchSelected = selectedScriptIds.has(idx);
                      
                      return (
                        <div key={line.id} ref={el => itemRefs.current[idx] = el} className={`relative rounded-xl border transition-all duration-300 overflow-hidden ${isSelected ? 'bg-white dark:bg-mono-800 border-mono-400 dark:border-mono-600 shadow-md ring-1 ring-mono-300 dark:ring-mono-700' : 'bg-white/50 dark:bg-mono-900/50 border-transparent hover:border-mono-200 dark:hover:border-mono-800'} ${isDraggingThis ? 'opacity-30 scale-95' : ''} ${isBatchSelected ? 'ring-2 ring-blue-500 dark:ring-blue-400' : ''}`}>
                           {dragState.isDragging && dragState.dropIndex === idx && (
                               <div className="absolute top-0 left-0 right-0 h-1 bg-blue-500 z-50 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.8)] scale-x-105 transition-transform" />
                           )}
                           
                           <div className={`flex items-center justify-between p-3 select-none ${isSelected ? 'border-b border-mono-100 dark:border-mono-700 bg-mono-50 dark:bg-mono-900/50' : ''}`}
                                onTouchStart={(e) => handleScriptItemTouchStart(e, idx)}
                                onTouchMove={handleScriptItemTouchMove}
                                onTouchEnd={cancelDragTimer}
                                onTouchCancel={cancelDragTimer}
                                onMouseDown={(e) => handleScriptItemMouseDown(e, idx)}
                                onMouseMove={handleScriptItemMouseMove}
                                onMouseUp={cancelDragTimer}
                                onMouseLeave={cancelDragTimer}
                                onClick={() => handleScriptItemClick(idx)}
                           >
                               <div className="flex items-center gap-2 overflow-hidden">
                                 <input 
                                   type="checkbox" 
                                   checked={isBatchSelected}
                                   onChange={(e) => {
                                     e.stopPropagation();
                                     toggleScriptSelection(idx);
                                   }}

                              <p>系统将检测选中角色的语音模型和情感设置。如未设置，会提示您先进行配置。</p>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                   
                   {isBatchGenerating ? (

                       <div className="h-2 bg-mono-200 dark:bg-mono-800 rounded-full overflow-hidden">
                         <div 
                           className="h-full bg-blue-500 transition-all duration-500 rounded-full"
                           style={{ width: `${aiGenProgress.total > 0 ? (aiGenProgress.current / aiGenProgress.total) * 100 : 0}%` }}
                         />
                       </div>
                       <p className="text-center text-sm text-mono-600 dark:text-mono-300">
                         正在生成 {aiGenProgress.current} / {aiGenProgress.total}...
                       </p>
                     </div>
                   ) : (
                     <div className="flex justify-end gap-3 pt-4 border-t border-mono-200 dark:border-mono-800">
                       <Button variant="ghost" onClick={() => setShowBatchAIGenerate(false)}>取消</Button>
                       <Button 
                         onClick={handleBatchAIGenerate}
                         disabled={selectedScriptIds.size === 0}
                       >
                         <Icon name="Wand2"/> 开始批量生成
                       </Button>
                     </div>
                   )}
                 </div>
               </Modal>
               
               {/* 单独语音生成模态框 */}
               <SingleVoiceGenerateModal
                 isOpen={showSingleVoiceModal}
                 onClose={() => setShowSingleVoiceModal(false)}
                 line={singleVoiceLine}
                 character={singleVoiceChar}
                 initialSettings={singleVoiceSettings}
                 onComplete={(audioData, audioName) => {
                   // 生成完成后添加到项目
                   const audioId = `voice_single_${Date.now()}`;
                   const newAudio = {
                     id: audioId,
                     name: audioName || `AI语音-${singleVoiceChar?.name || '未知'}`,
                     type: 'voice',
                     data: audioData,
                     isAIGenerated: true,
                     characterId: singleVoiceChar?.id
                   };
                   updateProject({
                     audios: [...(localProject.audios || []), newAudio]
                   });
                   // 更新当前行的voiceId
                   if (singleVoiceLine) {
                     const lineIndex = localProject.scripts.findIndex(s => s.id === singleVoiceLine.id);
                     if (lineIndex !== -1) {
                       const newScripts = [...localProject.scripts];
                       newScripts[lineIndex] = { ...newScripts[lineIndex], voiceId: audioId };
                       updateProject({ scripts: newScripts });
                     }
                   }
                   setShowSingleVoiceModal(false);
                 }}
               />
            </div>
         );
      };

      // ==========================================
      // 单独语音生成模态框组件
      // ==========================================
      
      const SingleVoiceGenerateModal = ({ isOpen, onClose, line, character, initialSettings, onComplete }) => {
        if (!isOpen || !line || !character) return null;
        
        // 语音源选择：本地或云端
        const [voiceSource, setVoiceSource] = useState('local'); // 'local' | 'cloud'
        
        // 本地语音设置
        const [localSettings, setLocalSettings] = useState({
          version: initialSettings?.version || 'v2ProPlus',
          model: initialSettings?.model || '',
          emotion: initialSettings?.emotion || '中立',
          textLang: initialSettings?.textLang || '中文',
          promptTextLang: initialSettings?.promptTextLang || '中文',
          textSplitMethod: initialSettings?.textSplitMethod || '按标点符号切',
          speed: initialSettings?.speed || 1.0,
          seed: initialSettings?.seed || -1
        });
        
        // 云端语音设置
        const [cloudSettings, setCloudSettings] = useState({
          voice: 'Chinese (China)-XiaoxiaoNeural',
          speed: 1.0
        });
        
        const [isGenerating, setIsGenerating] = useState(false);
        const [generatedAudioUrl, setGeneratedAudioUrl] = useState(null);
        const [audioName, setAudioName] = useState(`语音-${character.name}-${Date.now().toString().slice(-4)}`);
        const baseUrl = localStorage.getItem('localTTSBaseUrl') || 'http://127.0.0.1:8000';
        
        // 本地TTS连接状态
        const [connectionStatus, setConnectionStatus] = useState('unknown');
        const [versions, setVersions] = useState([]);
        const [models, setModels] = useState([]);
        const [emotions, setEmotions] = useState([]);
        
        const TEXT_LANGS = ['中文', '英语', '日语', '粤语', '韩语', '中英混合', '日英混合', '粤英混合', '韩英混合', '多语种混合'];
        const SPLIT_METHODS = ['按标点符号切', '凑四句一切', '凑50字一切', '按中文句号。切', '按英文句号.切', '按换行切', '不切'];
        
        // 云端TTS音色选项
        const CLOUD_VOICES = [
          { value: 'Chinese (China)-XiaoxiaoNeural', label: '晓晓 (女声)' },
          { value: 'Chinese (China)-YunxiNeural', label: '云希 (男声)' },
          { value: 'Chinese (China)-YunjianNeural', label: '云健 (男声)' },
          { value: 'Chinese (China)-XiaoyiNeural', label: '晓伊 (女声)' }
        ];
        
        useEffect(() => {
          if (voiceSource === 'local') {
            checkConnection();
          }
        }, [voiceSource]);
        
        useEffect(() => {
          if (localSettings.version && connectionStatus === 'connected') {
            loadModelsForVersion(localSettings.version);
          }
        }, [localSettings.version, connectionStatus]);
        
        useEffect(() => {
          if (localSettings.model && window._modelsData) {
            const modelInfo = window._modelsData[localSettings.model];
            if (modelInfo && typeof modelInfo === 'object') {
              let emotionList = [];
              if (Array.isArray(modelInfo)) {
                emotionList = modelInfo;
              } else {
                Object.values(modelInfo).forEach(langEmotions => {
                  if (Array.isArray(langEmotions)) {
                    emotionList = [...emotionList, ...langEmotions];
                  }
                });
              }
              emotionList = [...new Set(emotionList)];
              setEmotions(emotionList);
            }
          }
        }, [localSettings.model]);
        
        const checkConnection = async () => {
          setConnectionStatus('checking');
          try {
            const response = await fetch(`${baseUrl.replace(/\/+$/, '')}/api`);
            if (response.ok) {
              setConnectionStatus('connected');
              loadVersions();
            } else {
              setConnectionStatus('disconnected');
            }
          } catch (err) {
            setConnectionStatus('disconnected');
          }
        };
        
        const loadVersions = async () => {
          try {
            const response = await fetch(`${baseUrl.replace(/\/+$/, '')}/version`);
            if (response.ok) {
              const data = await response.json();
              const versionList = data.support_versions || data.versions || [];
              setVersions(versionList);
            }
          } catch (err) {
            console.error('加载版本失败:', err);
          }
        };
        
        const loadModelsForVersion = async (version) => {
          if (!version) return;
          try {
            const response = await fetch(`${baseUrl.replace(/\/+$/, '')}/models/${version}`);
            if (response.ok) {
              const data = await response.json();
              let modelList = [];
              let modelsData = {};
              
              if (Array.isArray(data)) {
                modelList = data;
              } else if (data.models && typeof data.models === 'object') {
                modelList = Object.keys(data.models);
                modelsData = data.models;
              }
              
              window._modelsData = modelsData;
              setModels(modelList);
              
              // 如果已有模型，加载对应的情感
              if (localSettings.model && modelsData[localSettings.model]) {
                const modelInfo = modelsData[localSettings.model];
                if (modelInfo && typeof modelInfo === 'object') {
                  let emotionList = [];
                  if (Array.isArray(modelInfo)) {
                    emotionList = modelInfo;
                  } else {
                    Object.values(modelInfo).forEach(langEmotions => {
                      if (Array.isArray(langEmotions)) {
                        emotionList = [...emotionList, ...langEmotions];
                      }
                    });
                  }
                  emotionList = [...new Set(emotionList)];
                  setEmotions(emotionList);
                }
              }
            }
          } catch (err) {
            console.error('加载模型失败:', err);
          }
        };
        
        const updateLocalSetting = (key, val) => {
          setLocalSettings(prev => ({ ...prev, [key]: val }));
        };
        
        const updateCloudSetting = (key, val) => {
          setCloudSettings(prev => ({ ...prev, [key]: val }));
        };
        
        const refreshSeed = () => {
          updateLocalSetting('seed', Math.floor(Math.random() * 1000000));
        };
        
        const handleGenerate = async () => {
          setIsGenerating(true);
          setGeneratedAudioUrl(null);
          
          try {
            if (voiceSource === 'local') {
              // 本地生成
              if (!localSettings.model || !localSettings.emotion) {
                alert('请先选择模型和情感');
                setIsGenerating(false);
                return;
              }
              
              const requestBody = {
                version: localSettings.version || 'v2ProPlus',
                model_name: localSettings.model,
                emotion: localSettings.emotion,
                text: line.text,
                text_lang: localSettings.textLang,
                prompt_text_lang: localSettings.promptTextLang,
                text_split_method: localSettings.textSplitMethod,
                speed_facter: localSettings.speed,
                seed: localSettings.seed,
                top_k: 10,
                top_p: 0.95,
                temperature: 0.7
              };
              
              const response = await fetch(`${baseUrl.replace(/\/+$/, '')}/infer_single`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
              });
              
              if (!response.ok) throw new Error('生成失败');
              
              const blob = await response.blob();
              if (blob.type === 'application/json') {
                const text = await blob.text();
                const jsonData = JSON.parse(text);
                if (jsonData.audio_url) {
                  const audioUrlFixed = jsonData.audio_url.replace('http://0.0.0.0:8000', baseUrl.replace(/\/+$/,''));
                  setGeneratedAudioUrl(audioUrlFixed);
                }
              } else {
                let audioBlob = blob;
                if (!blob.type || blob.type === 'application/octet-stream') {
                  audioBlob = new Blob([blob], { type: 'audio/wav' });
                }
                setGeneratedAudioUrl(URL.createObjectURL(audioBlob));
              }
            } else {
              // 云端生成
              const configs = StorageService.getAPIConfigs();
              const ttsConfig = configs.find(c => c.type === 'tts' && c.isActive);
              
              if (!ttsConfig || !ttsConfig.apiKey) {
                alert('云端TTS API未配置，请在设置中配置语音合成API');
                setIsGenerating(false);
                return;
              }
              
              const result = await AIService.generateSpeech(ttsConfig, line.text, {
                voice: cloudSettings.voice
              });
              setGeneratedAudioUrl(result);
            }
          } catch (err) {
            alert('生成失败: ' + err.message);
          } finally {
            setIsGenerating(false);
          }
        };
        
        const handleComplete = () => {
          if (generatedAudioUrl) {
            onComplete(generatedAudioUrl, audioName);
          }
        };
        
        return (
          <Modal isOpen={isOpen} onClose={onClose} title={`生成语音 - ${character.name}`} size="2xl">
            <div className="space-y-4">
              {/* 台词预览 */}
              <div className="bg-mono-50 dark:bg-mono-800 p-3 rounded-lg">
                <label className="text-xs font-bold text-mono-500 dark:text-mono-400 mb-1 block">台词内容</label>
                <p className="text-sm text-mono-900 dark:text-mono-100">{line.text}</p>
              </div>
              
              {/* 语音源选择 */}
              <div className="space-y-2">
                <label className="text-xs font-bold text-mono-500 dark:text-mono-400 uppercase">语音合成源</label>
                <div className="flex gap-2">
                  <button
                    onClick={() => setVoiceSource('cloud')}
                    className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium transition-all ${voiceSource === 'cloud' ? 'bg-green-500 text-white' : 'bg-mono-200 dark:bg-mono-800 text-mono-600 dark:text-mono-400'}`}
                  >
                    <Icon name="Cloud" size={14} className="inline mr-1"/> 云端TTS
                  </button>
                  <button
                    onClick={() => setVoiceSource('local')}
                    className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium transition-all ${voiceSource === 'local' ? 'bg-green-500 text-white' : 'bg-mono-200 dark:bg-mono-800 text-mono-600 dark:text-mono-400'}`}
                  >
                    <Icon name="Server" size={14} className="inline mr-1"/> 本地GPT-SoVITS
                  </button>
                </div>
              </div>
              
              {voiceSource === 'local' ? (
                <>
                  {/* 本地语音设置 */}
                  <div className={`p-3 rounded-lg ${connectionStatus === 'connected' ? 'bg-blue-50 dark:bg-blue-900/20' : connectionStatus === 'disconnected' ? 'bg-red-50 dark:bg-red-900/20' : 'bg-mono-50 dark:bg-mono-800'}`}>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <div className={`w-2 h-2 rounded-full ${connectionStatus === 'connected' ? 'bg-blue-500 animate-pulse' : connectionStatus === 'disconnected' ? 'bg-red-500' : 'bg-mono-400'}`} />
                        <span className={`text-xs font-bold ${connectionStatus === 'connected' ? 'text-blue-700 dark:text-blue-300' : connectionStatus === 'disconnected' ? 'text-red-700 dark:text-red-300' : 'text-mono-700 dark:text-mono-300'}`}>
                          {connectionStatus === 'connected' ? '已连接到本地TTS服务' : connectionStatus === 'disconnected' ? '未连接到本地TTS服务' : '检查连接中...'}
                        </span>
                      </div>
                      <Button size="sm" variant="secondary" onClick={checkConnection} className="!h-7 !px-2">
                        <Icon name="RotateCcw" size={12}/>
                      </Button>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">版本</label>
                      <Select value={localSettings.version} onChange={e => updateLocalSetting('version', e.target.value)} disabled={connectionStatus !== 'connected'} className="!text-xs">
                        <option value="">请选择版本</option>
                        {versions.map(v => <option key={v} value={v}>{v}</option>)}
                      </Select>
                    </div>
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">模型</label>
                      <Select value={localSettings.model} onChange={e => updateLocalSetting('model', e.target.value)} disabled={!localSettings.version || connectionStatus !== 'connected'} className="!text-xs">
                        <option value="">请选择模型</option>
                        {models.map((m, idx) => <option key={idx} value={m}>{m}</option>)}
                      </Select>
                    </div>
                  </div>
                  
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">情感</label>
                    <Select value={localSettings.emotion} onChange={e => updateLocalSetting('emotion', e.target.value)} disabled={!localSettings.model || connectionStatus !== 'connected'} className="!text-xs">
                      <option value="">请选择情感</option>
                      {emotions.map((e, idx) => <option key={idx} value={e}>{e}</option>)}
                    </Select>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">文本语言</label>
                      <Select value={localSettings.textLang} onChange={e => updateLocalSetting('textLang', e.target.value)} className="!text-xs">
                        {TEXT_LANGS.map(lang => <option key={lang} value={lang}>{lang}</option>)}
                      </Select>
                    </div>
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">切分方法</label>
                      <Select value={localSettings.textSplitMethod} onChange={e => updateLocalSetting('textSplitMethod', e.target.value)} className="!text-xs">
                        {SPLIT_METHODS.map(method => <option key={method} value={method}>{method}</option>)}
                      </Select>
                    </div>
                  </div>
                  
                  <div className="space-y-1">
                    <div className="flex justify-between">
                      <label className="text-xs font-bold text-mono-500 dark:text-mono-400">语速</label>
                      <span className="text-xs text-mono-400">{localSettings.speed.toFixed(1)}</span>
                    </div>
                    <input type="range" min="0.5" max="2.0" step="0.1" value={localSettings.speed} onChange={e => updateLocalSetting('speed', parseFloat(e.target.value))} className="w-full accent-mono-900 dark:accent-mono-100" />
                  </div>
                  
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">随机种子</label>
                    <div className="flex gap-2">
                      <Input type="number" value={localSettings.seed} onChange={e => updateLocalSetting('seed', parseInt(e.target.value) || -1)} className="flex-1 !text-xs" />
                      <Button variant="secondary" onClick={refreshSeed} className="!px-2"><Icon name="RefreshCw" size={12}/></Button>
                    </div>
                  </div>
                </>
              ) : (
                <>
                  {/* 云端语音设置 */}
                  <div className="space-y-3">
                    <div className="space-y-1">
                      <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">音色</label>
                      <Select value={cloudSettings.voice} onChange={e => updateCloudSetting('voice', e.target.value)} className="!text-xs">
                        {CLOUD_VOICES.map(v => <option key={v.value} value={v.value}>{v.label}</option>)}
                      </Select>
                    </div>
                    <div className="space-y-1">
                      <div className="flex justify-between">
                        <label className="text-xs font-bold text-mono-500 dark:text-mono-400">语速</label>
                        <span className="text-xs text-mono-400">{cloudSettings.speed.toFixed(1)}</span>
                      </div>
                      <input type="range" min="0.5" max="2.0" step="0.1" value={cloudSettings.speed} onChange={e => updateCloudSetting('speed', parseFloat(e.target.value))} className="w-full accent-mono-900 dark:accent-mono-100" />
                    </div>
                  </div>
                </>
              )}
              
              {/* 生成按钮 */}
              <Button 
                onClick={handleGenerate} 
                disabled={
                  (voiceSource === 'local' && (!localSettings.model || !localSettings.emotion || connectionStatus !== 'connected')) ||
                  isGenerating
                }
                className="w-full"
              >
                {isGenerating ? <><Icon name="Sparkles" className="animate-spin"/> 生成中...</> : <><Icon name="Mic"/> 开始合成</>}
              </Button>
              
              {/* 预览和完成 */}
              {generatedAudioUrl && (
                <div className="space-y-3 pt-3 border-t border-mono-200 dark:border-mono-700">
                  <div className="space-y-1">
                    <label className="text-xs font-bold text-mono-500 dark:text-mono-400 block">语音名称</label>
                    <Input value={audioName} onChange={e => setAudioName(e.target.value)} className="!text-xs" />
                  </div>
                  <audio src={generatedAudioUrl} controls className="w-full" />
                  <div className="flex gap-2">
                    <Button variant="secondary" onClick={handleGenerate} className="flex-1">
                      <Icon name="RefreshCw" size={14}/> 重新合成
                    </Button>
                    <Button onClick={handleComplete} className="flex-1">
                      <Icon name="Check" size={14}/> 完成并添加
                    </Button>
                  </div>
                </div>
              )}
            </div>
          </Modal>
        );
      };

      // ==========================================
      // 背景面板 (增强版)
      // ==========================================
      
      const BackgroundsPanel = ({ allBackgrounds, onUpdateBackgrounds, projects }) => {
        const [searchTerm, setSearchTerm] = useState('');
        const [filterType, setFilterType] = useState('ALL');
        const [activeProjectFilter, setActiveProjectFilter] = useState('');
        const [showAIGenerate, setShowAIGenerate] = useState(false);
        const [aiPrompt, setAiPrompt] = useState('');
        const [isGenerating, setIsGenerating] = useState(false);
        const [bgImageSource, setBgImageSource] = useState(() => {
          const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
          return localImageConfig.autoUseSingleImage ? 'local' : 'cloud';
        });

        const projectBgMap = useMemo(() => {
            if (!projects) return {};
            const map = {};
            projects.forEach(p => {
                const s = new Set();
                p.scripts.forEach(l => { if(l.backgroundId) s.add(l.backgroundId); });
                if(p.backgrounds) p.backgrounds.forEach(b => s.add(b.id));
                map[p.id] = s;
            });
            return map;
        }, [projects]);

        const filteredBackgrounds = useMemo(() => {
            let bgs = allBackgrounds;
            if (searchTerm) {
                const lower = searchTerm.toLowerCase();
                bgs = bgs.filter(b => (b.name || '').toLowerCase().includes(lower));
            }
            if (filterType === 'PROJECT' && activeProjectFilter) {
                const allowedIds = projectBgMap[activeProjectFilter] || new Set();
                bgs = bgs.filter(b => allowedIds.has(b.id));
            }
            return bgs;
        }, [allBackgrounds, searchTerm, filterType, activeProjectFilter, projectBgMap]);

        const handleBackgroundUpload = async (file) => { const b64 = await fileToBase64(file); const type = file.type.startsWith('video/') ? 'video' : 'image'; const newBg = { id: Date.now().toString(), name: file.name.split('.')[0] || '新背景', data: b64, type: type }; onUpdateBackgrounds([...allBackgrounds, newBg]); };
        const deleteBackground = (id) => { if(confirm("确定要删除此背景吗？")) { onUpdateBackgrounds(allBackgrounds.filter(b => b.id !== id)); } };
        const renameBackground = (id, newName) => { onUpdateBackgrounds(allBackgrounds.map(b => b.id === id ? { ...b, name: newName } : b)); };
        
        // AI生成背景
        const handleAIGenerate = async () => {
          if (!aiPrompt.trim()) return;
          setIsGenerating(true);
          
          try {
            // 检查是否使用本地生图
            const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
            const useLocalImage = bgImageSource === 'local';
            
            let result;
            
            if (useLocalImage) {
              // 使用本地生图
              const tempChar = {
                value: aiPrompt,
                name: 'background'
              };
              result = await LocalImageService.generateImage(localImageConfig, tempChar);
            } else {
              // 使用云端API
              const configs = StorageService.getAPIConfigs();
              const bgConfig = configs.find(c => c.type === 'bg_gen' && c.isActive) || configs.find(c => c.type === 'image' && c.isActive);
              if (!bgConfig || !bgConfig.apiKey) {
                alert("背景生成API未配置");
                return;
              }
              
              result = await AIService.generateBackground(bgConfig, aiPrompt, {
                imageSize: '1024x576',
                steps: 20
              });
            }
            
            const newBg = {
              id: `bg_ai_${Date.now()}`,
              name: `AI背景-${aiPrompt.slice(0, 20)}`,
              data: result,
              type: 'image',
              isAIGenerated: true
            };
            
            onUpdateBackgrounds([...allBackgrounds, newBg]);
            setShowAIGenerate(false);
            setAiPrompt('');
          } catch (err) {
            alert("生成失败: " + err.message);
          } finally {
            setIsGenerating(false);
          }
        };
        
        return ( 
            <div className="h-full flex flex-col items-center">
                <div className="w-full max-w-5xl p-4 shrink-0 space-y-2 border-b border-mono-200 dark:border-mono-800">

      const Editor = ({ project, projects, onSave, onBack, activeTab, onTabChange, themes, allCharacters, onCharactersUpdate, allBackgrounds, onBackgroundsUpdate }) => {

              const success = await onSave(localProject); 
              setSaveStatus(success ? 'saved' : 'error'); 
          }, 1000);
          return () => clearTimeout(timer);
        }, [localProject, onSave]);

        return (
          <div className="fixed inset-0 bg-white dark:bg-mono-950 z-40 flex flex-col animate-fade-in text-mono-900 dark:text-mono-100">

               <div className="flex items-center gap-2">
                   <Button variant="ghost" size="sm" onClick={handleEditorBack}><Icon name="ArrowLeft" /></Button>
                   <h1 className="font-bold text-base truncate max-w-[120px]">{localProject.name}</h1>
