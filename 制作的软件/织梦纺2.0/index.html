               <div className="flex items-center gap-2"><div className={`text-[10px] font-bold ${saveStatus === 'error' ? 'text-red-500' : 'text-mono-500'}`}>{saveStatus === 'error' ? '!' : saveStatus === 'saving' ? '...' : '✓'}</div><Button onClick={async () => { await onSave(localProject); setSaveStatus('saved'); }} variant="primary" size="sm" className="px-2 h-8"><Icon name="Save" size={14}/></Button></div>
            </div>
            
            <div className="flex bg-mono-200 dark:bg-mono-800/50 p-1 overflow-x-auto shrink-0 no-scrollbar">
                {[{ id: 'SCRIPT', label: '剧本', icon: 'FileJson' }, { id: 'CHARACTERS', label: '角色', icon: 'User' }, { id: 'BACKGROUNDS', label: '背景', icon: 'Image' }, { id: 'INTERACTIONS', label: '交互', icon: 'Zap' }, { id: 'SETTINGS', label: '全局', icon: 'Settings' }].map(tab => (
                    <button key={tab.id} onClick={() => onTabChange(tab.id)} className={`flex-shrink-0 px-3 py-1.5 mx-0.5 rounded-md text-xs font-bold flex items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-white dark:bg-mono-950 shadow-sm text-black dark:text-white' : 'text-mono-500'}`}><Icon name={tab.icon} size={12} /> {tab.label}</button>
                ))}

            <div className="flex-1 overflow-hidden bg-mono-50 dark:bg-mono-950 relative">
               {activeTab === 'CHARACTERS' && <div className="h-full w-full"><CharactersPanel characters={allCharacters} onCharactersUpdate={onCharactersUpdate} projects={projects} /></div>}
               {activeTab === 'SCRIPT' && <ScriptPanel localProject={localProject} updateProject={updateProject} allCharacters={allCharacters} onCharactersUpdate={onCharactersUpdate} allBackgrounds={allBackgrounds} selectedLineIndex={selectedLineIndex} setSelectedLineIndex={setSelectedLineIndex} themes={themes} projects={projects} />}
               {activeTab === 'INTERACTIONS' && <div className="p-4 h-full overflow-y-auto"><InteractionPanel localProject={localProject} updateProject={updateProject} /></div>}
               {activeTab === 'BACKGROUNDS' && <div className="h-full overflow-hidden"><BackgroundsPanel allBackgrounds={allBackgrounds} onUpdateBackgrounds={onBackgroundsUpdate} projects={projects} /></div>}
               {activeTab === 'SETTINGS' && ( <div className="p-4 h-full overflow-y-auto animate-fade-in"><div className="max-w-2xl mx-auto space-y-6"><div className="space-y-2"><h3 className="text-lg font-bold">世界观设定</h3><TextArea value={localProject.worldSetting || ''} onChange={e => updateProject({ worldSetting: e.target.value })} className="!h-48 font-mono text-sm" placeholder="描述世界背景..." /></div><div className="space-y-2 pt-4 border-t"><h3 className="text-lg font-bold">项目信息</h3><div><label className="text-xs text-mono-500 dark:text-mono-400">名称</label><Input value={localProject.name} onChange={e => updateProject({ name: e.target.value })} /></div></div><div className="space-y-2 pt-4 border-t"><h3 className="text-lg font-bold">默认主题</h3><Select value={localProject.defaultThemeId || themes[0].id} onChange={e => updateProject({ defaultThemeId: e.target.value })}>{themes.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</Select></div></div></div> )}
            </div>

        );

      // ==========================================
      // 角色对话组件 (使用 sr-message-maker 风格界面)
      // ==========================================
      
      const CharacterChatPanel = ({ characters, onCharactersUpdate, projects, onExit, onOpenCharManager }) => {
        const [selectedCharId, setSelectedCharId] = useState(() => {
          // 尝试读取最后选中的角色
          const lastCharId = localStorage.getItem('sr_lastSelectedCharId');
          if (lastCharId && characters.find(c => c.id === lastCharId)) {
            return lastCharId;
          }
          // 首次使用，默认选中第一个角色
          return characters.length > 0 ? characters[0].id : null;
        });
        const [messages, setMessages] = useState({});
        const [inputText, setInputText] = useState('');
        const [isAiThinking, setIsAiThinking] = useState(false);
        const [userAvatar, setUserAvatar] = useState(() => localStorage.getItem('sr_userAvatar') || 'https://patchwiki.biligame.com/images/sr/8/8e/2ywvn145o3txkmqwhhtt884nb5mjfh2.jpg');
        const [userName, setUserName] = useState(() => localStorage.getItem('sr_userName') || '开拓者');
        const [selectedImages, setSelectedImages] = useState([]);
        const [showEmoticons, setShowEmoticons] = useState(false);
        const [emoticonPage, setEmoticonPage] = useState(0);
        const [bubbleIndex, setBubbleIndex] = useState(() => parseInt(localStorage.getItem('sr_bubbleIndex') || '0'));
        const [showBubbleSelector, setShowBubbleSelector] = useState(false);
        const [showActionMenu, setShowActionMenu] = useState(false);
        const [isDragging, setIsDragging] = useState(false);
        const [streamingText, setStreamingText] = useState('');
        const [quickReplyTarget, setQuickReplyTarget] = useState(null);
        const [previewImage, setPreviewImage] = useState(null);
        const [playingMsgId, setPlayingMsgId] = useState(null);
        const [voiceAudioUrl, setVoiceAudioUrl] = useState(null);
        const fileInputRef = useRef(null);
        const inputRef = useRef(null);
        const inputAreaRef = useRef(null);
        const [inputAreaHeight, setInputAreaHeight] = useState(72);
        useEffect(() => {
          if (!inputAreaRef.current) return;
          const observer = new ResizeObserver(entries => {
            for (const entry of entries) {
              setInputAreaHeight(entry.contentRect.height);
            }
          });
          observer.observe(inputAreaRef.current);
          return () => observer.disconnect();
        }, []);
        const messagesEndRef = useRef(null);
        const dragCounterRef = useRef(0);
        const isDesktop = useMediaQuery('(min-width: 768px)');
        const isLandscape = useMediaQuery('(orientation: landscape)');
        const isMobilePortrait = !isDesktop && !isLandscape;
        
        const selectedChar = characters.find(c => c.id === selectedCharId);
        
        const stopAudioPlayback = () => {
          setVoiceAudioUrl(null);
          setPlayingMsgId(null);
        };
        
        const playMessageVoice = async (text, msgId) => {
          if (!text || !text.trim()) {
            alert('文本内容为空，无法播放');
            return;
          }
          if (playingMsgId === msgId) {
            stopAudioPlayback();
            return;
          }
          stopAudioPlayback();
          
          const char = selectedChar;
          if (!char) {
            alert('未选择角色');
            return;
          }
          
          const voiceSettings = char.voiceSettings || { type: 'cloud', voice: 'Chinese (China)-XiaoxiaoNeural', speed: 1.0 };
          const cleanText = text.replace(/\(.*?\)/g, '').replace(/（.*?）/g, '').trim();
          if (!cleanText) {
            alert('清理后的文本为空，无法播放');
            return;
          }
          
          try {
            setPlayingMsgId(msgId);
            let audioUrl = null;
            
            if (voiceSettings.type === 'local') {
              if (!voiceSettings.model || !voiceSettings.emotion) {
                setPlayingMsgId(null);
                alert('角色未配置本地语音模型或情感，请在角色管理器中设置语音参数');
                return;
              }
              const localTTSBaseUrl = localStorage.getItem('localTTSBaseUrl') || 'http://127.0.0.1:8000';
              const requestBody = {
                version: voiceSettings.version || 'v2ProPlus',
                model_name: voiceSettings.model,
                emotion: voiceSettings.emotion,
                text: cleanText,
                text_lang: voiceSettings.textLang || '中文',
                prompt_text_lang: voiceSettings.promptTextLang || '中文',
                text_split_method: voiceSettings.textSplitMethod || '按标点符号切',
                speed_facter: voiceSettings.speed || 1.0,
                seed: voiceSettings.seed || -1,
                top_k: 10,
                top_p: 0.95,
                temperature: 0.7
              };
              
              const response = await fetch(`${localTTSBaseUrl.replace(/\/+$/, '')}/infer_single`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
              });
              
              if (!response.ok) {
                let errorMsg = `本地TTS请求失败 (${response.status})`;
                try {
                  const errData = await response.json();
                  errorMsg = errData.detail || errData.message || errorMsg;
                } catch(e) {}
                throw new Error(errorMsg);
              }
              
              const blob = await response.blob();
              if (blob.type === 'application/json') {
                const jsonText = await blob.text();
                const jsonData = JSON.parse(jsonText);
                if (jsonData.audio_url) {
                  audioUrl = jsonData.audio_url.replace('http://0.0.0.0:8000', localTTSBaseUrl.replace(/\/+$/, ''));
                } else {
                  throw new Error('本地TTS返回格式错误: ' + JSON.stringify(jsonData));
                }
              } else {
                audioUrl = URL.createObjectURL(blob);
              }
            } else {
              const configs = StorageService.getAPIConfigs();
              const cloudTTSConfig = configs.find(c => c.type === 'tts' && c.isActive);
              if (!cloudTTSConfig || !cloudTTSConfig.apiKey) {
                setPlayingMsgId(null);
                alert('云端TTS API未配置。\n\n请进入设置 > 本地语音合成 配置API Key，或在角色管理器中将语音类型改为"本地语音"并配置本地服务。');
                return;
              }
              audioUrl = await AIService.generateSpeech(cloudTTSConfig, cleanText, {
                voice: voiceSettings.voice || 'Chinese (China)-XiaoxiaoNeural',
                speed: voiceSettings.speed || 1.0
              });
            }
            
            if (audioUrl) {
              setVoiceAudioUrl(audioUrl);
            } else {
              throw new Error('未能生成音频URL');
            }
          } catch (error) {
            console.error('语音播放失败:', error);
            setPlayingMsgId(null);
            const excuses = [
              '抱歉，我有点事，不方便发语音',
              '我现在不太方便说话呢',
              '等我一下，现在不太方便发语音',
              '唔...现在不太方便用语音呢',
              '抱歉，嗓子不太舒服，打字吧'
            ];
            const excuse = excuses[Math.floor(Math.random() * excuses.length)];
            setMessages(prev => ({
              ...prev,
              [selectedChar.id]: [...(prev[selectedChar.id] || []), {
                id: Date.now(),
                role: 'assistant',
                content: excuse,
                timestamp: Date.now()
              }]
            }));
          }
        };
        
        const playCharLatestVoice = () => {
          if (!selectedChar) return;
          const charMessages = messages[selectedChar.id] || [];
          const lastAiMsg = [...charMessages].reverse().find(m => m.role === 'assistant' && m.content);
          if (lastAiMsg) {
            playMessageVoice(lastAiMsg.content, lastAiMsg.id);
          }
        };
        
        // 加载保存的消息
        useEffect(() => {
          const savedMessages = localStorage.getItem('sr_characterMessages');
          if (savedMessages) {
            try {
              setMessages(JSON.parse(savedMessages));
            } catch (e) {}
          }
        }, []);
        
        // 保存消息
        useEffect(() => {
          localStorage.setItem('sr_characterMessages', JSON.stringify(messages));
        }, [messages]);
        
        // 自动滚动到底部
        useEffect(() => {
          messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [messages, selectedCharId]);
        
        // 保存最后选中的角色
        useEffect(() => {
          if (selectedCharId) {
            localStorage.setItem('sr_lastSelectedCharId', selectedCharId);
          }
        }, [selectedCharId]);
        
        // 输入框文字变化时自动调整高度
        useEffect(() => {
          if (inputRef.current) {
            inputRef.current.style.height = 'auto';
            const maxH = parseInt(inputRef.current.style.maxHeight) || 160;
            inputRef.current.style.height = Math.min(inputRef.current.scrollHeight, maxH) + 'px';
          }
        }, [inputText]);
        
        const handleSendMessage = async () => {
          if ((!inputText.trim() && selectedImages.length === 0) || !selectedChar) return;
          
          const charMessages = messages[selectedChar.id] || [];
          const newMessage = {
            id: Date.now().toString(),
            role: 'user',
            content: inputText.trim(),
            images: [...selectedImages],
            timestamp: Date.now()
          };
          
          setMessages(prev => ({
            ...prev,
            [selectedChar.id]: [...charMessages, newMessage]
          }));
          setInputText('');
          setSelectedImages([]);
          setIsAiThinking(true);
          
          // 调用 AI API
          const configs = StorageService.getAPIConfigs();
          const textConfig = configs.find(c => c.type === 'text' && c.isActive);
          
          if (!textConfig || !textConfig.apiKey) {
            setMessages(prev => ({
              ...prev,
              [selectedChar.id]: [...(prev[selectedChar.id] || []), {
                id: 'err-' + Date.now(),
                role: 'system',
                content: '❌ API Key 未配置。请进入"设置"添加 API 密钥。',
                timestamp: Date.now()
              }]
            }));
            setIsAiThinking(false);
            return;
          }
          
          try {
            const context = AIService.buildContext('', selectedChar, charMessages, inputText.trim());
            
            // 创建占位消息用于流式输出
            const aiMsgId = 'ai-' + Date.now();
            const aiMsg = {
              id: aiMsgId,
              role: 'assistant',
              content: '',
              name: selectedChar.name,
              timestamp: Date.now()
            };
            
            setMessages(prev => ({
              ...prev,
              [selectedChar.id]: [...(prev[selectedChar.id] || []), aiMsg]
            }));
            
            let fullReply = '';
            await AIService.chatCompletionStream(textConfig, context, (chunk) => {
              fullReply += chunk;
              setMessages(prev => {
                const msgs = [...(prev[selectedChar.id] || [])];
                const idx = msgs.findIndex(m => m.id === aiMsgId);
                if (idx !== -1) {
                  msgs[idx] = { ...msgs[idx], content: fullReply };
                }
                return { ...prev, [selectedChar.id]: msgs };
              });
            });
            
            const currentSettings = StorageService.getSettings();
            if (currentSettings.charChatAutoPlayVoice && fullReply) {
              playMessageVoice(fullReply, aiMsgId);
            }
            
          } catch (error) {
            setMessages(prev => ({
              ...prev,
              [selectedChar.id]: [...(prev[selectedChar.id] || []), {
                id: 'err-' + Date.now(),
                role: 'system',
                content: '❌ 发生错误: ' + (error.message || '未知错误'),
                timestamp: Date.now()
              }]
            }));
          }
          
          setIsAiThinking(false);
        };
        
        const handleQuickReply = async () => {
          if (!selectedChar) return;
          setQuickReplyTarget(true);
          setStreamingText('');
          
          const configs = StorageService.getAPIConfigs();
          const textConfig = configs.find(c => c.type === 'text' && c.isActive);
          
          if (!textConfig || !textConfig.apiKey) {
            setInputText('❌ 请先配置 API Key');
            setQuickReplyTarget(null);
            return;
          }
          
          const charMessages = messages[selectedChar.id] || [];

          }];
          
          let fullReply = '';
          await AIService.chatCompletionStream(textConfig, userContext, (chunk) => {
            fullReply += chunk;
            setStreamingText(fullReply);
            setInputText(fullReply);
          });
          
          setQuickReplyTarget(null);
          // 自动聚焦到输入框
          if (inputRef.current) inputRef.current.focus();

          const fileList = files.length ? files : (files.target ? files.target.files : []);
          const imageFiles = [];
          for (const file of fileList) {
            if (file.type.startsWith('image/')) imageFiles.push(file);
          }
          if (imageFiles.length === 0) return;
          
          const newImages = [];
          let loaded = 0;
          for (let i = 0; i < imageFiles.length; i++) {
            const reader = new FileReader();
            reader.onload = (e) => {
              newImages.push(e.target.result);
              loaded++;
              if (loaded === imageFiles.length) {
                setSelectedImages(prev => [...prev, ...newImages]);
              }
            };
            reader.readAsDataURL(imageFiles[i]);
          }
          if (fileInputRef.current) fileInputRef.current.value = '';
        };
        
        const handleRemoveImage = (index) => {
          setSelectedImages(prev => prev.filter((_, i) => i !== index));

iv> <div className="p-3 border-t border-white/10 backdrop-blur-md relative bg-black/80 safe-bottom"> {showInteractionMenu && (<div className="absolute bottom-full left-4 mb-2 bg-black/90 border border-mono-700 rounded-xl p-2 shadow-2xl flex flex-col gap-1 min-w-[120px] animate-slide-up">{project.interactions.map(int => (<button key={int.id} onClick={() => handleSendMessage(int.prompt)} className="text-left px-4 py-3 hover:bg-white/10 rounded-lg text-sm text-white font-medium transition-colors">{int.name}</button>))}</div>)} <div className="flex gap-2 items-end"><Button variant="secondary" onClick={() => setShowInteractionMenu(!showInteractionMenu)} className="h-10 !px-3 shrink-0 !rounded-xl !bg-mono-700/40 !border-mono-500/30 !text-mono-200 hover:!bg-mono-600/40" disabled={isAiThinking}>动作</Button><TextArea value={userInput} onChange={e => setUserInput(e.target.value)} placeholder="输入..." className="!bg-mono-900/50 !border-mono-700 !text-white !h-10 min-h-[40px] max-h-24 py-2 text-sm" onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(userInput); } }} /><Button size="icon" disabled={isAiThinking || !userInput.trim()} onClick={() => handleSendMessage(userInput)} className="h-10 w-10 shrink-0 !rounded-xl"><Icon name="ArrowRight" /></Button></div> </div> </div> </div> )}
                {mode === 'FIXED' && showUI && ( <div className="absolute inset-0 z-50 pointer-events-none"> {currentLine?.choices?.length > 0 && ( <div className={`absolute z-[60] flex flex-col gap-3 pointer-events-auto px-6 transition-all duration-300 ${choiceStyle.layout === 'center' ? 'items-center' : 'items-end pr-[10%]'}`} style={{ bottom: `${activeTheme.height}%`, right: 0, left: 0, paddingBottom: '2rem' }}> {currentLine.choices.map((c, i) => ( <button key={i} onClick={(e) => { e.stopPropagation(); handleChoice(c.nextScriptId); }} className={`px-6 py-3 min-w-[200px] max-w-full rounded-xl text-sm font-medium transition-all duration-300 shadow-md animate-slide-up-stagger ${choiceStyle.layout === 'center' ? 'mx-auto' : 'hover:-translate-x-2'}`} style={{ backgroundColor: `${choiceStyle.backgroundColor}${Math.floor(choiceStyle.opacity * 255).toString(16).padStart(2,'0')}`, color: choiceStyle.textColor, border: '1px solid rgba(255,255,255,0.1)', backdropFilter: 'blur(4px)', textAlign: 'center', animationDelay: `${i * 100}ms` }}>{c.text}</button> ))} </div> )} <div className="absolute bottom-0 inset-x-0 pointer-events-auto flex flex-col justify-end transition-all duration-300" style={{ height: `${activeTheme.height}%`, background: activeTheme.type === 'gradient' ? `linear-gradient(to top, ${activeTheme.primaryColor}${Math.floor(activeTheme.opacity * 255).toString(16).padStart(2,'0')} 0%, ${activeTheme.primaryColor}00 100%)` : `${activeTheme.primaryColor}${Math.floor(activeTheme.opacity * 255).toString(16).padStart(2,'0')}` }} onClick={() => !currentLine?.choices?.length && handleNextLine()}> <div className="w-full h-full max-w-lg md:max-w-6xl mx-auto px-6 md:px-16 pb-12 relative flex flex-col justify-end"> <div className="mb-1"><span className="text-lg font-bold px-2 py-1" style={{ color: activeTheme.nameTagColor, textShadow: '1px 1px 2px rgba(0,0,0,0.5)' }}>{activeChar ? activeChar.name : "旁白"}</span></div> <div className="relative min-h-[60px] mb-8">{currentLine ? (<div className="text-lg leading-relaxed font-medium tracking-wide" style={{ color: activeTheme.textColor, textShadow: activeTheme.primaryColor === '#ffffff' ? 'none' : '1px 1px 2px rgba(0,0,0,0.8)' }}>{currentLine.text}{!currentLine.choices?.length && (<span className="inline-block w-2 h-2 ml-2 animate-bounce rounded-full" style={{ backgroundColor: activeTheme.nameTagColor }}></span>)}</div>) : (<div className="flex items-center justify-center h-full text-gray-400">--- END ---</div>)}</div> <div className="absolute bottom-2 right-4 left-4 flex justify-between gap-4 text-[10px] font-bold select-none z-50 opacity-50 hover:opacity-100 transition-opacity" style={{ color: activeTheme.textColor }} onClick={(e) => e.stopPropagation()}> <div className="flex gap-4"> <button className="flex items-center gap-1" onClick={() => setShowLog(true)}><Icon name="RotateCcw" size={12}/> 历史</button> <button className={`flex items-center gap-1 ${autoPlay ? 'text-mono-300' : ''}`} onClick={() => setAutoPlay(!autoPlay)}><Icon name="Play" size={12}/> 自动</button> </div> <div className="flex gap-4"> <button onClick={() => setSaveLoadMode('SAVE')}>存档</button> <button onClick={() => setSaveLoadMode('LOAD')}>读档</button> <button onClick={onExit}><Icon name="Home" size={12}/></button> </div> </div> </div> </div> </div> )}
            </div>
            <Modal isOpen={showLog} onClose={() => setShowLog(false)} title="历史记录"><div className="space-y-4 animate-fade-in">{historyLog.map((log, i) => (<div key={i} className="border-b border-mono-200 dark:border-mono-800 pb-2"><div className="font-bold mb-1" style={{ color: activeTheme.nameTagColor }}>{log.name}</div><div className="text-mono-600 dark:text-mono-300">{log.text}</div></div>))}<div ref={(el) => el?.scrollIntoView()} /></div></Modal>
            <SaveLoadModal isOpen={!!saveLoadMode} mode={saveLoadMode} onClose={() => setSaveLoadMode(null)} onSave={handleSave} onLoad={handleLoad} saves={saves} />
          </div>
        );
      };

      // ==========================================
      // 主应用组件
      // ==========================================
      
      const App = () => {
        const [projects, setProjects] = useState([]);
        const [characters, setCharacters] = useState([]);
        const [backgrounds, setBackgrounds] = useState([]);
        const [currentProject, setCurrentProject] = useState(null);
        const [mode, setMode] = useState('HOME');
        
        const [currentEditorTab, setCurrentEditorTab] = useState('SCRIPT');
        const [showSettings, setShowSettings] = useState(false);
        const [settingsTab, setSettingsTab] = useState('ROOT');
        
        const [apiConfigs, setApiConfigs] = useState([]);
        const [themes, setThemes] = useState([]);
        const [showGenerator, setShowGenerator] = useState(false);
        const [showSplash, setShowSplash] = useState(true);
        const [exportModalState, setExportModalState] = useState({ isOpen: false, data: null, filenamePrefix: 'export' });
        const [appTheme, setAppTheme] = useState('system'); 
        const [showDevConsole, setShowDevConsole] = useState(false); // 开发者控制台
        const [charManagerInitialId, setCharManagerInitialId] = useState(null); // 角色管理中心初始选中角色
        const fileInputRef = useRef(null);
        const [isDragOverImport, setIsDragOverImport] = useState(false);
        const [tappedCardId, setTappedCardId] = useState(null);
        const isDesktop = useMediaQuery('(min-width: 768px)');
        const isLandscape = useMediaQuery('(orientation: landscape)');
        const isMobilePortrait = !isDesktop && !isLandscape;

        const navigateToMode = (newMode) => {
            setShowSettings(false); 
            window.history.pushState({ mode: newMode, editorTab: 'SCRIPT' }, '');
            setMode(newMode);
            if (newMode === 'EDITOR') setCurrentEditorTab('SCRIPT');
        };

        const navigateBack = () => {
            window.history.back();
        };

        const openModal = (modalName, openFn) => {
            const newState = { mode, modal: modalName };
            window.history.pushState(newState, '');
            openFn(true);
        };

        const closeModal = (closeFn) => {
            window.history.back(); 
        };

        const changeEditorTab = (newTab) => {
            if (currentEditorTab === newTab) return;
            if (newTab === 'SCRIPT') { if (currentEditorTab !== 'SCRIPT') window.history.back(); } 
            else { if (currentEditorTab === 'SCRIPT') window.history.pushState({ mode: 'EDITOR', editorTab: newTab }, ''); else window.history.replaceState({ mode: 'EDITOR', editorTab: newTab }, ''); setCurrentEditorTab(newTab); }
        };

        const changeSettingsTab = (newTab) => {
            if (settingsTab === newTab) return;
            if (newTab === 'ROOT') {
                window.history.back();
            } else {
                if (settingsTab === 'ROOT') {
                    window.history.pushState({ mode, modal: 'SETTINGS', settingsTab: newTab }, '');
                    setSettingsTab(newTab);
                } else {
                    window.history.replaceState({ mode, modal: 'SETTINGS', settingsTab: newTab }, '');
                    setSettingsTab(newTab);
                }
            }
        };

        const handleSettingsOpen = (tab = 'ROOT') => {
            const newState = { mode, modal: 'SETTINGS' };
            if (tab !== 'ROOT') newState.settingsTab = tab;
            window.history.pushState(newState, '');
            setSettingsTab(tab);
            setShowSettings(true);
        };

        useEffect(() => {
            if (!window.history.state) window.history.replaceState({ mode: 'HOME' }, '');
            const handlePopState = (event) => {
                const state = event.state || { mode: 'HOME' };
                
                if (state.modal !== 'SETTINGS' && showSettings) setShowSettings(false);
                if (state.modal !== 'GENERATOR' && showGenerator) setShowGenerator(false);
                if (state.modal !== 'EXPORT' && exportModalState.isOpen) setExportModalState(prev => ({ ...prev, isOpen: false }));
                
                if (state.modal === 'SETTINGS') {
                    if (!showSettings) setShowSettings(true);
                    if (state.settingsTab) setSettingsTab(state.settingsTab);
                    else setSettingsTab('ROOT');
                }

                if (state.mode === 'EDITOR') { if (state.editorTab) setCurrentEditorTab(state.editorTab); else setCurrentEditorTab('SCRIPT'); }
                if (state.mode && state.mode !== mode) setMode(state.mode); else if (!state.mode && mode !== 'HOME') setMode('HOME');
            };
            window.addEventListener('popstate', handlePopState);
            return () => window.removeEventListener('popstate', handlePopState);
        }, [mode, showSettings, showGenerator, exportModalState.isOpen, currentEditorTab]);

        useEffect(() => {
            const savedSettings = StorageService.getSettings();
            if (savedSettings.appTheme) setAppTheme(savedSettings.appTheme);
            const applyTheme = (theme) => {
                const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (isDark) document.body.classList.add('dark'); else document.body.classList.remove('dark');
            };
            applyTheme(savedSettings.appTheme || 'system');
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const handleChange = () => { if (appTheme === 'system') applyTheme('system'); };
            mediaQuery.addEventListener('change', handleChange);
            const handleSettingsChange = (e) => { const newTheme = e.detail.appTheme || 'system'; setAppTheme(newTheme); applyTheme(newTheme); };
            window.addEventListener('settings-changed', handleSettingsChange);
            return () => { mediaQuery.removeEventListener('change', handleChange); window.removeEventListener('settings-changed', handleSettingsChange); };
        }, [appTheme]);

        const loadData = useCallback(async () => { 
          const projs = await StorageService.getProjects(); 
          const chars = await StorageService.getCharacters(); 
          let globalBgs = await StorageService.getBackgrounds(); 
          let bgsChanged = false; 
          const existingBgIds = new Set(globalBgs.map(b => b.id)); 
          projs.forEach(p => { 
            if (p.backgrounds && p.backgrounds.length > 0) { 
              p.backgrounds.forEach(bg => { 
                if (!existingBgIds.has(bg.id)) { 
                  globalBgs.push(bg); 
                  existingBgIds.add(bg.id); 
                  bgsChanged = true; 
                } 
              }); 
            } 
          }); 
          if (bgsChanged) { 
            await StorageService.saveAllBackgrounds(globalBgs); 
          } 
          setProjects(projs); 
          setCharacters(chars); 
          setBackgrounds(globalBgs); 
        }, []);
        
        useEffect(() => { 
          const initialize = async () => { 
            if (window.__PRELOADED_DATA__) { 
              if(confirm("检测到内嵌的完整数据包，是否加载并覆盖现有本地数据？")) { 
                const data = window.__PRELOADED_DATA__; 
                const db = await openDB(); 
                const tx = db.transaction([IDB_CONFIG.STORE_PROJECTS, IDB_CONFIG.STORE_CHARACTERS, IDB_CONFIG.STORE_BACKGROUNDS], 'readwrite'); 
                await Promise.all([ 
                  new Promise(r => tx.objectStore(IDB_CONFIG.STORE_PROJECTS).clear().onsuccess = r), 
                  new Promise(r => tx.objectStore(IDB_CONFIG.STORE_CHARACTERS).clear().onsuccess = r), 
                  new Promise(r => tx.objectStore(IDB_CONFIG.STORE_BACKGROUNDS).clear().onsuccess = r) 
                ]); 
                for(const p of data.projects) await StorageService.saveProject(p); 
                await StorageService.saveAllCharacters(data.characters); 
                await StorageService.saveAllBackgrounds(data.backgrounds || []); 
                StorageService.saveSettings(data.settings); 
                if(data.splash) StorageService.saveSplashConfig(data.splash); 
                delete window.__PRELOADED_DATA__; 
                alert("数据加载完成！"); 
              } 
            } 
            await loadData(); 
            let configs = StorageService.getAPIConfigs(); 
            if (configs.length === 0) { 
              configs = [
                DEFAULT_SILICON_FLOW_TEXT_CONFIG, 
                DEFAULT_SILICON_FLOW_IMAGE_CONFIG,
                DEFAULT_SILICON_FLOW_TTS_CONFIG,
                DEFAULT_LOCAL_TTS_CONFIG
              ]; 
              StorageService.saveAPIConfigs(configs); 
            }
            // 检查是否需要添加本地TTS配置（旧版本升级）
            if (!configs.some(c => c.type === 'local_tts')) {
              configs.push(DEFAULT_LOCAL_TTS_CONFIG);
              StorageService.saveAPIConfigs(configs);
            } 
            setApiConfigs(configs); 
            let savedThemes = StorageService.getThemes(); 
            if (!savedThemes || savedThemes.length === 0) { 
              savedThemes = DEFAULT_THEMES; 
              StorageService.saveThemes(savedThemes); 
            } 
            setThemes(savedThemes); 
          }; 
          initialize(); 
        }, [loadData]);

        const handleUpdateCharacters = async (newChars) => { setCharacters(newChars); await StorageService.saveAllCharacters(newChars); };
        const handleUpdateBackgrounds = async (newBgs) => { setBackgrounds(newBgs); await StorageService.saveAllBackgrounds(newBgs); };
        
        const handleCreateProject = async () => { 
          const newProject = { 
            id: Date.now().toString(), 
            name: "未命名美梦", 
            created: Date.now(), 
            lastModified: Date.now(), 
            worldSetting: "设定...", 
            backgrounds: [], 
            scripts: [{ id: '1', characterId: null, text: '开始...' }], 
            interactions: [{ id: '1', name: '对话', icon: '💬', prompt: '*发起对话*' }], 
            defaultThemeId: themes[0]?.id, 
            audios: [] 
          }; 
          await StorageService.saveProject(newProject); 
          setProjects(await StorageService.getProjects()); 
        };
        
        const handleDeleteProject = async (project) => { 
          if (confirm(`确定要删除美梦 "${project.name}" 吗？`)) { 
            await StorageService.deleteProject(project.id); 
            setProjects(await StorageService.getProjects()); 
          } 
        };
        
        const handleFileImport = async (file) => { 
          const res = await StorageService.importData(file); 
          if (!res.success) { 
            alert(res.message || "导入失败: 文件格式无法识别。"); 
            return; 
          } 
          let totalProjects = 0; 
          let totalChars = 0; 
          const newCharMap = new Map(characters.map(c => [c.id, c])); 
          const processChars = (charsToAdd) => { 
            if (!Array.isArray(charsToAdd)) return; 
            charsToAdd.forEach(c => { 
              if (!newCharMap.has(c.id)) { 
                newCharMap.set(c.id, c); 
                totalChars++; 
              } 
            }); 
          }; 
          if (res.type === 'BACKUP_V2') { 
            if(confirm(`发现备份文件：包含 ${res.data.projects.length} 个项目。是否覆盖当前所有数据？\n注意：这将完全替换当前的数据库。`)) { 
              const db = await openDB(); 
              const tx = db.transaction([IDB_CONFIG.STORE_PROJECTS, IDB_CONFIG.STORE_CHARACTERS, IDB_CONFIG.STORE_BACKGROUNDS], 'readwrite'); 
              await Promise.all([ 
                new Promise(r => tx.objectStore(IDB_CONFIG.STORE_PROJECTS).clear().onsuccess = r), 
                new Promise(r => tx.objectStore(IDB_CONFIG.STORE_CHARACTERS).clear().onsuccess = r), 
                new Promise(r => tx.objectStore(IDB_CONFIG.STORE_BACKGROUNDS).clear().onsuccess = r) 
              ]); 
              await Promise.all(res.data.projects.map(p => StorageService.saveProject(p))); 
              await StorageService.saveAllCharacters(res.data.characters); 
              if (res.data.backgrounds) await StorageService.saveAllBackgrounds(res.data.backgrounds); 
              if(res.data.settings) { 
                StorageService.saveSettings(res.data.settings); 
                setApiConfigs(StorageService.getSettings().apiConfigs || []); 
                setThemes(StorageService.getSettings().themes || []); 
                window.dispatchEvent(new CustomEvent('settings-changed', { detail: res.data.settings })); 
              } 
              if(res.data.splash) StorageService.saveSplashConfig(res.data.splash); 
              await loadData(); 
              alert("全量备份导入成功！所有数据已恢复。"); 
              return; 
            } 
          } else if (res.type === 'BACKUP') { 
            await Promise.all(res.data.projects.map(p => { 
              const { characters, ...proj } = p; 
              processChars(characters); 
              return StorageService.saveProject(proj); 
            })); 
            totalProjects = res.data.projects.length; 
          } else if (res.type === 'PROJECT') { 
            const { characters: projectChars, ...proj } = res.data; 
            proj.id = Date.now().toString(); 
            await StorageService.saveProject(proj); 
            processChars(projectChars); 
            totalProjects = 1; 
          } else if (res.type === 'CHARACTER') { 
            processChars([res.data]); 
          } else if (res.type === 'CHARACTERS_BATCH') { 
            processChars(res.data); 
          } 
          if (totalChars > 0 || totalProjects > 0) { 
            if (totalChars > 0) await StorageService.saveAllCharacters(Array.from(newCharMap.values())); 
            await loadData(); 
            alert(`导入完成！\n新增/更新了 ${totalProjects} 个美梦，${totalChars} 个角色。`); 
          } 
        };
        
        const handleSettingsClose = () => closeModal();
        const handleGeneratorOpen = () => openModal('GENERATOR', setShowGenerator);
        const handleGeneratorClose = () => closeModal();
        const handleExportAll = async () => { const fullData = await StorageService.getFullBackupData(projects, characters, backgrounds); setExportModalState({ isOpen: true, data: fullData, filenamePrefix: 'vn_maker_full_backup' }); openModal('EXPORT', () => {}); };
        const handleExportProject = (p) => { const data = StorageService.getProjectExportData(p, characters, backgrounds); setExportModalState({ isOpen: true, data: data, filenamePrefix: `${p.name}_export` }); openModal('EXPORT', () => {}); };
        const handleExportModalClose = () => closeModal(); 
        const openExportModalWrapper = (data, prefix) => { setExportModalState({ isOpen: true, data, filenamePrefix: prefix }); openModal('EXPORT', () => {}); };
        
        const handleStoryGenerated = async (data) => { 
          const finalCharacters = []; 
          const idMap = new Map(); 
          data.characters.forEach(generatedChar => { 
            const existingChar = characters.find(c => c.name === generatedChar.name); 
            if (existingChar) { 
              idMap.set(generatedChar.id, existingChar.id); 
            } else { 
              let newId = generatedChar.id; 
              if (characters.some(c => c.id === newId)) { 
                newId = Date.now().toString() + Math.random().toString().slice(2, 6); 
              } 
              idMap.set(generatedChar.id, newId); 
              finalCharacters.push({ 
                id: newId, 
                name: generatedChar.name, 
                description: generatedChar.description || "AI生成角色", 
                firstMessage: generatedChar.firstMessage || "你好！", 
                avatar: TRANSPARENT_CHAR_IMG, 
                sprites: {}, 
                attributes: [] 
              }); 
            } 
          }); 
          const newScripts = data.scripts.map((s, idx) => { 
            const charId = s.characterId ? (idMap.get(s.characterId) || null) : null; 
            const stageCharacters = charId ? [{ charId, x: 50, y: 0, scale: 100 }] : []; 
            return { 
              id: Date.now().toString() + idx, 
              characterId: charId, 
              text: s.text, 
              stageCharacters: stageCharacters, 
              backgroundId: s.backgroundId, // 可能包含AI生成的背景
              voiceId: s.voiceId, // 可能包含AI生成的语音
              choices: [],
              sceneDescription: s.sceneDescription
            }; 
          }); 
          const newProject = { 
            id: Date.now().toString(), 
            name: data.title || "AI 生成美梦", 
            created: Date.now(), 
            lastModified: Date.now(), 
            worldSetting: data.worldSetting || "自动生成的剧情", 
            backgrounds: data.generatedBackgrounds || [], 
            scripts: newScripts, 
            interactions: [{ id: '1', name: '对话', icon: '💬', prompt: '*发起对话*' }], 
            defaultThemeId: themes[0]?.id, 
            audios: data.generatedAudios || []
          }; 
          const mergedCharacters = [...characters, ...finalCharacters]; 
          await handleUpdateCharacters(mergedCharacters); 
          
          // 合并AI生成的背景到全局背景库
          if (data.generatedBackgrounds && data.generatedBackgrounds.length > 0) {
            const newBackgrounds = [...backgrounds, ...data.generatedBackgrounds];
            await handleUpdateBackgrounds(newBackgrounds);
          }
          
          await StorageService.saveProject(newProject); 
          await loadData(); 
          const reusedCount = data.characters.length - finalCharacters.length; 
          alert(`美梦 "${newProject.name}" 生成成功！\n共生成 ${newScripts.length} 行剧本。\n新增角色: ${finalCharacters.length} 个${reusedCount > 0 ? ` (复用了 ${reusedCount} 个现有角色)` : ''}。\n${data.generatedBackgrounds ? `生成背景: ${data.generatedBackgrounds.length} 个` : ''}\n${data.generatedAudios ? `生成语音: ${data.generatedAudios.length} 条` : ''}`); 
        };

        const handleEditorSave = async (updatedProject) => {
            await StorageService.saveProject(updatedProject);
            setProjects(prev => prev.map(p => p.id === updatedProject.id ? updatedProject : p));
            return true;
        };

        const renderMainContent = () => {
            if (mode === 'EDITOR' && currentProject) {
                return <Editor project={currentProject} themes={themes} allCharacters={characters} onCharactersUpdate={handleUpdateCharacters} projects={projects} allBackgrounds={backgrounds} onBackgroundsUpdate={handleUpdateBackgrounds} onSave={handleEditorSave} onBack={navigateBack} activeTab={currentEditorTab} onTabChange={changeEditorTab} />;
            }
            if ((mode === 'PLAY_FIXED' || mode === 'PLAY_AI') && currentProject) {
                return <Player project={currentProject} allCharacters={characters} allBackgrounds={backgrounds} mode={mode === 'PLAY_AI' ? 'AI' : 'FIXED'} onExit={navigateBack} themes={themes} onOpenSettings={() => handleSettingsOpen('theme')} />;
            }
            if (mode === 'CHAR_MANAGER') {
                return <CharactersPanel characters={characters} onCharactersUpdate={handleUpdateCharacters} projects={projects} isStandalone={true} onExit={navigateBack} onExportTrigger={openExportModalWrapper} initialCharId={charManagerInitialId} navigateToMode={navigateToMode} isMobilePortrait={isMobilePortrait} />
            }
            if (mode === 'CHAR_CHAT') {
                return <CharacterChatPanel characters={characters} onCharactersUpdate={handleUpdateCharacters} projects={projects} onExit={navigateBack} onOpenCharManager={(charId) => { setCharManagerInitialId(charId); navigateToMode('CHAR_MANAGER'); }} />
            }
            return (
              <div className="fixed inset-0 bg-mono-50 dark:bg-mono-950 text-mono-900 dark:text-mono-50 font-sans transition-colors duration-300 flex overflow-hidden">
                 {isDesktop && (
                     <aside className="w-64 border-r border-mono-200 dark:border-mono-800 flex flex-col py-6 bg-white dark:bg-mono-950 z-10 shrink-0 shadow-lg">
                        <div className="px-6 mb-8 flex flex-col justify-start select-none"><div className="flex items-center gap-3 group"><div className="w-8 h-8 bg-black dark:bg-white rounded-lg flex items-center justify-center transition-transform group-hover:rotate-12"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="dark:stroke-black"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg></div><span className="font-bold text-2xl tracking-tight">织梦纺</span></div><div className="text-[10px] font-bold text-mono-400 tracking-[0.3em] uppercase pl-11 mt-1">DreamWeave</div></div>
                        <nav className="flex-1 space-y-0 w-full">
                           <Button variant="ghost" className="w-full justify-start !justify-start gap-3 h-10 !pl-4 !pr-0 !rounded-none text-left" onClick={() => navigateToMode('HOME')}><Icon name="Home" /> 主页</Button>
                           <Button variant="ghost" className="w-full justify-start !justify-start gap-3 h-10 !pl-4 !pr-0 !rounded-none text-left" onClick={() => navigateToMode('CHAR_MANAGER')}><Icon name="User" /> 角色管理</Button>
                           <Button variant="ghost" className="w-full justify-start !justify-start gap-3 h-10 !pl-4 !pr-0 !rounded-none text-left" onClick={() => navigateToMode('CHAR_CHAT')}><Icon name="MessageCircle" /> 角色对话</Button>
                           <Button variant="ghost" className="w-full justify-start !justify-start gap-3 h-10 !pl-4 !pr-0 !rounded-none text-left" onClick={() => handleSettingsOpen('ROOT')}><Icon name="Settings" /> 设置</Button>
                        </nav>
                        <div className="px-4 py-4 space-y-2 border-t border-mono-100 dark:border-mono-800 mt-auto">
                           <div className={`relative group w-full transition-all duration-200 rounded-lg cursor-pointer flex items-center justify-center gap-2 h-10 text-sm font-medium ${isDragOverImport ? 'bg-mono-100 dark:bg-mono-800 ring-2 ring-mono-400' : 'hover:bg-mono-100 dark:hover:bg-mono-800/50 hover:text-mono-900 dark:hover:text-mono-100 hover:-translate-y-0.5 hover:shadow-lg text-mono-500 dark:text-mono-400'}`} onClick={() => fileInputRef.current?.click()} onDragOver={(e) => { e.preventDefault(); setIsDragOverImport(true); }} onDragLeave={() => setIsDragOverImport(false)} onDrop={(e) => { e.preventDefault(); setIsDragOverImport(false); if (e.dataTransfer.files?.[0]) { handleFileImport(e.dataTransfer.files[0]) } }}>
                              <Icon name="Import" size={16}/> <span>导入数据</span>
                              <input ref={fileInputRef} type="file" className="hidden" accept=".json,image/png,image/jpeg" onChange={(e) => { if(e.target.files?.[0]) { handleFileImport(e.target.files[0]); e.target.value = ''; } }} />
                           </div>
                           <Button variant="ghost" className="w-full justify-center gap-2 h-10 text-sm font-medium text-mono-500" onClick={handleExportAll}><Icon name="Save" size={14}/> 备份数据</Button>
                        </div>
                     </aside>
                 )}
                 <main className="flex-1 overflow-hidden flex flex-col relative bg-mono-50 dark:bg-mono-950">
                    <div className="w-full flex justify-between items-center px-4 py-4 bg-white dark:bg-mono-950 border-b border-mono-200 dark:border-mono-800 z-10 shrink-0 shadow-sm md:hidden">
                        <div className="flex flex-col justify-center select-none"><div className="flex items-center gap-2 group"><div className="w-6 h-6 bg-black dark:bg-white rounded-lg flex items-center justify-center transition-transform group-hover:rotate-12"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="dark:stroke-black"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg></div><span className="font-bold text-xl tracking-tight">织梦纺</span></div></div>
                        <div className="flex gap-3"><button onClick={() => handleSettingsOpen('ROOT')} className="p-2 rounded-full hover:bg-mono-100 dark:hover:bg-mono-800 transition-colors"><Icon name="Settings" size={20}/></button></div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar" onClick={() => setTappedCardId(null)}>
                        <div className="max-w-7xl mx-auto w-full animate-slide-up pb-20" onClick={(e) => e.stopPropagation()}>
                           <header className="flex justify-between items-center mb-6 shrink-0"><h1 className="text-2xl md:text-3xl font-black tracking-tight text-mono-900 dark:text-mono-100">我的美梦</h1><div className="flex gap-2"><Button onClick={handleCreateProject} size="sm" className="md:h-10 md:px-4"><Icon name="Plus" size={14}/> <span className="hidden md:inline">新建项目</span></Button><Button onClick={handleGeneratorOpen} size="sm" className="bg-mono-900 dark:bg-mono-100 text-white dark:text-black border-none md:h-10 md:px-4"><Icon name="Sparkles" size={14}/> <span className="hidden md:inline">AI 生成</span></Button></div></header>
                           {projects.length === 0 ? ( <div className="border-2 border-dashed border-mono-300 dark:border-mono-800 rounded-2xl h-64 flex flex-col items-center justify-center text-mono-400 gap-4 bg-mono-100/50 dark:bg-mono-900/20"><Icon name="Layers" size={40} className="opacity-50" /><p className="font-medium text-sm">暂无项目，开始创作吧。</p></div> ) : (
                              <div className="mobile-card-grid pb-24">{projects.map(p => { const usedCharIds = new Set(); p.scripts.forEach(line => { if(line.characterId) usedCharIds.add(line.characterId); (line.stageCharacters || []).forEach(sc => usedCharIds.add(sc.charId)); }); const firstBgId = p.scripts.find(s => s.backgroundId)?.backgroundId; const firstBg = backgrounds.find(b => b.id === firstBgId); const bgSrc = firstBg?.data || firstBg?.image; const isCardActive = tappedCardId === p.id; return ( <Card key={p.id} className="group flex flex-col relative overflow-hidden border-0 bg-white dark:bg-mono-900 ring-1 ring-inset ring-mono-200 dark:ring-mono-800 shadow-md transition-all duration-300 h-auto active:scale-[0.98] hover:shadow-xl hover:-translate-y-1" onClick={() => setTappedCardId(p.id)}> <div className="relative aspect-video w-full overflow-hidden bg-gray-100 dark:bg-mono-950 rounded-lg mb-2 shadow-inner group-hover:ring-2 ring-mono-900/10 dark:ring-mono-100/10 transition-all"> {firstBg ? ( firstBg.type === 'video' ? <video src={bgSrc} className="w-full h-full object-cover" autoPlay loop muted playsInline /> : <img src={bgSrc} className="w-full h-full object-cover" /> ) : ( <div className="w-full h-full bg-gradient-to-br from-mono-100 to-mono-200 dark:from-mono-800 dark:to-mono-900 flex items-center justify-center text-mono-400 text-xs">暂无预览</div> )} </div> <div className="flex flex-col gap-1 mb-3"><h3 className="font-bold text-sm truncate text-mono-900 dark:text-mono-100">{p.name}</h3><div className="text-[10px] text-mono-500 dark:text-mono-400">{usedCharIds.size} 角色 · {p.scripts.length} 幕</div></div> <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center gap-2 p-4 transition-all duration-300 ${isCardActive ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none md:opacity-0 md:pointer-events-none md:group-hover:opacity-100 md:group-hover:pointer-events-auto'}`}> <Button size="sm" className="text-xs h-8 w-full max-w-[200px] shadow-sm" onClick={(e) => { e.stopPropagation(); setCurrentProject(p); navigateToMode('EDITOR'); }}>编辑</Button> <Button size="sm" variant="secondary" className="text-xs h-8 w-full max-w-[200px]" onClick={(e) => { e.stopPropagation(); setCurrentProject(p); navigateToMode('PLAY_FIXED'); }}><Icon name="Play" size={12}/> 剧情</Button> <div className="flex gap-2 w-full max-w-[200px]"><Button size="sm" variant="ghost" className="flex-1 text-xs h-8 text-white hover:bg-white/20" title="导出" onClick={(e) => { e.stopPropagation(); handleExportProject(p); }}><Icon name="Download" size={14}/></Button><Button size="sm" variant="ghost" className="flex-1 text-xs h-8 text-red-400 hover:bg-white/20" title="删除" onClick={(e) => { e.stopPropagation(); handleDeleteProject(p); }}><Icon name="Trash" size={14}/></Button></div> </div> </Card> ); })}</div>
                           )}
                        </div>

                    </div>
                    <nav className="border-t border-mono-200 dark:border-mono-800 bg-white dark:bg-mono-950 pb-safe safe-bottom shadow-[0_-1px_3px_rgba(0,0,0,0.05)] md:hidden">
                        <div className="flex justify-around items-center h-16"><button onClick={() => navigateToMode('HOME')} className={`flex flex-col items-center gap-1 p-2 transition-colors ${mode === 'HOME' ? 'text-blue-600 dark:text-blue-400' : 'text-mono-400 hover:text-mono-800 dark:hover:text-mono-200'}`}><Icon name="Home" size={20}/><span className="text-[10px] font-medium">主页</span></button><button onClick={() => navigateToMode('CHAR_MANAGER')} className={`flex flex-col items-center gap-1 p-2 transition-colors ${mode === 'CHAR_MANAGER' ? 'text-blue-600 dark:text-blue-400' : 'text-mono-400 hover:text-mono-800 dark:hover:text-mono-200'}`}><Icon name="User" size={20}/><span className="text-[10px] font-medium">角色</span></button><button onClick={() => navigateToMode('CHAR_CHAT')} className={`flex flex-col items-center gap-1 p-2 transition-colors ${mode === 'CHAR_CHAT' ? 'text-blue-600 dark:text-blue-400' : 'text-mono-400 hover:text-mono-800 dark:hover:text-mono-200'}`}><Icon name="MessageCircle" size={20}/><span className="text-[10px] font-medium">对话</span></button><button onClick={() => handleSettingsOpen('data')} className={`flex flex-col items-center gap-1 p-2 transition-colors text-mono-400 hover:text-mono-800 dark:hover:text-mono-200`}><Icon name="Save" size={20}/><span className="text-[10px] font-medium">数据</span></button></div>
                    </nav>
                 </main>
              </div>
            );
        };

        return (
          <>
            {renderMainContent()}
            <SplashScreen show={showSplash} onClose={() => setShowSplash(false)} />
            <Modal isOpen={showSettings} onClose={handleSettingsClose} title="系统设置" fullScreen={true}>
                <SettingsPanel apiConfigs={apiConfigs} setApiConfigs={setApiConfigs} themes={themes} setThemes={setThemes} activeTab={settingsTab} setActiveTab={changeSettingsTab} onExportAllTrigger={handleExportAll} />
            </Modal>
            <StoryGeneratorModal isOpen={showGenerator} onClose={handleGeneratorClose} onComplete={handleStoryGenerated} existingCharacters={characters} apiConfigs={apiConfigs} />
            <ExportModal isOpen={exportModalState.isOpen} onClose={handleExportModalClose} data={exportModalState.data} filenamePrefix={exportModalState.filenamePrefix} />
            
            {/* 开发者控制台入口按钮 - 固定在右下角 */}
            {StorageService.getSplashConfig().showDevConsole && (
            <button
              onClick={() => setShowDevConsole(true)}
              className="fixed bottom-4 right-4 z-[50] w-8 h-8 bg-mono-800 dark:bg-mono-200 text-white dark:text-black rounded-full shadow-lg flex items-center justify-center text-xs font-mono hover:scale-110 transition-transform"
              title="开发者控制台"
            >
              {LogManager.logs.filter(l => l.type === 'error').length > 0 ? '!' : '§'}
            </button>
            )}
            
            {/* 开发者控制台 */}
            <DevConsole isOpen={showDevConsole} onClose={() => setShowDevConsole(false)} />
          </>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
