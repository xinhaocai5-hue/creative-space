      const { useState, useEffect, useRef, useMemo, useCallback } = React;

      // ==========================================
      // 工具 Hooks
      // ==========================================
      const useMediaQuery = (query) => {
        const [matches, setMatches] = useState(window.matchMedia(query).matches);
        useEffect(() => {
          const media = window.matchMedia(query);
          const listener = () => setMatches(media.matches);
          media.addEventListener('change', listener);
          return () => media.removeEventListener('change', listener);
        }, [query]);
        return matches;
      };

      // 防抖 Hook
      const useDebounce = (value, delay = 300) => {
        const [debouncedValue, setDebouncedValue] = useState(value);
        useEffect(() => {
          const timer = setTimeout(() => setDebouncedValue(value), delay);
          return () => clearTimeout(timer);
        }, [value, delay]);
        return debouncedValue;
      };

      // 节流函数
      const useThrottle = (callback, delay = 100) => {
        const lastRun = useRef(Date.now());
        return useCallback((...args) => {
          const now = Date.now();
          if (now - lastRun.current >= delay) {
            lastRun.current = now;
            callback(...args);
          }
        }, [callback, delay]);
      };

      // 图片缓存管理
      const ImageCache = {
        cache: new Map(),
        maxSize: 50,
        get(key) { return this.cache.get(key); },
        set(key, value) {
          if (this.cache.size >= this.maxSize) {
            const firstKey = this.cache.keys().next().value;
            this.cache.delete(firstKey);
          }
          this.cache.set(key, value);
        },
        has(key) { return this.cache.has(key); },
        clear() { this.cache.clear(); }
      };

      // ==========================================
      // 全局日志管理器
      // ==========================================
      const LogManager = {
        logs: [],
        maxLogs: 500,
        listeners: new Set(),
        
        addLog(type, category, message, data = null) {
          const log = {
            id: Date.now() + Math.random(),
            timestamp: new Date().toISOString(),
            type, // 'info', 'success', 'warning', 'error', 'api'
            category, // 'API', 'Storage', 'Image', 'Audio', 'System', 'User'
            message,
            data
          };
          this.logs.unshift(log);
          if (this.logs.length > this.maxLogs) {
            this.logs.pop();
          }
          this.notifyListeners();
          return log;
        },
        
        info(category, message, data) { return this.addLog('info', category, message, data); },
        success(category, message, data) { return this.addLog('success', category, message, data); },
        warning(category, message, data) { return this.addLog('warning', category, message, data); },
        error(category, message, data) { return this.addLog('error', category, message, data); },
        api(method, url, status, duration, data) { 
          return this.addLog('api', 'API', `${method} ${url}`, { status, duration, ...data }); 
        },
        
        clear() { 
          this.logs = []; 
          this.notifyListeners(); 
        },
        
        subscribe(listener) {
          this.listeners.add(listener);
          return () => this.listeners.delete(listener);
        },
        
        notifyListeners() {
          this.listeners.forEach(listener => listener(this.logs));
        },
        
        getLogs(filter = {}) {
          let filtered = this.logs;
          if (filter.type) filtered = filtered.filter(l => l.type === filter.type);
          if (filter.category) filtered = filtered.filter(l => l.category === filter.category);
          if (filter.search) filtered = filtered.filter(l => 
            l.message.toLowerCase().includes(filter.search.toLowerCase())
          );
          return filtered;
        }
      };

      // 重写 console 方法以捕获日志
      const originalConsole = {
        log: console.log.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console),
        info: console.info.bind(console)
      };
      
      console.log = (...args) => {
        originalConsole.log(...args);
        LogManager.info('Console', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
      };
      console.warn = (...args) => {
        originalConsole.warn(...args);
        LogManager.warning('Console', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));

        const variants = {
          primary: "bg-mono-900 text-white border-mono-900 shadow-md shadow-mono-900/20 dark:bg-mono-100 dark:text-black dark:border-mono-100 dark:shadow-mono-100/10",

        };
        return <button onClick={onClick} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} disabled={disabled} title={title} {...props}>{children}</button>;

        settings: null,

        CACHE_DURATION: 30000, // 30秒缓存
        
        isValid(type) {
          return Date.now() - this.lastFetch[type] < this.CACHE_DURATION;
        },
        
        get(type) { return this[type]; },
        set(type, data) { this[type] = data; this.lastFetch[type] = Date.now(); },
        invalidate(type) { this[type] = null; this.lastFetch[type] = 0; },
        invalidateAll() { ['projects', 'characters', 'backgrounds', 'settings'].forEach(t => this.invalidate(t)); }

          if (CacheManager.isValid('projects')) return CacheManager.get('projects');
          const result = await transact(IDB_CONFIG.STORE_PROJECTS, 'readonly', (store, resolve) => { 
            const req = store.getAll(); req.onsuccess = () => resolve(req.result || []);

          CacheManager.set('projects', result);
          return result;

        saveProject: async (project) => {

        // 生成图片 - 复刻Echo.html的handleGenerateImage逻辑
        generateImage: async (imageGenSettings, char, batchMode = false, onProgress) => {
          return new Promise(async (resolve, reject) => {
            // 检查模型是否已选择
            if (!imageGenSettings.modelPath) {
              alert('请先在设置中选择大模型！\n\n1. 打开设置面板\n2. 切换到"本地生图"标签\n3. 点击"连接"按钮获取大模型列表\n4. 选择一个大模型');
              reject(new Error('未选择大模型'));
              return;
            }
            
            try {
              // 先检查服务器连接
              const isConnected = await LocalImageService.checkConnection(imageGenSettings.serverUrl);
              if (!isConnected) {
                alert('无法连接到ComfyUI服务器！\n\n请检查：\n1. ComfyUI是否已启动\n2. 服务器地址是否正确\n3. 防火墙是否阻止了连接');
                reject(new Error('ComfyUI服务器未连接'));
                return;
              }
              
              // 构建工作流
              const workflow = LocalImageService.buildWorkflow(imageGenSettings, char);
              
              // 发送请求到ComfyUI
              const response = await fetch(`${imageGenSettings.serverUrl}/prompt`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: workflow })
              });
              
              if (!response.ok) {
                const errorText = await response.text();
                console.error('ComfyUI Error:', errorText);
                throw new Error(`HTTP error! status: ${response.status}, details: ${errorText}`);
              }
              
              const result = await response.json();
              const promptId = result.prompt_id;
              
              if (onProgress) onProgress('提交任务中...', 0);
              
              // 获取生成图片的函数
              const fetchGeneratedImage = async () => {
                try {
                  const historyResponse = await fetch(`${imageGenSettings.serverUrl}/history/${promptId}`);
                  if (!historyResponse.ok) return null;
                  
                  const historyData = await historyResponse.json();
                  const promptHistory = historyData[promptId];
                  
                  if (promptHistory && promptHistory.outputs) {
                    const outputs = promptHistory.outputs;
                    for (const nodeId in outputs) {
                      const nodeOutput = outputs[nodeId];
                      if (nodeOutput.images && nodeOutput.images.length > 0) {
                        const imageData = nodeOutput.images[0];
                        const imageUrl = `${imageGenSettings.serverUrl}/view?filename=${encodeURIComponent(imageData.filename)}&subfolder=${encodeURIComponent(imageData.subfolder || '')}&type=${imageData.type || 'output'}`;
                        
                        const imgResponse = await fetch(imageUrl);
                        const blob = await imgResponse.blob();
                        
                        return new Promise((resolveImg) => {
                          const reader = new FileReader();
                          reader.onload = (e) => resolveImg(e.target.result);
                          reader.readAsDataURL(blob);
                        });
                      }
                    }
                  }
                  return null;
                } catch (err) {
                  console.error('Fetch image error:', err);
                  return null;
                }
              };
              
              // 轮询等待生成完成
              let completed = false;
              let failCount = 0;
              const pollInterval = setInterval(async () => {
                if (completed) {
                  clearInterval(pollInterval);
                  return;
                }
                
                try {
                  const historyResponse = await fetch(`${imageGenSettings.serverUrl}/history/${promptId}`);
                  if (!historyResponse.ok) {
                    failCount++;
                    if (failCount > 5) {
                      completed = true;
                      clearInterval(pollInterval);
                      reject(new Error('无法获取生成状态，请检查ComfyUI服务器'));
                    }
                    return;
                  }
                  
                  failCount = 0;
                  const historyData = await historyResponse.json();
                  const promptHistory = historyData[promptId];
                  
                  // 检查进度
                  if (promptHistory && promptHistory.status) {
                    if (promptHistory.status.status_str === 'running') {
                      if (promptHistory.status.messages) {
                        for (const msg of promptHistory.status.messages) {
                          if (msg[0] === 'progress') {
                            const progressValue = Math.round((msg[1].value / msg[1].max) * 100);
                            if (onProgress) onProgress('采样进度', progressValue);
                          }
                        }
                      }
                    }
                  }
                  
                  if (promptHistory && promptHistory.outputs) {
                    completed = true;
                    clearInterval(pollInterval);
                    
                    if (onProgress) onProgress('VAE解码中...', 100);
                    
                    const image = await fetchGeneratedImage();
                    if (image) {
                      if (onProgress) onProgress('生成完成！', 100);
                      resolve(image);
                    } else {
                      reject(new Error('获取生成的图片失败'));
                    }
                  }
                } catch (err) {
                  failCount++;
                  if (failCount > 5) {
                    completed = true;
                    clearInterval(pollInterval);
                    reject(new Error('连接ComfyUI服务器失败，请检查服务器是否运行'));
                  }
                }
              }, 1000);
              
              // 5分钟超时
              setTimeout(() => {
                if (!completed) {
                  clearInterval(pollInterval);
                  reject(new Error('生成超时'));
                }
              }, 5 * 60 * 1000);
              
            } catch (error) {
              console.error('Generate Image Error:', error);
              reject(error);
            }
          });
        },

        // 带参考音频的单情感推理
        inferSingleWithRef: async (config, params) => {

        // 批量生成语音（统一接口）
        batchGenerate: async (config, texts, options = {}, onProgress) => {
          const results = [];
          for (let i = 0; i < texts.length; i++) {
            try {
              let result;
              if (options.useRefAudio && options.refAudio) {
                result = await LocalTTSService.inferSingleWithRef(config, {
                  text: texts[i].text,
                  speaker: texts[i].speaker || options.speaker,
                  emotion: texts[i].emotion || options.emotion,
                  speed: options.speed,
                  volume: options.volume,
                  pitch: options.pitch,
                  refAudio: options.refAudio,
                  refText: options.refText
                });
              } else {
                result = await LocalTTSService.inferSingle(config, {
                  text: texts[i].text,
                  speaker: texts[i].speaker || options.speaker,
                  emotion: texts[i].emotion || options.emotion,
                  speed: options.speed,
                  volume: options.volume,
                  pitch: options.pitch
                });
              }
              results.push({ success: true, url: result, text: texts[i].text });
              if (onProgress) onProgress(i + 1, texts.length, 'local_tts');

      const TTSTestButton = ({ config }) => {
        const [isTesting, setIsTesting] = useState(false);
        const [testAudioUrl, setTestAudioUrl] = useState(null);
        const [testStatus, setTestStatus] = useState('');
        const audioRef = useRef(null);
        
        const handleTest = async () => {
          if (!config.apiKey) {
            setTestStatus('❌ 请先配置 API Key');
            setTimeout(() => setTestStatus(''), 3000);
            return;
          }
          
          setIsTesting(true);
          setTestStatus('🎙️ 正在生成测试语音...');
          
          try {
            const testText = '这是一段测试语音，用于验证硅基流动 TTS API 是否正常工作。';
            const audioUrl = await AIService.generateSpeech(config, testText, {
              voice: config.voice,
              speed: 1.0,
              format: 'mp3'
            });
            
            setTestAudioUrl(audioUrl);
            setTestStatus('✅ 测试成功！');
            
            // 自动播放
            if (audioRef.current) {
              audioRef.current.src = audioUrl;
              audioRef.current.play();
            }
          } catch (error) {
            console.error('[TTS Test] 错误:', error);
            setTestStatus(`❌ 测试失败: ${error.message}`);
          } finally {
            setIsTesting(false);
            setTimeout(() => setTestStatus(''), 5000);
          }
        };
        
        return (

            {/* 开始合成按钮 - 复用本地语音合成样式 */}
            <Button

              disabled={isTesting || !config.apiKey}

        const [isTesting, setIsTesting] = useState(false);
        const [testAudioUrl, setTestAudioUrl] = useState(null);
        const audioRef = useRef(null);
        
        useEffect(() => {
          if (isOpen) {
            setLocalConfig(config);
            checkConnection();

          setIsLoading(true);

            setConnectionStatus('disconnected');

            setIsLoading(false);

          try {
            const modelData = await LocalTTSService.getModels(config, localConfig.version);

            if (!response.ok) {

            const blob = await response.blob();

      const LocalVoiceSettings = ({ value = {}, onChange, compact = false }) => {
        const baseUrl = localStorage.getItem('localTTSBaseUrl') || 'http://127.0.0.1:8000';
        const [connectionStatus, setConnectionStatus] = useState('unknown');
        const [versions, setVersions] = useState([]);
        const [models, setModels] = useState([]);
        const [emotions, setEmotions] = useState([]);
        const [isPreviewing, setIsPreviewing] = useState(false);
        const [previewAudioUrl, setPreviewAudioUrl] = useState(null);
        const audioRef = useRef(null);
        
        const settings = {
          version: value.version || '',
          model: value.model || '',
          emotion: value.emotion || '',
          textLang: value.textLang || '中文',
          promptTextLang: value.promptTextLang || '中文',
          textSplitMethod: value.textSplitMethod || '按标点符号切',
          speed: value.speed || 1.0,
          seed: value.seed || -1,
          ...value
        };
        
        const TEXT_LANGS = ['中文', '英语', '日语', '粤语', '韩语', '中英混合', '日英混合', '粤英混合', '韩英混合', '多语种混合'];
        const SPLIT_METHODS = ['按标点符号切', '凑四句一切', '凑50字一切', '按中文句号。切', '按英文句号.切', '按换行切', '不切'];
        
        const updateSetting = (key, val) => {
          onChange({ ...settings, [key]: val });
        };
        
        const handlePreview = async () => {
          if (!settings.model || !settings.emotion || connectionStatus !== 'connected') return;
          setIsPreviewing(true);
          setPreviewAudioUrl(null);
          try {
            const requestBody = {
              version: settings.version || 'v2',
              model_name: settings.model,
              emotion: settings.emotion,
              text: '你好，这是语音预览测试。',
              text_lang: settings.textLang,
              prompt_text_lang: settings.promptTextLang,
              text_split_method: settings.textSplitMethod,
              speed_facter: settings.speed,
              seed: settings.seed,
              top_k: 10,
              top_p: 0.95,
              temperature: 0.7
            };
            
            const response = await fetch(`${baseUrl.replace(/\/+$/, '')}/infer_single`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(requestBody)
            });
            
            if (!response.ok) throw new Error('预览失败');
            
            const blob = await response.blob();
            if (blob.type === 'application/json') {
              const text = await blob.text();
              const jsonData = JSON.parse(text);
              if (jsonData.audio_url) {
                const audioUrlFixed = jsonData.audio_url.replace('http://0.0.0.0:8000', baseUrl.replace(/\/+$/,''));
                setPreviewAudioUrl(audioUrlFixed);

      const StoryGeneratorModal = ({ isOpen, onClose, onComplete, existingCharacters, apiConfigs }) => {
          const [inputText, setInputText] = useState('');
          const [isGenerating, setIsGenerating] = useState(false);
          const [error, setError] = useState(null);
          const [systemPrompt, setSystemPrompt] = useState('');
          const [selectedCharIds, setSelectedCharIds] = useState([]);
          const [showPromptEdit, setShowPromptEdit] = useState(false);
          
          // 新增：背景生成选项（语音生成已移除，改为编辑界面生成）
          const [generateBackgrounds, setGenerateBackgrounds] = useState(false);
          const [bgGenConfig, setBgGenConfig] = useState({ defaultSize: '1920x1080', defaultSteps: 20 });
          const [aiGenImageSource, setAiGenImageSource] = useState(() => {
            const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
            return localImageConfig.autoUseSingleImage ? 'local' : 'cloud';
          });
          
          // 新增：对话轮数控制
          const [dialogueRounds, setDialogueRounds] = useState(15);

          // 新增：背景提示词生成提示词
          const [bgPromptSystemPrompt, setBgPromptSystemPrompt] = useState(`You are a JSON generator. Given the story content, output ONLY a JSON object with the key "sceneDescriptions", which is an array of objects containing "index" (integer) and "prompt" (string). Each prompt must be a comma-separated list of English tags describing the environment only (no people, no actions).

CRITICAL RULES:
1. OUTPUT MUST BE 100% ENGLISH - NO CHINESE CHARACTERS ALLOWED
2. Output ONLY the JSON object, NO other text before or after
3. NO markdown code blocks, NO explanations, NO "Here is the JSON" prefixes
4. Each prompt describes ONLY environment: architecture, nature, weather, lighting, atmosphere, colors, time, location
5. FORBIDDEN: person, people, human, figure, character, man, woman, girl, boy, face, hand, body, silhouette, standing, sitting, walking

Example output:
{"sceneDescriptions": [{"index":0,"prompt":"masterpiece, best quality, highly detailed, forest, sunlight through trees, peaceful atmosphere, nature, green leaves"}, {"index":1,"prompt":"masterpiece, best quality, highly detailed, city street, night, neon lights, wet pavement, urban, cyberpunk atmosphere"}]}

REMEMBER: Output ONLY the JSON, nothing else!`);
          const [showBgPromptEdit, setShowBgPromptEdit] = useState(false);
          const [generatedBgPrompts, setGeneratedBgPrompts] = useState([]);
          const [showBgSettings, setShowBgSettings] = useState(false);
          const [generationPhase, setGenerationPhase] = useState('story'); // story, background
          const [progress, setProgress] = useState({ current: 0, total: 0, errors: [] });

          useEffect(() => {
              const selectedChars = existingCharacters.filter(c => selectedCharIds.includes(c.id));
              const charListStr = selectedChars.length > 0 ? selectedChars.map(c => `ID: ${c.id}, Name: ${c.name}, Desc: ${c.description}`).join('\n') : "无";
              const defaultPrompt = `任务：将以下文本/剧情改编成一个视觉小说脚本数据结构。
要求：
1. 分析文本中出现的关键角色，为每个角色生成ID、名字、描述和第一句台词。
2. 现有角色列表（请优先复用以下角色的ID和名字，如果剧情中有对应人物）：
${charListStr}
3. 如果出现新角色，请生成新的ID。
4. 将剧情拆分为对话脚本。
5. 返回严格的 JSON 格式，不要包含Markdown标记。
6. characterId 必须对应 characters 数组中的 id。
7. 旁白或动作描述 characterId 设为 null。
8. 生成大约 ${dialogueRounds} 行对话（可根据剧情需要适当调整，但不要偏离太多）。
9. 语言：简体中文。

JSON结构示例：
{
  "title": "推测的美梦标题",
  "worldSetting": "简短的世界观描述",
  "characters": [
    { "id": "char_1", "name": "角色名", "description": "外貌与性格描述", "firstMessage": "你好" }
  ],
  "scripts": [
    { "characterId": "char_1", "text": "台词内容...", "sceneDescription": "场景描述，用于生成背景" },
    { "characterId": null, "text": "（旁白/动作描述）", "sceneDescription": "场景描述" }
  ]
}`;
              setSystemPrompt(defaultPrompt);
              
              // 更新生图源设置（根据本地生图设置）
              const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
              setAiGenImageSource(localImageConfig.autoUseSingleImage ? 'local' : 'cloud');
          }, [existingCharacters, selectedCharIds, isOpen, dialogueRounds]);

          const toggleCharSelection = (id) => { setSelectedCharIds(prev => prev.includes(id) ? prev.filter(cid => cid !== id) : [...prev, id]); };
          
          const handleGenerate = async () => { 
            if (!inputText.trim()) return; 
            setIsGenerating(true); 
            setError(null);
            setGenerationPhase('story');

            try { 
              const configs = StorageService.getAPIConfigs(); 
              const textConfig = configs.find(c => c.type === 'text' && c.isActive); 
              if (!textConfig || !textConfig.apiKey) throw new Error("文本对话 API Key 未配置，请先在设置中配置文本对话模型。"); 

              // 1. 生成故事结构
              const result = await AIService.generateStoryFromText(textConfig, inputText, systemPrompt);

              // 2. 如果需要生成背景，先生成背景提示词
              let bgPrompts = [];
              if (generateBackgrounds) {
                setGenerationPhase('bg_prompt');

                // 使用纯文本格式，一行一个提示词，避免 JSON 解析问题
                const bgPromptUserContent = `For each story line below, generate an English prompt tag for the scene environment. Output one prompt per line:

${result.scripts.map((s, i) => `${i + 1}. ${s.characterId ? result.characters.find(c => c.id === s.characterId)?.name + ': ' : ''}${s.text}`).join('\n')}`;

                try {
                  console.log('[背景提示词生成] 开始生成');
                  const bgPromptResponse = await AIService.chatCompletion(textConfig, [
                    { role: 'system', content: `You are an AI prompt engineer. For each story line, generate a single line of English prompt tags that describe the scene environment (no people, no characters, no actions). Output exactly one line per story line, in the same order as the input. Each prompt should be a comma-separated list of English tags like: masterpiece, best quality, highly detailed, [environment], [lighting], [atmosphere]. Do NOT include any other text, numbering, or comments.` },
                    { role: 'user', content: bgPromptUserContent }
                  ], 4000);

                  console.log('[背景提示词生成] AI原始响应:', bgPromptResponse);

                  // 按行分割，过滤空行
                  const lines = bgPromptResponse.split('\n').filter(l => l.trim().length > 0);
                  bgPrompts = result.scripts.map((_, i) => ({ 
                    index: i, 
                    prompt: lines[i] ? lines[i].trim() : `masterpiece, best quality, highly detailed, scene ${i+1}, environment, atmosphere, no people` 
                  }));
                  
                  console.log('[背景提示词生成] 解析成功:', bgPrompts);
                  setGeneratedBgPrompts(bgPrompts);
                } catch (err) {
                  console.error("背景提示词生成失败，使用备用英文描述:", err);
                  bgPrompts = result.scripts.map((_, i) => ({ 
                    index: i, 
                    prompt: `masterpiece, best quality, highly detailed, scene ${i+1}, environment, atmosphere, no people` 
                  }));
                  alert("AI 背景提示词生成失败，已使用默认英文占位符，请手动调整场景描述。");
                }

                // 将生成的 prompt 存入脚本的 sceneDescription 字段
                bgPrompts.forEach(bg => { 
                  result.scripts[bg.index].sceneDescription = bg.prompt; 
                });
              }

              // 3. 生成背景图片
              if (generateBackgrounds) {
                setGenerationPhase('background');
                
                // 检查是否使用本地生图
                const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');
                const useLocalImage = aiGenImageSource === 'local';
                
                if (!useLocalImage) {
                  const bgGenApiConfig = configs.find(c => c.type === 'image' && c.isActive);
                  if (!bgGenApiConfig || !bgGenApiConfig.apiKey) {
                    console.warn("背景生成API未配置，跳过背景生成");
                    return;
                  }
                }
                
                setProgress({ current: 0, total: result.scripts.length, errors: [] });

                // 提取场景描述并去重
                const sceneMap = new Map();
                bgPrompts.forEach((bgPrompt) => {
                  const prompt = bgPrompt.prompt;
                  const idx = bgPrompt.index;
                  if (!sceneMap.has(prompt)) {
                    sceneMap.set(prompt, { indices: [], prompt: prompt });
                  }
                  sceneMap.get(prompt).indices.push(idx);
                  
                  // 将英文提示词保存到script的sceneDescription字段（用户可见可编辑）
                  result.scripts[idx].sceneDescription = prompt;
                });

                const uniqueScenes = Array.from(sceneMap.values());
                setProgress({ current: 0, total: uniqueScenes.length, errors: [] });

                // 批量生成背景
                const generatedBackgrounds = [];
                const projectTitle = result.title || "AI美梦";

                for (let sceneIdx = 0; sceneIdx < uniqueScenes.length; sceneIdx++) {
                  const scene = uniqueScenes[sceneIdx];
                  try {
                    let imageData;
                    
                    if (useLocalImage) {
                      // 使用本地生图 - 创建临时char对象
                      const tempChar = { 
                        value: scene.prompt,
                        name: `scene_${sceneIdx}`
                      };
                      imageData = await LocalImageService.generateImage(localImageConfig, tempChar);
                    } else {
                      // 使用云端API
                      const bgGenApiConfig = configs.find(c => c.type === 'image' && c.isActive);
                      imageData = await AIService.generateBackground(bgGenApiConfig, scene.prompt, {
                        imageSize: '1024x576',
                        steps: 20
                      });
                    }
                    
                    const firstIdx = scene.indices[0];
                    const bgId = `bg_gen_${Date.now()}_${sceneIdx}`;
                    const bgName = `${projectTitle}-${firstIdx + 1}-${scene.prompt.slice(0, 30)}`;

                    generatedBackgrounds.push({
                      id: bgId,
                      name: bgName,
                      data: imageData,
                      type: 'image',
                      isAIGenerated: true,
                      prompt: scene.prompt
                    });

                    // 为所有使用该场景的脚本分配背景ID
                    scene.indices.forEach(scriptIdx => {
                      result.scripts[scriptIdx].backgroundId = bgId;
                    });
                    
                    setProgress(prev => ({ ...prev, current: sceneIdx + 1 }));
                  } catch (err) {
                    console.error("背景生成失败:", err);

                      ...prev, 
                      errors: [...prev.errors, `${sceneIdx + 1}: ${err.message}`] 
                    }));
                  }
                  
                  // 延迟避免速率限制
                  if (sceneIdx < uniqueScenes.length - 1) await new Promise(r => setTimeout(r, 1000));
                }

                result.generatedBackgrounds = generatedBackgrounds;
              }

              // 语音生成已移除，改为在编辑界面进行批量或单独生成

              onComplete(result); 
              onClose(); 
            } catch (err) {

          return ( <div className="space-y-6 h-full overflow-y-auto custom-scrollbar pr-2"><div className="flex justify-between items-center border-b border-mono-200 dark:border-mono-800 pb-2"><h3 className="font-bold">管理员配置</h3><Button size="sm" onClick={handleSave}><Icon name="Save" size={14}/> 保存更改</Button></div><div className="space-y-4"><div><label className="text-xs font-bold text-mono-500 dark:text-mono-100 mb-1 block">显示文本</label><TextArea value={config.text} onChange={e => setConfig({...config, text: e.target.value})} className="!h-32"/></div><div><label className="text-xs font-bold text-mono-500 dark:text-mono-100 mb-1 block">配图</label><div className="flex gap-4 items-center"><div className="w-24 h-24 bg-mono-100 dark:bg-mono-800 rounded-lg overflow-hidden border border-dashed border-mono-400 flex items-center justify-center relative group">{config.image ? <img src={config.image} className="w-full h-full object-cover"/> : <span className="text-xs text-mono-400">无图片</span>}<div className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><FileDropZone onFile={async (f) => setConfig({...config, image: await fileToBase64(f)})} className="!border-0 text-white" noIcon><Icon name="Upload" size={20}/></FileDropZone></div></div><div className="flex-1 text-xs text-mono-500 dark:text-mono-300">上传一张图片作为启动页的顶部横幅。</div></div></div><div className="pt-4 border-t border-mono-200 dark:border-mono-800"><div className="flex items-center justify-between"><div><label className="text-xs font-bold text-mono-500 dark:text-mono-100 mb-1 block">控制台显示</label><p className="text-xs text-mono-400">开启后右下角显示开发者控制台按钮</p></div><button onClick={() => setConfig({...config, showDevConsole: !config.showDevConsole})} className={`relative w-12 h-6 rounded-full transition-colors duration-300 ${config.showDevConsole ? 'bg-blue-500' : 'bg-mono-300 dark:bg-mono-600'}`}><span className={`absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform duration-300 ${config.showDevConsole ? 'translate-x-6' : ''}`}/></button></div></div><div className="pt-4 border-t border-mono-200 dark:border-mono-800"><label className="text-xs font-bold text-mono-500 dark:text-mono-100 mb-1 block">修改管理密码</label><Input value={config.password} onChange={e => setConfig({...config, password: e.target.value})} type="text" placeholder="设置新密码"/></div></div></div> );

         const deleteTheme = (id) => { if (themes.length <= 1) return; const newThemes = themes.filter(t => t.id !== id); setThemes(newThemes); setEditingThemeId(newThemes[0].id); StorageService.saveThemes(newThemes); };

         const choiceStyle = activeTheme.choiceStyle || { layout: 'bottom-right', backgroundColor: '#000000', textColor: '#ffffff', opacity: 0.6 };
         const updateChoiceStyle = (key, val) => { updateTheme(activeTheme.id, { choiceStyle: { ...choiceStyle, [key]: val } }); };
         return ( <div className="flex flex-col md:grid md:grid-cols-3 gap-6 md:h-[500px] h-full"><div className="col-span-1 border-r border-mono-200 dark:border-mono-800 pr-4 flex flex-col gap-2 shrink-0"><div className="flex justify-between items-center mb-2"><span className="font-bold text-sm text-mono-900 dark:text-mono-100">主题列表</span><div className="flex gap-1"><Button size="sm" variant="ghost" onClick={resetToDefaults} title="重置默认"><Icon name="RotateCcw" size={14} /></Button><Button size="sm" variant="ghost" onClick={addTheme}><Icon name="Plus" size={14} /></Button></div></div><div className="flex-none md:flex-1 overflow-y-auto space-y-2 custom-scrollbar max-h-48 md:max-h-none">{themes.map(t => (<div key={t.id} onClick={() => setEditingThemeId(t.id)} className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center transition-colors ${editingThemeId === t.id ? 'bg-mono-100 dark:bg-mono-800 border-mono-400' : 'border-transparent hover:bg-mono-50 dark:hover:bg-mono-900'}`}><div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full border border-mono-300" style={{ background: t.primaryColor }}></div><span className="text-sm font-medium truncate text-mono-900 dark:text-mono-100">{t.name}</span></div>{!t.isSystem && (<button onClick={(e) => { e.stopPropagation(); deleteTheme(t.id); }} className="text-mono-400 hover:text-red-500 hover:scale-110 transition-transform"><Icon name="Trash" size={14} /></button>)}</div>))}</div></div><div className="md:col-span-2 space-y-6 overflow-y-auto pr-2 animate-fade-in flex-1"><div className="aspect-[21/9] bg-gray-900 rounded-lg relative overflow-hidden shadow-lg border border-mono-700 shrink-0"><div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: 'url(https://images.unsplash.com/photo-1518176258769-e3e676577d24?auto=format&fit=crop&q=80&w=1000)' }}></div><div className="absolute bottom-0 inset-x-0" style={{ height: `${activeTheme.height}%`, background: activeTheme.type === 'gradient' ? `linear-gradient(to top, ${activeTheme.primaryColor}${Math.floor(activeTheme.opacity * 255).toString(16).padStart(2,'0')} 0%, ${activeTheme.primaryColor}00 100%)` : `${activeTheme.primaryColor}${Math.floor(activeTheme.opacity * 255).toString(16).padStart(2,'0')}` }}><div className="absolute bottom-4 left-4 right-4"><div className="inline-block px-4 py-1 mb-2 font-bold text-sm rounded-sm" style={{ color: activeTheme.nameTagColor }}>角色名</div><div className="text-lg" style={{ color: activeTheme.textColor }}>这是预览文本。主题效果将实时反映在这里。</div></div></div></div><div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-4"><div className="col-span-1 sm:col-span-2"><label className="text-xs font-bold text-mono-500 dark:text-mono-100">主题名称</label><Input value={activeTheme.name} onChange={e => updateTheme(activeTheme.id, { name: e.target.value })} disabled={activeTheme.isSystem} /></div><div><label className="text-xs font-bold text-mono-500 dark:text-mono-100">样式类型</label><Select value={activeTheme.type} onChange={e => updateTheme(activeTheme.id, { type: e.target.value })}><option value="solid">纯色块 (Solid)</option><option value="gradient">渐变 (Gradient)</option></Select></div><div><label className="text-xs font-bold text-mono-500 dark:text-mono-100">不透明度 ({Math.round(activeTheme.opacity * 100)}%)</label><input type="range" min="0" max="1" step="0.05" value={activeTheme.opacity} onChange={e => updateTheme(activeTheme.id, { opacity: parseFloat(e.target.value) })} className="w-full mt-2 accent-mono-900 dark:accent-mono-100" /></div><div><label className="text-xs font-bold text-mono-500 dark:text-mono-100">高度占比 ({activeTheme.height}%)</label><input type="range" min="10" max="80" step="5" value={activeTheme.height} onChange={e => updateTheme(activeTheme.id, { height: parseInt(e.target.value) })} className="w-full mt-2 accent-mono-900 dark:accent-mono-100" /></div><div className="flex flex-col gap-2"><label className="text-xs font-bold text-mono-500 dark:text-mono-100">对话框颜色</label><div className="flex gap-4"><div className="flex items-center gap-2"><input type="color" value={activeTheme.primaryColor} onChange={e => updateTheme(activeTheme.id, { primaryColor: e.target.value })} className="w-8 h-8 rounded cursor-pointer transition-transform hover:scale-110" title="背景色" /><span className="text-xs text-mono-500 dark:text-mono-300">背景</span></div><div className="flex items-center gap-2"><input type="color" value={activeTheme.textColor} onChange={e => updateTheme(activeTheme.id, { textColor: e.target.value })} className="w-8 h-8 rounded cursor-pointer transition-transform hover:scale-110" title="文字颜色" /><span className="text-xs text-mono-500 dark:text-mono-300">文字</span></div><div className="flex items-center gap-2"><input type="color" value={activeTheme.nameTagColor} onChange={e => updateTheme(activeTheme.id, { nameTagColor: e.target.value })} className="w-8 h-8 rounded cursor-pointer transition-transform hover:scale-110" title="名字颜色" /><span className="text-xs text-mono-500 dark:text-mono-300">名字</span></div></div></div><div className="col-span-1 sm:col-span-2 border-t border-mono-200 dark:border-mono-800 pt-4 mt-2"><div className="flex justify-between items-center mb-2"><label className="text-xs font-bold text-mono-500 dark:text-mono-100">分支选项样式</label></div><div className="grid grid-cols-1 sm:grid-cols-2 gap-4"><div className="col-span-1 sm:col-span-2"><Select value={choiceStyle.layout} onChange={e => updateChoiceStyle('layout', e.target.value)}><option value="bottom-right">右下角 (现代)</option><option value="center">屏幕居中 (经典)</option></Select></div><div className="flex gap-4 col-span-1 sm:col-span-2"><div className="flex items-center gap-2"><input type="color" value={choiceStyle.backgroundColor} onChange={e => updateChoiceStyle('backgroundColor', e.target.value)} className="w-8 h-8 rounded cursor-pointer transition-transform hover:scale-110" /><span className="text-xs text-mono-500 dark:text-mono-300">选项背景</span></div><div className="flex items-center gap-2"><input type="color" value={choiceStyle.textColor} onChange={e => updateChoiceStyle('textColor', e.target.value)} className="w-8 h-8 rounded cursor-pointer transition-transform hover:scale-110" /><span className="text-xs text-mono-500 dark:text-mono-300">选项文字</span></div><div className="flex-1 flex flex-col justify-center"><input type="range" min="0" max="1" step="0.1" value={choiceStyle.opacity} onChange={e => updateChoiceStyle('opacity', parseFloat(e.target.value))} className="w-full accent-mono-900 dark:accent-mono-100" /><div className="text-[10px] text-right text-mono-500 dark:text-mono-300">透明度</div></div></div></div></div></div></div></div> );

      // ==========================================
      // 音频设置面板
      // ==========================================
      
      const AudioSettingsPanel = () => {
         const [volumes, setVolumes] = useState(JSON.parse(localStorage.getItem('vn_maker_volumes') || '{"bgm":0.5,"bgs":0.5,"se":0.5,"voice":1.0}'));

      const TestApiButton = ({ config }) => {
        const [isTesting, setIsTesting] = useState(false);
        const [testStatus, setTestStatus] = useState('');
        const [testResult, setTestResult] = useState(''); // 'success' | 'error' | 'pending' | ''
        
        const handleTest = async () => {
          if (!config.apiKey) {
            setTestStatus('请先配置 API Key');
            setTestResult('error');
            setTimeout(() => { setTestStatus(''); setTestResult(''); }, 3000);
            return;
          }
          
          setIsTesting(true);
          setTestStatus('正在测试连接...');
          setTestResult('pending');
          
          try {
            const testMessages = [
              { role: 'system', content: '你是一个测试助手，请用一句话简单回复。' },
              { role: 'user', content: '你好，这是一条测试消息。请回复"连接成功！"' }
            ];
            
            let reply = '';
            let streamError = null;
            await AIService.chatCompletionStream(config, testMessages, (chunk) => {
              // 检测流式返回中的错误信息
              if (chunk && chunk.startsWith('[系统错误:')) {
                streamError = chunk.replace('[系统错误:', '').replace(']', '').trim();
                return;
              }
              reply += chunk;
              setTestStatus(`正在接收: ${reply.slice(0, 50)}${reply.length > 50 ? '...' : ''}`);
            }, 256);
            
            // 如果流式过程中检测到错误，抛出异常
            if (streamError) {
              throw new Error(streamError);
            }
            
            setTestStatus('连接成功');
            setTestResult('success');
          } catch (error) {
            setTestStatus(`测试失败: ${error.message || '未知错误'}`);
            setTestResult('error');
          } finally {
            setIsTesting(false);
            setTimeout(() => { setTestStatus(''); setTestResult(''); }, 5000);
          }
        };
        
        const getStatusColor = () => {
          switch (testResult) {
            case 'error': return 'text-red-500';
            case 'success': return 'text-green-500';
            case 'pending': return 'text-mono-500';
            default: return 'text-mono-500';
          }
        };
        
        return (
          <div className="flex items-center gap-3 mt-2">
            <button
              onClick={handleTest}
              disabled={isTesting}
              className="px-4 py-2 text-xs font-bold rounded-lg bg-mono-200 text-mono-700 dark:bg-mono-700 dark:text-mono-300 hover:bg-mono-300 dark:hover:bg-mono-600 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
            >

            </button>

              <span className={`text-xs font-medium ${getStatusColor()}`}>

        );

          const saved = localStorage.getItem('localImageConfig');
          return saved ? JSON.parse(saved) : DEFAULT_LOCAL_IMAGE_CONFIG;
        });
        
        // 连接状态和可用模型/LoRA
        const [connectionStatus, setConnectionStatus] = useState('unknown');
        const [availableModels, setAvailableModels] = useState([]);
        const [availableLoras, setAvailableLoras] = useState([]);
        const [availableSamplers, setAvailableSamplers] = useState(['euler_ancestral', 'euler', 'dpmpp_2m', 'dpmpp_2m_sde']);
        const [isLoadingModels, setIsLoadingModels] = useState(false);
        
        // 模型搜索
        const [modelSearchQuery, setModelSearchQuery] = useState('');
        const [isModelDropdownOpen, setIsModelDropdownOpen] = useState(false);
        const modelDropdownRef = useRef(null);
        const modelInputRef = useRef(null);
        
        // LoRA搜索 - 每个LoRA项有自己的搜索状态
        const [loraSearchStates, setLoraSearchStates] = useState({});
        const loraDropdownRefs = useRef({});
        
        // 提取文件名（去掉路径）
        const getFileName = (path) => {
          if (!path) return '';
          return path.replace(/\\/g, '/').split('/').pop();
        };
        
        // 模型去重 - 按文件名去重，保留完整路径
        const uniqueModels = useMemo(() => {
          const seen = new Set();
          return availableModels.filter(opt => {
            const fileName = getFileName(opt);
            if (seen.has(fileName)) return false;
            seen.add(fileName);
            return true;
          });
        }, [availableModels]);
        
        // 过滤模型列表
        const filteredModels = modelSearchQuery.trim()
          ? uniqueModels.filter(opt => opt.toLowerCase().includes(modelSearchQuery.toLowerCase()))
          : uniqueModels;
        
        // LoRA去重 - 按文件名去重
        const uniqueLoras = useMemo(() => {
          const seen = new Set();
          return availableLoras.filter(opt => {
            const fileName = getFileName(opt);
            if (seen.has(fileName)) return false;
            seen.add(fileName);
            return true;
          });
        }, [availableLoras]);

        // 过滤LoRA列表
        const getFilteredLoras = (searchQuery) => {
          if (!searchQuery || !searchQuery.trim()) return uniqueLoras;
          return uniqueLoras.filter(opt => opt.toLowerCase().includes(searchQuery.toLowerCase()));
        };
        
        // 更新LoRA搜索状态
        const setLoraSearchState = (loraId, updates) => {
          setLoraSearchStates(prev => ({
            ...prev,
            [loraId]: { ...prev[loraId], ...updates }
          }));
        };
        
        // 点击外部关闭下拉框
        useEffect(() => {
          const handleClickOutside = (e) => {
            // 关闭模型下拉框
            if (modelDropdownRef.current && !modelDropdownRef.current.contains(e.target)) {
              setIsModelDropdownOpen(false);
              setModelSearchQuery('');
            }
            // 关闭LoRA下拉框
            Object.keys(loraDropdownRefs.current).forEach(loraId => {
              const ref = loraDropdownRefs.current[loraId];
              if (ref && !ref.contains(e.target)) {
                setLoraSearchState(loraId, { isOpen: false, query: '' });
              }
            });
          };
          document.addEventListener('mousedown', handleClickOutside);
          return () => document.removeEventListener('mousedown', handleClickOutside);
        }, []);
        
        // 测试生成
        const [testPrompt, setTestPrompt] = useState('');
        const [generatedImage, setGeneratedImage] = useState(null);
        const [isGenerating, setIsGenerating] = useState(false);
        const [generationProgress, setGenerationProgress] = useState('');
        
        // 保存配置到localStorage
        const handleImageGenChange = (key, value) => {
          const updated = { ...imageGenSettings, [key]: value };
          setImageGenSettings(updated);
          localStorage.setItem('localImageConfig', JSON.stringify(updated));
        };
        
        // 获取可用模型和LoRA
        const fetchAvailableModels = async () => {
          setIsLoadingModels(true);
          try {
            // 获取模型列表
            const models = await LocalImageService.getAvailableModels(imageGenSettings.serverUrl);
            setAvailableModels(models);
            
            // 获取LoRA列表
            const loras = await LocalImageService.getAvailableLoras(imageGenSettings.serverUrl);
            setAvailableLoras(loras);
            
            // 获取采样器列表
            const samplers = await LocalImageService.getAvailableSamplers(imageGenSettings.serverUrl);
            if (samplers.length > 0) setAvailableSamplers(samplers);
            
            setConnectionStatus('connected');
          } catch (error) {
            console.error('获取模型失败:', error);
            setConnectionStatus('disconnected');
            alert('连接失败: ' + error.message);
          } finally {
            setIsLoadingModels(false);
          }
        };
        
        // 检查连接状态
        const checkConnection = async () => {
          setConnectionStatus('checking');
          try {
            const isConnected = await LocalImageService.checkConnection(imageGenSettings.serverUrl);
            if (isConnected) {
              await fetchAvailableModels();
            } else {
              setConnectionStatus('disconnected');
            }
          } catch (err) {
            setConnectionStatus('disconnected');
          }
        };
        
        // LoRA管理函数
        const handleAddLora = () => {
          if (uniqueLoras.length === 0) {
            alert('请先连接服务器获取LoRA列表');
            return;
          }
          const newLora = {
            id: Date.now(),
            name: uniqueLoras[0],
            enabled: true,
            strength: 1.0,
            triggerWords: '',
          };
          handleImageGenChange('loras', [...(imageGenSettings.loras || []), newLora]);
        };
        
        const handleUpdateLora = (id, field, value) => {
          const updated = (imageGenSettings.loras || []).map(l => 
            l.id === id ? { ...l, [field]: value } : l
          );
          handleImageGenChange('loras', updated);
        };
        
        const handleRemoveLora = (id) => {
          handleImageGenChange('loras', (imageGenSettings.loras || []).filter(l => l.id !== id));
        };
        
        // 随机种子
        const handleRandomSeed = () => {
          handleImageGenChange('seed', Math.floor(Math.random() * 2147483647));
        };
        
        // 测试生成
        const handleTestGenerate = async () => {
          if (!testPrompt.trim()) return;
          setIsGenerating(true);
          setGeneratedImage(null);
          setGenerationProgress('准备生成...');
          
          try {
            const tempChar = {
              value: testPrompt,
              name: 'test'
            };
            
            const imageData = await LocalImageService.generateImage(
              imageGenSettings, 
              tempChar,
              false,
              (progress, percent) => {
                setGenerationProgress(`${progress} (${percent}%)`);
              }
            );
            
            setGeneratedImage(imageData);
          } catch (err) {
            console.error('生成失败:', err);
            alert('生成失败: ' + err.message);
          } finally {
            setIsGenerating(false);
            setGenerationProgress('');
          }
        };
        
        // 重置设置
        const handleResetImageGen = () => {
          if (confirm('确定要重置生图设置为默认值吗？')) {
            setImageGenSettings(DEFAULT_LOCAL_IMAGE_CONFIG);
            localStorage.setItem('localImageConfig', JSON.stringify(DEFAULT_LOCAL_IMAGE_CONFIG));
          }
        };
        
        useEffect(() => {
          checkConnection();
        }, []);
        
        return (
          <div className="space-y-6">
            {/* 生图预设配置标题 */}
            <div>
              <h4 className="text-xs font-bold text-mono-500 dark:text-mono-400 uppercase mb-3">生图预设配置</h4>
              
              {/* 提示词设置 - 左右两格 */}
              <div className="grid grid-cols-2 gap-4 mb-6">
                {/* 正面提示词 */}
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">
                    正面提示词
                  </label>
                  <textarea 
                    value={imageGenSettings.positivePrompt}
                    onChange={e => handleImageGenChange('positivePrompt', e.target.value)}
                    placeholder="输入正面提示词..."
                    className="w-full p-3 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none resize-none h-32"
                  />
                </div>

                {/* 负面提示词 */}
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">
                    负面提示词
                  </label>
                  <textarea 
                    value={imageGenSettings.negativePrompt}
                    onChange={e => handleImageGenChange('negativePrompt', e.target.value)}
                    placeholder="输入负面提示词..."
                    className="w-full p-3 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none resize-none h-32"
                  />
                </div>
              </div>

              {/* 尺寸设置 */}
              <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl mb-4">
                <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-3 block flex items-center gap-2">
                  <Icon name="Image" className="w-4 h-4 text-mono-700 dark:text-mono-300" />
                  图片尺寸
                </label>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="text-xs text-mono-500 dark:text-mono-400 mb-1 block">宽度 (Width)</label>
                    <input 
                      type="number"
                      value={imageGenSettings.width}
                      onChange={e => handleImageGenChange('width', parseInt(e.target.value) || 512)}
                      className="w-full p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none"
                      min="256"
                      max="2048"
                      step="64"
                    />
                  </div>
                  <div>
                    <label className="text-xs text-mono-500 dark:text-mono-400 mb-1 block">高度 (Height)</label>
                    <input 
                      type="number"
                      value={imageGenSettings.height}
                      onChange={e => handleImageGenChange('height', parseInt(e.target.value) || 512)}
                      className="w-full p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none"
                      min="256"
                      max="2048"
                      step="64"
                    />
                  </div>
                </div>
                {/* 快捷尺寸按钮 */}
                <div className="flex flex-wrap gap-2 mt-3">
                  {[
                    { w: 512, h: 512, label: '512×512' },
                    { w: 768, h: 1024, label: '768×1024' },
                    { w: 1024, h: 768, label: '1024×768' },
                    { w: 1024, h: 1024, label: '1024×1024' },
                  ].map(size => (
                    <button
                      key={size.label}
                      onClick={() => {
                        handleImageGenChange('width', size.w);
                        handleImageGenChange('height', size.h);
                      }}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${
                        imageGenSettings.width === size.w && imageGenSettings.height === size.h
                          ? 'bg-mono-900 dark:bg-mono-100 text-white dark:text-black'
                          : 'bg-mono-200 dark:bg-mono-700 text-mono-600 dark:text-mono-400'
                      }`}
                    >
                      {size.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* 采样设置 */}
              <div className="grid grid-cols-2 gap-4 mb-4">
                {/* 步数 */}
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">
                    步数 (Steps)
                  </label>
                  <div className="flex items-center gap-3">
                    <input 
                      type="range"
                      min="1"
                      max="100"
                      value={imageGenSettings.steps}
                      onChange={e => handleImageGenChange('steps', parseInt(e.target.value))}
                      className="flex-1 accent-blue-500"
                    />
                    <span className="text-sm text-mono-600 dark:text-mono-300 w-8 text-right">{imageGenSettings.steps}</span>
                  </div>
                </div>

                {/* CFG */}
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">
                    CFG Scale
                  </label>
                  <div className="flex items-center gap-3">
                    <input 
                      type="range"
                      min="1"
                      max="20"
                      step="0.5"
                      value={imageGenSettings.cfg}
                      onChange={e => handleImageGenChange('cfg', parseFloat(e.target.value))}
                      className="flex-1 accent-blue-500"
                    />
                    <span className="text-sm text-mono-600 dark:text-mono-300 w-8 text-right">{imageGenSettings.cfg}</span>
                  </div>
                </div>
              </div>

              {/* 种子设置 */}
              <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl mb-4">
                <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">
                  种子 (Seed)
                </label>
                <div className="flex gap-2">
                  <input 
                    type="number"
                    value={imageGenSettings.seed}
                    onChange={e => handleImageGenChange('seed', parseInt(e.target.value) || -1)}
                    className="flex-1 p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none"
                    placeholder="-1 为随机"
                  />
                  <button
                    onClick={handleRandomSeed}
                    className="p-2 bg-mono-200 dark:bg-mono-700 rounded-lg text-mono-700 dark:text-mono-300 hover:text-mono-900 dark:hover:text-mono-100 transition-colors"
                    title="随机种子"
                  >
                    <Icon name="RefreshCw" className="w-4 h-4" />
                  </button>
                </div>
                <p className="text-xs text-mono-400 mt-1">-1 表示随机种子</p>
              </div>

              {/* 采样器和调度器 */}
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">采样器 (Sampler)</label>
                  <select 
                    value={imageGenSettings.sampler}
                    onChange={e => handleImageGenChange('sampler', e.target.value)}
                    className="w-full p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none"
                  >
                    {availableSamplers.map(s => (
                      <option key={s} value={s}>{s}</option>
                    ))}
                  </select>
                </div>
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block">调度器 (Scheduler)</label>
                  <select 
                    value={imageGenSettings.scheduler}
                    onChange={e => handleImageGenChange('scheduler', e.target.value)}
                    className="w-full p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none"
                  >
                    <option value="normal">Normal</option>
                    <option value="karras">Karras</option>
                    <option value="exponential">Exponential</option>
                    <option value="sgm_uniform">SGM Uniform</option>
                    <option value="simple">Simple</option>
                  </select>
                </div>
              </div>

              {/* 服务器和模型设置 - 左右两格 */}
              <div className="grid grid-cols-2 gap-4 mb-4">
                {/* 服务器地址 */}
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block flex items-center gap-2">
                    <Icon name="Server" className="w-4 h-4 text-mono-700 dark:text-mono-300" />
                    服务器地址
                  </label>
                  <div className="flex gap-2">
                    <input 
                      type="text"
                      value={imageGenSettings.serverUrl}
                      onChange={e => handleImageGenChange('serverUrl', e.target.value)}
                      placeholder="http://127.0.0.1:8188"
                      className="flex-1 p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none"
                    />
                    <button
                      onClick={fetchAvailableModels}
                      disabled={isLoadingModels}
                      className="p-2 bg-mono-200 dark:bg-mono-700 rounded-lg text-sm font-medium text-mono-700 dark:text-mono-300 flex items-center gap-1 transition-all active:scale-95 disabled:opacity-50"
                      title="连接服务器并获取大模型列表"
                    >
                      {isLoadingModels ? (
                        <div className="w-4 h-4 border-2 border-mono-400 border-t-transparent rounded-full animate-spin"></div>
                      ) : (
                        <Icon name="RefreshCw" className="w-4 h-4" />
                      )}
                    </button>
                  </div>
                  <p className="text-xs text-mono-400 mt-1">点击刷新获取大模型</p>
                </div>

                {/* 模型选择 - 可搜索 */}
                <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl relative" ref={modelDropdownRef}>
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200 mb-2 block flex items-center gap-2">
                    <Icon name="Folder" className="w-4 h-4 text-mono-700 dark:text-mono-300" />
                    大模型选择
                  </label>
                  <div className="relative">
                    <input
                      ref={modelInputRef}
                      type="text"
                      value={isModelDropdownOpen ? modelSearchQuery : getFileName(imageGenSettings.modelPath)}
                      onChange={e => {
                        setModelSearchQuery(e.target.value);
                        setIsModelDropdownOpen(true);
                      }}
                      onFocus={() => {
                        setIsModelDropdownOpen(true);
                        setModelSearchQuery('');
                      }}
                      placeholder={availableModels.length > 0 ? "搜索或选择大模型..." : "请先连接服务器..."}
                      disabled={availableModels.length === 0}
                      className="w-full p-2 text-sm bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg outline-none disabled:opacity-50 pr-10"
                    />
                    <button
                      type="button"
                      onClick={() => availableModels.length > 0 && setIsModelDropdownOpen(!isModelDropdownOpen)}
                      className="absolute right-2 top-1/2 -translate-y-1/2 text-mono-400 hover:text-mono-600 dark:hover:text-mono-300"
                      disabled={availableModels.length === 0}
                    >
                      <Icon name="ChevronDown" className={`w-4 h-4 transition-transform ${isModelDropdownOpen ? 'rotate-180' : ''}`} />
                    </button>
                  </div>

                  {/* 下拉列表 */}
                  {isModelDropdownOpen && availableModels.length > 0 && (
                    <div
                      className="absolute z-50 w-full left-0 right-0 mt-1 bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg shadow-lg custom-scrollbar"
                      style={{ maxHeight: '250px', overflow: 'auto', top: '100%' }}
                    >
                      {filteredModels.length > 0 ? (
                        filteredModels.map(model => (
                          <button
                            key={model}
                            type="button"
                            onClick={() => {
                              handleImageGenChange('modelPath', model);
                              setIsModelDropdownOpen(false);
                              setModelSearchQuery('');
                            }}
                            className={`w-full px-3 py-2 text-left text-sm hover:bg-mono-100 dark:hover:bg-mono-800 break-all ${model === imageGenSettings.modelPath ? 'bg-mono-200 dark:bg-mono-700 text-mono-900 dark:text-mono-100' : 'text-mono-900 dark:text-mono-100'}`}
                            title={model}
                          >
                            {getFileName(model)}
                          </button>
                        ))
                      ) : (
                        <div className="px-3 py-2 text-sm text-mono-400">无匹配结果</div>
                      )}
                    </div>
                  )}
                  
                  <p className="text-xs text-mono-400 mt-1">
                    {uniqueModels.length > 0
                      ? `已加载 ${uniqueModels.length} 个大模型${modelSearchQuery ? `，筛选出 ${filteredModels.length} 个` : ''}`
                      : '未连接服务器'}
                  </p>
                </div>
              </div>

              {/* LoRA设置（多个） */}
              <div className="p-4 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-xl mb-4">
                <div className="flex items-center justify-between mb-3">
                  <label className="text-sm font-medium text-mono-700 dark:text-mono-200">
                    LoRA 设置
                  </label>
                  <button
                    onClick={handleAddLora}
                    disabled={uniqueLoras.length === 0}
                    className="px-3 py-1.5 text-xs font-medium text-mono-700 dark:text-mono-300 bg-mono-200 dark:bg-mono-700 rounded-lg flex items-center gap-1 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <Icon name="Plus" className="w-3.5 h-3.5" /> 添加LoRA
                  </button>
                </div>
                
                {uniqueLoras.length === 0 && (
                  <p className="text-xs text-mono-600 dark:text-mono-400 mb-2">
                    请先点击服务器地址旁的刷新按钮获取LoRA列表
                  </p>
                )}
                
                {(imageGenSettings.loras || []).length === 0 ? (
                  <p className="text-xs text-mono-400 text-center py-4">
                    暂无LoRA，点击上方按钮添加
                  </p>
                ) : (
                  <div className="space-y-3">
                    {(imageGenSettings.loras || []).map((lora) => {
                      const loraState = loraSearchStates[lora.id] || { isOpen: false, query: '' };
                      const filteredLoras = getFilteredLoras(loraState.query);
                      
                      return (
                      <div 
                        key={lora.id} 
                        className="p-3 bg-white dark:bg-mono-900 border border-mono-200 dark:border-mono-700 rounded-lg space-y-2"
                        ref={el => { if (el) loraDropdownRefs.current[lora.id] = el; }}
                      >
                        {/* LoRA选择 - 可搜索 */}
                        <div className="relative">
                          <input
                            type="text"
                            value={loraState.isOpen ? loraState.query : getFileName(lora.name)}
                            onChange={e => {
                              setLoraSearchState(lora.id, { query: e.target.value, isOpen: true });
                            }}
                            onFocus={() => {
                              setLoraSearchState(lora.id, { query: '', isOpen: true });
                            }}
                            placeholder={uniqueLoras.length > 0 ? "搜索或选择LoRA..." : "请先连接服务器..."}
                            disabled={uniqueLoras.length === 0}
                            className="w-full p-2 text-sm bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-lg outline-none disabled:opacity-50 pr-10"
                          />
                          <button
                            type="button"
                            onClick={() => uniqueLoras.length > 0 && setLoraSearchState(lora.id, { isOpen: !loraState.isOpen })}
                            className="absolute right-2 top-1/2 -translate-y-1/2 text-mono-400 hover:text-mono-600 dark:hover:text-mono-300"
                            disabled={uniqueLoras.length === 0}
                          >
                            <Icon name="ChevronDown" className={`w-4 h-4 transition-transform ${loraState.isOpen ? 'rotate-180' : ''}`} />
                          </button>
                        </div>
                        
                        {/* LoRA下拉列表 */}
                        {loraState.isOpen && uniqueLoras.length > 0 && (
                          <div 
                            className="z-10 bg-mono-50 dark:bg-mono-800 border border-mono-200 dark:border-mono-700 rounded-lg shadow-lg custom-scrollbar"
                            style={{ maxHeight: '200px', overflow: 'auto' }}
                          >
                            {filteredLoras.length > 0 ? (
                              filteredLoras.map(l => (
                                <button
                                  key={l}
                                  type="button"
                                  onClick={() => {
                                    handleUpdateLora(lora.id, 'name', l);
                                    setLoraSearchState(lora.id, { isOpen: false, query: '' });
                                  }}
                                  className={`w-full px-3 py-2 text-left text-sm hover:bg-mono-100 dark:hover:bg-mono-700 break-all ${l === lora.name ? 'bg-mono-200 dark:bg-mono-700 text-mono-900 dark:text-mono-100' : 'text-mono-900 dark:text-mono-100'}`}
                                  title={l}
                                >
                                  {getFileName(l)}
                                </button>
                              ))
                            ) : (
                              <div className="px-3 py-2 text-sm text-mono-400">无匹配结果</div>
                            )}
                          </div>
                        )}
                        
                        {/* LoRA启用开关和删除按钮 */}
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <label className="relative inline-flex items-center cursor-pointer">
                              <input 
                                type="checkbox"
                                checked={lora.enabled}
                                onChange={e => handleUpdateLora(lora.id, 'enabled', e.target.checked)}
                                className="sr-only peer"
                              />
                              <div className="w-9 h-5 bg-mono-300 dark:bg-mono-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-mono-800 dark:peer-checked:bg-mono-200"></div>
                            </label>
                            <button
                              onClick={() => handleRemoveLora(lora.id)}
                              className="p-1.5 text-mono-600 dark:text-mono-400 hover:bg-mono-100 dark:hover:bg-mono-800 rounded-lg transition-colors"
                            >
                              <Icon name="Trash" className="w-4 h-4" />
                            </button>
                          </div>
                        </div>
                        
                        {/* 强度滑块 */}

          const handleDelete = (id) => { if (!confirm("确定要删除此素材吗？")) return; if (itemType === 'sprite') { const newSprites = {}; items.forEach(([key, data]) => { if (key !== id) newSprites[key] = data; }); onUpdateItems(newSprites); } else { onUpdateItems(items.filter(item => item.id !== id)); } };
          
          const normalizedItems = itemType === 'sprite' ? items.map(([key, data]) => ({ id: key, name: key, data, type: 'image' })) : items;

                  map[p.id] = s;
              });
              return map;
          }, [projects, itemType]);

          const filteredItems = normalizedItems.filter(item => {
              const itemName = item.name || '';
              const matchesSearch = itemName.toLowerCase().includes(searchTerm.toLowerCase());
              let matchesFilter = true;
              if (filterType === 'PROJECT' && activeProjectFilter && itemType === 'background') {
                  const allowedIds = projectBgMap[activeProjectFilter] || new Set();
                  matchesFilter = allowedIds.has(item.id);
              }
              return matchesSearch && matchesFilter;
          });

          return (
              <Modal isOpen={isOpen} onClose={onClose} title={title} size="5xl">
                  <div className="flex flex-col gap-4">
                      {/* Search & Filter Bar */}
                      <div className="flex flex-col md:flex-row gap-2 pb-2 border-b border-mono-200 dark:border-mono-800">
                          <div className="relative flex-1"> <Icon name="Search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-mono-400"/> <Input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="搜索素材名称..." className="pl-9 text-sm bg-mono-100 dark:bg-mono-800 rounded-lg border-transparent focus:bg-white dark:focus:bg-mono-900 border" /> </div>

      // ==========================================

      const CharactersPanel = ({ characters, onCharactersUpdate, projects, isStandalone = false, onExit, onExportTrigger, initialCharId = null, navigateToMode, isMobilePortrait }) => {
        const [selectedCharId, setSelectedCharId] = useState(initialCharId);
        const selectedChar = selectedCharId === PLAYER_CHAR.id ? PLAYER_CHAR : characters.find(c => c.id === selectedCharId);
        const [isImportDragging, setIsImportDragging] = useState(false);
        const [isBatchMode, setIsBatchMode] = useState(false);
        const [selectedBatchIds, setSelectedBatchIds] = useState(new Set());
        const [searchTerm, setSearchTerm] = useState('');
        const [filterType, setFilterType] = useState('ALL'); 
        const [activeProjectFilter, setActiveProjectFilter] = useState('');
        const [showAIGenerate, setShowAIGenerate] = useState(false);
        const [aiGeneratePrompt, setAiGeneratePrompt] = useState('');
        const [isGeneratingAvatar, setIsGeneratingAvatar] = useState(false);
        const [aiGenerateImageSource, setAiGenerateImageSource] = useState(() => {
          const localImageConfig = JSON.parse(localStorage.getItem('localImageConfig') || '{}');

        });
        
        const inputRef = useRef(null);

        const projectCharMap = useMemo(() => { if (!projects) return {}; const map = {}; projects.forEach(p => { const s = new Set(); p.scripts.forEach(l => { if(l.characterId) s.add(l.characterId); l.stageCharacters?.forEach(sc => s.add(sc.charId)); }); map[p.id] = s; }); return map; }, [projects]);
        const filteredCharacters = useMemo(() => { let chars = characters; if (searchTerm) { const lower = searchTerm.toLowerCase(); chars = chars.filter(c => c.name.toLowerCase().includes(lower) || c.description.toLowerCase().includes(lower)); } if (filterType === 'PROJECT' && activeProjectFilter) { const allowedIds = projectCharMap[activeProjectFilter] || new Set(); chars = chars.filter(c => allowedIds.has(c.id)); } return chars; }, [characters, searchTerm, filterType, activeProjectFilter, projectCharMap]);

        const addCharacter = () => { const newChar = { id: Date.now().toString(), name: "新角色", avatar: MOCK_CHAR_IMG, sprites: {}, description: "设定...", note: "", firstMessage: "你好！", attributes: [], voiceSettings: { type: 'cloud', voice: 'Chinese (China)-XiaoxiaoNeural', speed: 1.0, version: '', model: '', emotion: '', textLang: '中文', promptTextLang: '中文', textSplitMethod: '按标点符号切', seed: -1 } }; onCharactersUpdate([...characters, newChar]); setSelectedCharId(newChar.id); setFilterType('ALL'); setSearchTerm(''); };

            {/* AI生成头像模态框 */}

                  className="!h-32"

                <div className="flex justify-end gap-3">
                  <Button variant="ghost" onClick={() => setShowAIGenerate(false)}>取消</Button>
                  <Button 
                    onClick={handleAIGenerateAvatar} 
                    disabled={!aiGeneratePrompt.trim() || isGeneratingAvatar}
                  >
                    {isGeneratingAvatar ? <><Icon name="Sparkles" className="animate-spin"/> 生成中...</> : <><Icon name="Wand2"/> 生成头像</>}
